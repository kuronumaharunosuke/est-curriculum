これらはユーザーの操作が原因なのでリトライを促すメッセージを表示する。\n\nonAuthStateChangedで認証状態を監視し、ユーザーが@aiesec.jp以外のアカウントでログインした場合はsignOut()を呼んで「aiesec.jpアカウントを使ってください」というメッセージを表示する。\n\nFirestoreのセキュリティルールは認証状態に依存するため、認証が完了してからFirestoreにアクセスする順序が重要。onAuthStateChangedのコールバック内でFirestoreアクセスを開始するのがベストプラクティス。","code":"// 認証エラーのハンドリング\nconst handleLogin = async () => {\n  const provider = new GoogleAuthProvider();\n\n  try {\n    const result = await signInWithPopup(auth, provider);\n    const email = result.user.email;\n\n    // @aiesec.jp ドメインチェック\n    if (!email.endsWith('@aiesec.jp')) {\n      await signOut(auth);\n      showError('aiesec.jp のアカウントでログインしてください');\n      return;\n    }\n\n    // ログイン成功→アプリ初期化\n    initApp(result.user);\n\n  } catch (err) {\n    const messages = {\n      'auth/popup-blocked':        'ポップアップがブロックされています。ポップアップを許可してください',\n      'auth/popup-closed-by-user': 'ログインがキャンセルされました',\n      'auth/network-request-failed': 'ネットワークエラーです。接続を確認してください',\n    };\n    const msg = messages[err.code] || `ログインエラー: ${err.code}`;\n    showError(msg);\n  }\n};","codeNote":"Chrome や Safari のポップアップブロック設定により auth/popup-blocked が頻発することがある。その場合は signInWithRedirect を代替として提案できる（ポップアップの代わりにリダイレクトでログイン）。","mistakes":["認証エラーをまとめてcatch(err) { console.error(err) }だけで終わらせる → ユーザーが何をすべきかわからない。err.codeに応じたガイダンスを表示する","signOut後にonAuthStateChangedが再度呼ばれることを忘れる → signOutすると認証状態がnullになりonAuthStateChangedのelseブロックが実行される。ループに注意"],"miniEx":"Chrome でポップアップブロックを有効にした状態でlc-trackerのログインを試みて auth/popup-blocked エラーを意図的に発生させてみよう。DevToolsでエラーコードを確認する。"}],"exercise":{"title":"FirebaseエラーハンドリングのPR","desc":"lc-trackerのFirebase/認証エラーハンドリングを改善するPRを出そう。","items":["Firestoreアクセス箇所のtry/catchにerr.codeの処理を追加する","エラー時にユーザーへの通知UI（エラーメッセージ表示）を実装する","認証エラー（@aiesec.jp以外のアカウント）のメッセージを改善する（既存があれば）","デバッグ用console.logを削除してからPRを提出する"],"rubric":["err.codeを使ったエラー分岐がある","ユーザーへのエラーメッセージ表示がある","デバッグ用console.logが残っていない"]},"faq":[{"q":"permission-deniedが出続ける。コードの問題？","a":"まずFirebase Consoleのルール・シミュレーターを使って原因を特定しよう（Firestore→ルール→シミュレーター）。認証状態・コレクションパス・操作の種類を入力してテストできる。コードを修正する前にルールが原因かコードが原因かを切り分けることが大事。"},{"q":"onSnapshotのエラーはどうキャッチするか","a":"onSnapshot((snapshot) => { ... }, (error) => { console.error(error.code) })というように第2引数にエラーコールバックを渡すことができる。try/catchではonSnapshotの非同期エラーはキャッチできないので注意。"}],"checklist":[{"text":"Firestoreの主要エラーコードを調べてメモした","role":"coder"},{"text":"err.codeを使ったエラー分岐をFirestore呼び出し箇所に追加した","role":"coder"},{"text":"ユーザーへのエラーメッセージ表示を実装した","role":"coder"},{"text":"PRを提出してレビューを受けた","role":"coder"}],"refs":[{"title":"Firestore エラーコード","url":"https://firebase.google.com/docs/firestore/quotas#errors","note":"エラーコード一覧"},{"title":"Firebase Auth エラーコード","url":"https://firebase.google.com/docs/auth/admin/errors","note":""}],"hint":"エラーはユーザー体験（UX）の問題でもある。「何も表示されない」より「ネットワークエラーです。再試行してください」の方がユーザーにとって100倍親切。"},{"id":23,"phase":3,"title":"小機能追加① — 仕様書からの実装","hours":"7〜9","target":"both","prereqs":["Week 17完了","前週の課題を提出済み"],"intro":"バグ修正の次は機能追加。今週ははるのすけが用意した仕様書（Issueに書かれた要件）をもとに小さな機能を1つ追加する。「仕様書を読む → 実装方針を提案 → コーディング → テスト → PR」という開発サイクル全体を体験しよう。","goals":["仕様書を読んで実装方針を提案し、既存コードのスタイルに合わせてコードを書いてPRを出せる","はるのすけのフィードバックを受けて改善できる","チャンネルに成果物を投稿できる"],"steps":[{"num":"01","title":"作業準備とタスク確認","dur":"20分","why":"「何をするか」を明確にしてから始めることで、作業中の迷子を防げる。","body":"まずはるのすけのIssueリストから今週の課題を確認しよう。担当するIssueにコメントして「アサインをお願いします」と伝える。次にgit pull origin mainで最新のmainを取り込んでから、featureブランチを切る。\n\nブランチ名は「fix/バグの内容」または「feat/機能名」の形式で。例えばfix/login-button-not-workingやfeat/add-lc-filter-button。\n\n作業開始前に「どこを変えるのか」「なぜそこを変えるのか」「完了の条件は何か」を一度文字にしてみよう。これがPRのdescriptionの骨子になる。","code":null,"codeNote":null,"mistakes":["Issueを確認せずに作業を始めて「同じ作業を2人でやっていた」という事態になる → 作業前にIssueにコメントしてアサインを受ける","mainが古い状態でブランチを切る → 作業前に必ずgit pull origin main"],"miniEx":"Issueリストを開いて今週の担当Issueを1件選び、コメントで「取り組みます」と伝えよう。"},{"num":"02","title":"小機能追加①の本作業","dur":"2〜4時間","why":"「仕様書通りに作る」のは実は難しい。仕様書の曖昧な表現を「どう解釈するか」「見落としているエッジケースはないか」を考える力が求められる。実装前に方針を確認する習慣が、後々の大きな手戻りを防ぐ。","body":"仕様書（Issue）を読み込んで、実装方針をコメントに書いてはるのすけに確認してもらおう。実装方針には「何を変更・追加するか」「どのファイルのどの箇所を変更するか」「エッジケースとその対処法」を書く。はるのすけからOKが出てから実装に入る。\n\n実装するときは「既存コードのスタイルに合わせる」ことを意識しよう。変数名の命名規則（camelCase？snake_case？）・コメントの書き方・関数の粒度・エラーハンドリングの方法など、プロジェクトのコーディングスタイルに合わせることがチーム開発の基本。\n\nテストは正常ケースだけでなく「空入力」「文字数超過」「ネットワーク切断」「すでに同じデータがある」などのエッジケースも確認しよう。発見したエッジケースをPRのdescriptionにテストケースとして書き出す。","code":"// 実装前に確認する内容をコメントにまとめる例\n\n/**\n * 機能追加: LC一覧にフィルタ機能を追加\n *\n * 実装方針:\n * 1. filterState変数を追加（'all' | 'active' | 'inactive'）\n * 2. フィルタボタン3つをHTMLに追加\n * 3. ボタンクリック時にfilterStateを変更してrenderLCs()を再呼び出し\n * 4. renderLCs()でfilterStateに応じてlcsをfilter()\n *\n * 変更ファイル:\n * - index.html: フィルタボタンのHTML追加\n * - main.js:    filterState変数・フィルタロジック追加\n * - style.css:  アクティブなボタンのスタイル追加\n *\n * エッジケース:\n * - LCが0件の場合: 「該当なし」と表示する\n * - フィルタ切り替え後のスクロール位置: リセットしない\n */","codeNote":"小機能追加① — 仕様書からの実装の核心作業。詰まったら早めにはるのすけへ。","mistakes":["仕様書の確認なしに実装に入る → 解釈のズレが後で大きな手戻りになる。必ず実装前にはるのすけに方針を確認する","既存のコードスタイルを無視して自分の好みで書く → チームのコードに統一感がなくなる。既存コードを参考にして同じスタイルで書く","エッジケースを無視する → ユーザーは想定外の使い方をする。空・ゼロ・超大量データ・特殊文字などを考慮する"],"miniEx":"30分作業したら一度立ち止まって「今何をしているか・次に何をするか」を確認しよう。"},{"num":"03","title":"PRの作成と提出","dur":"30分","why":"PRのdescriptionに「Before/Afterのスクリーンショット」を貼るだけで、レビュアーへの伝わり方が全然違う。手間でもやる価値がある。","body":"作業が完了したら動作確認をしよう。正常ケース（期待通り動くケース）だけでなく、空入力・ネットワークエラー・ログインしていない状態などの異常ケースも確認する。\n\nスクリーンショットを撮る。UIの変更がある場合はBefore（修正前）とAfter（修正後）の両方。Before画像は作業前に撮っておかないと後から作れないので要注意。\n\nPRのdescriptionに「変更内容・理由・確認方法・スクリーンショット」を書いて提出。はるのすけをレビュアーに指定する。","code":null,"codeNote":"descriptionのスクリーンショットはGitHubにドラッグ&ドロップで貼り付けられる。","mistakes":["Before画像を撮り忘れる → 作業前に必ずスクリーンショットを撮る習慣をつける","正常ケースしか確認しない → 空入力・エラー状態などの異常ケースも確認する"],"miniEx":"PRを提出したらSlackの#est-学習チャンネルにPRのURLを貼って「PRを出しました」と報告しよう。"}],"exercise":{"title":"小機能追加① — 仕様書からの実装 演習課題","desc":"今週のテーマ「小機能追加① — 仕様書からの実装」に沿って成果物を作成し、PRとして提出しよう。","items":["仕様書を読んで実装方針をコメントに書きはるのすけに確認した","既存コードのスタイル（命名・コメント）に合わせてコードを書いた","エッジケースを3件以上考慮して実装した","テストケースをPRのdescriptionに書き出した","PRがマージされた","一元化担当：追加機能のスクリーンショット付きマニュアルを作成した"],"rubric":["featureブランチが作成されている","PRのdescriptionに変更内容・理由・確認方法が書かれている","スクリーンショットがPRに貼られている","レビューを受けてマージされた"]},"faq":[{"q":"詰まったとき何をすれば一番早いか","a":"①エラーメッセージをそのままGoogleで検索する、②console.logを追加して問題の箇所を絞り込む、③30分調べてもわからなければはるのすけに「○○をしようとして○○というエラーが出ます」という形で聞く。「どこかわからない」より「ここがわからない」と聞ける方が解決が早い。"},{"q":"PRのdescriptionは日本語で書いていい？","a":"AJのESTでは日本語で書いてOK。ただし英語で書けるなら英語の方がポートフォリオとしての汎用性が上がる。最初は日本語で書き、慣れてきたら英語に挑戦しよう。"}],"checklist":[{"text":"今週の担当Issueを選んでアサインを受けた","role":"coder"},{"text":"featureブランチを作成して作業した","role":"coder"},{"text":"PRにBefore/Afterのスクリーンショットを貼った","role":"coder"},{"text":"PRをレビューしてもらいマージした","role":"coder"},{"text":"#est-学習にPRのURLを共有した","role":"both"}],"refs":[{"title":"GitHub — PRのベストプラクティス","url":"https://docs.github.com/ja/pull-requests/","note":""},{"title":"Chrome DevTools — デバッグ入門","url":"https://developer.chrome.com/docs/devtools/","note":""}],"hint":"「仕様に書いていないことは実装しない」が基本。仕様に疑問を感じたらまずはるのすけに確認してから進もう。小さな確認を怠ることが大きな手戻りの原因になる。"},{"id":24,"phase":3,"title":"小機能追加② — 自主課題","hours":"7〜9","target":"both","prereqs":["Week 18完了","前週の課題を提出済み"],"intro":"今週は仕様書なしで、自分でニーズを発見してIssueを起票し、実装してLCに報告する。Phase 2のLCヒアリングで収集した声や、自分でコードを読んで気になった点が素材になる。「自分でIssueを書く → 実装 → LC報告」という流れがPhase 4で担える状態の原型になる。","goals":["LCのニーズから機能を特定してIssueを起票し、仕様を自分で決めてLC報告まで完結できる","はるのすけのフィードバックを受けて改善できる","チャンネルに成果物を投稿できる"],"steps":[{"num":"01","title":"作業準備とタスク確認","dur":"20分","why":"「何をするか」を明確にしてから始めることで、作業中の迷子を防げる。","body":"まずはるのすけのIssueリストから今週の課題を確認しよう。担当するIssueにコメントして「アサインをお願いします」と伝える。次にgit pull origin mainで最新のmainを取り込んでから、featureブランチを切る。\n\nブランチ名は「fix/バグの内容」または「feat/機能名」の形式で。例えばfix/login-button-not-workingやfeat/add-lc-filter-button。\n\n作業開始前に「どこを変えるのか」「なぜそこを変えるのか」「完了の条件は何か」を一度文字にしてみよう。これがPRのdescriptionの骨子になる。","code":null,"codeNote":null,"mistakes":["Issueを確認せずに作業を始めて「同じ作業を2人でやっていた」という事態になる → 作業前にIssueにコメントしてアサインを受ける","mainが古い状態でブランチを切る → 作業前に必ずgit pull origin main"],"miniEx":"Issueリストを開いて今週の担当Issueを1件選び、コメントで「取り組みます」と伝えよう。"},{"num":"02","title":"小機能追加②の本作業","dur":"2〜4時間","why":"「自分でIssueを書く」のが初めてだと難しく感じるが、既存のIssueをテンプレートにして真似て書けばOK。重要なのは「誰が・どんなシーンで・どう困っているか」と「どうなれば解決か（完了条件）」の2点を明確にすること。","body":"Week 13のLCヒアリング結果を読み直して、「あったら便利・困っている」という声から実装できそうなものを1つ選ぼう。または、lc-trackerを実際に使ってみて不便に感じたことでもOK。\n\nIssueを起票するときの書き方：①タイトル（fix: または feat: から始まる説明的なタイトル）、②問題の説明（どんな状況で・誰が・何に困っているか）、③期待する動作（どうなれば解決か）、④完了条件（チェックリスト形式で）。\n\nはるのすけにIssueをレビューしてもらい、仕様の確認を得てから実装に入ろう。実装が完了してPRがマージされたら、担当エリアのLCにSlackで「こんな機能を追加しました」とスクリーンショット付きで報告する。「誰かに使ってもらえた・喜んでもらえた」体験がモチベーションになる。","code":"// 良い Issue の書き方テンプレート\n\n// タイトル: feat: LC別の週次レポートPDF出力機能を追加\n\n// ## 問題の説明\n// 毎週のLC業務振り返りで、Action Trackerの内容を\n// スクリーンショットで切り貼りしてSlackに共有している。\n// PDFとしてダウンロードできれば時間が大幅に削減できる。\n// (HU LCからのヒアリング #LC-feedback-2024-11)\n\n// ## 期待する動作\n// 「週次レポート出力」ボタンを押すと、そのLCの\n// 現週のタスク一覧・達成率のPDFが生成されダウンロードされる。\n\n// ## 完了条件\n// - [ ] 「週次レポート出力」ボタンがUIに追加されている\n// - [ ] ボタン押下でPDFが生成されブラウザでダウンロードされる\n// - [ ] PDFにはLC名・日付・タスク一覧・達成率が含まれる\n\n// ## 規模の見積もり\n// 1週間で実装可能な最小単位に絞った。","codeNote":"小機能追加② — 自主課題の核心作業。詰まったら早めにはるのすけへ。","mistakes":["Issueが曖昧すぎて実装できない → 「誰が・どんな状況で・どう困っているか」と「完了条件」の2点を具体的に書く","1週間で終わらない規模の機能を選んでしまう → 「1週間で実装できる最小単位」に絞ること。大きな機能は小さな機能に分割する","LCへの報告を忘れる → PRマージ後、その日のうちに報告する"],"miniEx":"30分作業したら一度立ち止まって「今何をしているか・次に何をするか」を確認しよう。"},{"num":"03","title":"PRの作成と提出","dur":"30分","why":"PRのdescriptionに「Before/Afterのスクリーンショット」を貼るだけで、レビュアーへの伝わり方が全然違う。手間でもやる価値がある。","body":"作業が完了したら動作確認をしよう。正常ケース（期待通り動くケース）だけでなく、空入力・ネットワークエラー・ログインしていない状態などの異常ケースも確認する。\n\nスクリーンショットを撮る。UIの変更がある場合はBefore（修正前）とAfter（修正後）の両方。Before画像は作業前に撮っておかないと後から作れないので要注意。\n\nPRのdescriptionに「変更内容・理由・確認方法・スクリーンショット」を書いて提出。はるのすけをレビュアーに指定する。","code":null,"codeNote":"descriptionのスクリーンショットはGitHubにドラッグ&ドロップで貼り付けられる。","mistakes":["Before画像を撮り忘れる → 作業前に必ずスクリーンショットを撮る習慣をつける","正常ケースしか確認しない → 空入力・エラー状態などの異常ケースも確認する"],"miniEx":"PRを提出したらSlackの#est-学習チャンネルにPRのURLを貼って「PRを出しました」と報告しよう。"}],"exercise":{"title":"小機能追加② — 自主課題 演習課題","desc":"今週のテーマ「小機能追加② — 自主課題」に沿って成果物を作成し、PRとして提出しよう。","items":["LCニーズまたは自分の体験から課題を1つ選んだ","Issueを起票してはるのすけのレビューを受けた","仕様（完了条件）を書いてOKをもらった","実装してPRを提出・マージした","担当LCにスクリーンショット付きで報告した"],"rubric":["featureブランチが作成されている","PRのdescriptionに変更内容・理由・確認方法が書かれている","スクリーンショットがPRに貼られている","レビューを受けてマージされた"]},"faq":[{"q":"詰まったとき何をすれば一番早いか","a":"①エラーメッセージをそのままGoogleで検索する、②console.logを追加して問題の箇所を絞り込む、③30分調べてもわからなければはるのすけに「○○をしようとして○○というエラーが出ます」という形で聞く。「どこかわからない」より「ここがわからない」と聞ける方が解決が早い。"},{"q":"PRのdescriptionは日本語で書いていい？","a":"AJのESTでは日本語で書いてOK。ただし英語で書けるなら英語の方がポートフォリオとしての汎用性が上がる。最初は日本語で書き、慣れてきたら英語に挑戦しよう。"}],"checklist":[{"text":"今週の担当Issueを選んでアサインを受けた","role":"coder"},{"text":"featureブランチを作成して作業した","role":"coder"},{"text":"PRにBefore/Afterのスクリーンショットを貼った","role":"coder"},{"text":"PRをレビューしてもらいマージした","role":"coder"},{"text":"#est-学習にPRのURLを共有した","role":"both"}],"refs":[{"title":"GitHub — PRのベストプラクティス","url":"https://docs.github.com/ja/pull-requests/","note":""},{"title":"Chrome DevTools — デバッグ入門","url":"https://developer.chrome.com/docs/devtools/","note":""}],"hint":"「自分でIssueを書く」のが初めては難しい。既存のIssueを3件読んでから書くと書き方の感覚が掴める。今週の一番大事な学びは「ユーザーの声から課題を見つけてコードで解決する」体験そのもの。"},{"id":25,"phase":3,"title":"コードレビューの実践とPR文化","hours":"4〜5","target":"both","prereqs":["Week 24完了（自主課題のPRを出した）","これまでに最低3本のPRを出してマージした","はるのすけからのレビューコメントを受けた経験がある"],"intro":"PRを出すことに慣れてきた今週は「レビューをする側」の視点を学ぶ。良いレビューの書き方・レビュアーとしての考え方を身につけると、自分のPRの質も上がる。チームでのコード開発はレビュー文化が品質を左右する。","goals":["はるのすけに代わって他のESTメンバーのPRにレビューコメントを書ける","良いレビューと悪いレビューの違いを説明できる","自分のPRに対するレビューコメントに適切に応答できる"],"steps":[{"num":"01","title":"良いレビューと悪いレビューの違い","dur":"30分","why":"「コードレビュー」という言葉から「批判の場」を連想することがあるが、本来は「チームで品質を高める場」。良いレビューはコードへの指摘であり、人への批判ではない。この区別が、心理的安全性の高いチームに不可欠。","body":"良いレビューの特徴：①なぜ問題なのかを説明する（×「ここは直して」→ ○「ここはXSS脆弱性になりえます。textContentを使うと安全です」）、②代替案を提案する（×「このコードはわかりにくい」→ ○「この処理をfetchTasksByLC()として切り出すと読みやすくなりそうです」）、③承認するコメントも書く（「この実装スマートですね」「エッジケースよく気づきました」）。\n\n悪いレビューの特徴：①理由なしの却下（「これは違います」）、②人格への批判（「なんでこんなコードを...」）、③圧倒的な指摘量（30件以上のコメント → 修正する気がなくなる）。\n\nコメントの重要度を分類する習慣をつけよう。「必ず修正すべき（blocker）」「できれば修正してほしい（suggestion）」「気になっただけ（nit）」の3段階で書くと、レビュイーが優先順位をつけやすい。","code":"// GitHub PR コメントの書き方例\n\n// ❌ 悪いレビューコメント\n// 「これは間違っています」\n// 「なぜこう書いたの？」\n\n// ✅ 良いレビューコメント例\n\n// [blocker] セキュリティ問題\n// innerHTML にユーザー入力を直接入れると XSS 脆弱性があります。\n// 以下のように textContent を使うことをお勧めします:\n// taskEl.textContent = task.title;\n\n// [suggestion] 可読性の改善\n// この処理は renderTaskList() として切り出すと、\n// displayHITasks() と displayKeioTasks() で再利用できそうです。\n// （今は動いているので必須ではありません）\n\n// [nit] 小さな改善\n// 変数名 tmp よりも filteredTasks の方が\n// 中身がわかりやすいと思いました（任意）\n\n// 承認コメントも大事！\n// この filter + map のチェーンすごく読みやすいです 👍","codeNote":"GitHubのPRでは行コメント（コードの特定の行に対するコメント）とgeneral comment（PR全体へのコメント）の2種類がある。行コメントは「このコードのここが問題」と伝えるのに最適。","mistakes":["コメントを書くとき「批判している」と思われないか不安になる → [suggestion]や[nit]のラベルを付けることで「必須ではない提案」と明示できる。また感謝や承認コメントを混ぜると、指摘のみのPRより受け取りやすい"],"miniEx":"はるのすけからもらったコードレビューコメントを3件選んで、「何を指摘していたか・なぜその指摘なのか」を自分の言葉で説明してみよう。"},{"num":"02","title":"実際にレビューをしてみる","dur":"45分","why":"レビューをすることで「他の人はどう実装するか」「自分が気づかなかった問題点はどこか」という視点が鍛えられる。Phase 3の締めとして、自分がこれまで学んだことを使ってレビュアーとして貢献しよう。","body":"他のESTメンバー（いれば）のPRか、はるのすけが用意した練習用のコード（レビュー練習用のサンプルPR）を見てレビューコメントを書いてみよう。\n\nレビューするときの観点：①動作確認（このコードは仕様を満たしているか）→ ②セキュリティ（Week 16のチェックリストを使う）→ ③可読性（変数名・関数名・コメントは適切か）→ ④エラーハンドリング（異常ケースは考慮されているか）→ ⑤テスト（確認方法がPRに書かれているか）。\n\n最初のレビューは完璧でなくて全然OK。気になった点を1〜2件書くだけでも良い。レビューはスキルなので経験で上達する。","code":null,"codeNote":"コードレビューのコメント数は「多ければ良い」ではない。3〜7件の的確なコメントの方が、30件の細かすぎるコメントより価値がある。","mistakes":["「完璧なレビューを書かないといけない」というプレッシャーで何も書けない → 1件でもいい。「この変数名はわかりにくいと思いました」だけでも立派なレビュー","自分より経験のある人のコードをレビューするのが恥ずかしい → 視点が違うから気づくことがある。遠慮なく書いていい"],"miniEx":"はるのすけに「レビュー練習用のPRを1件作ってください」と依頼して、実際にコードレビューを書いてみよう。"}],"exercise":{"title":"コードレビューの実施とPR文化の定着","desc":"今週はPRを出すのではなく、レビュアーとして貢献することが目標。","items":["はるのすけが用意したレビュー練習用PRに最低3件のコメントを書く","コメントに[blocker]/[suggestion]/[nit]のラベルを付ける","一元化担当：LCメンバー向けの「ツールの使い方Q&A」ドキュメントをNotionに作成する","全員：これまでに受けたレビューコメントのなかで「一番参考になったもの」をSlackに投稿する"],"rubric":["コメントが3件以上ある","[blocker]/[suggestion]/[nit]のラベルが使われている","コメントに理由・代替案が書かれている"]},"faq":[{"q":"レビューするコードが難しくて何もわからない","a":"わからなくても「このコードは何をしているか教えてもらえますか？」という質問コメントを書くことがレビューになる。「理解できなかった」こと自体が「可読性に改善の余地がある」というフィードバックになる。"},{"q":"レビューコメントへの返信はどうすればいい？","a":"「修正しました」「この実装はこういう理由でこうしました」「おっしゃる通りです、修正します」のどれかでOK。コメントに「Resolve conversation」ボタンを押すと解決済みになる。全コメントがresolvedになればマージできる。"}],"checklist":[{"text":"良いレビューと悪いレビューの違いを説明できた","role":"both"},{"text":"練習用PRにコメントを3件以上書いた","role":"coder"},{"text":"コメントに[blocker]/[suggestion]/[nit]のラベルを使った","role":"coder"},{"text":"一元化担当：Q&Aドキュメントを作成した","role":"uni"}],"refs":[{"title":"Google Engineering Practices — コードレビュー","url":"https://google.github.io/eng-practices/review/reviewer/","note":"Google のレビューガイドライン（英語）"},{"title":"コードレビューの心理的安全性","url":"https://mtlynch.io/human-code-reviews-1/","note":"良いレビュアーになるための考え方（英語）"}],"hint":"「レビューをされる」のも「レビューをする」のも両方スキル。今週からレビュアー側の視点が身につくと、自分のPRの質が一段上がる。"},{"id":26,"phase":3,"title":"Phase 3 実力確認","hours":"4〜6","target":"both","prereqs":["Week 19完了","前週の課題を提出済み"],"intro":"Phase 3の最後の週。新しい実装はせず、これまでのPRを振り返って自分の成長を言語化する。GitHubのcontribution graph（緑の芝）を見て、自分が残したものを実感しよう。PRは「何を実装したか」の証拠であり、ポートフォリオになる。","goals":["出したPRを一覧にして成長の軌跡を説明でき、最も難しかったバグのデバッグを実演できる","はるのすけのフィードバックを受けて改善できる","チャンネルに成果物を投稿できる"],"steps":[{"num":"01","title":"作業準備とタスク確認","dur":"20分","why":"「何をするか」を明確にしてから始めることで、作業中の迷子を防げる。","body":"まずはるのすけのIssueリストから今週の課題を確認しよう。担当するIssueにコメントして「アサインをお願いします」と伝える。次にgit pull origin mainで最新のmainを取り込んでから、featureブランチを切る。\n\nブランチ名は「fix/バグの内容」または「feat/機能名」の形式で。例えばfix/login-button-not-workingやfeat/add-lc-filter-button。\n\n作業開始前に「どこを変えるのか」「なぜそこを変えるのか」「完了の条件は何か」を一度文字にしてみよう。これがPRのdescriptionの骨子になる。","code":null,"codeNote":null,"mistakes":["Issueを確認せずに作業を始めて「同じ作業を2人でやっていた」という事態になる → 作業前にIssueにコメントしてアサインを受ける","mainが古い状態でブランチを切る → 作業前に必ずgit pull origin main"],"miniEx":"Issueリストを開いて今週の担当Issueを1件選び、コメントで「取り組みます」と伝えよう。"},{"num":"02","title":"Phase 3 実力確認の本作業","dur":"2〜4時間","why":"「振り返り」は「次のPhaseをより良くするための分析」。自分の成長を数値で把握することで、Phase 4の新機能開発に自信を持って臨める。","body":"GitHubのPR一覧を開いて、自分が出したPRをすべてリストアップしよう。「バグ修正○件・機能追加○件・合計○件」という形でまとめる。各PRのdescriptionを読み直し「あのとき自分はここで詰まっていたな」という視点で振り返ろう。\n\nPhase 3で修正したバグの中から一番苦労したものを選び、はるのすけの前でデバッグのプロセスを説明しよう（15分程度）。「どんな症状だったか → どうconsole.logで絞り込んだか → 何が原因だったか → どう直したか」という流れで話す。\n\n一元化担当はLCへのツール状況報告をまとめよう。「Phase 3でこんな機能が追加されました・こんなバグが直りました」という形で担当エリアのLCに報告する。定期的な報告がツールへのエンゲージメントを高める。","code":null,"codeNote":"Phase 3 実力確認の核心作業。詰まったら早めにはるのすけへ。","mistakes":["PR一覧を振り返らずに「なんとなく成長した気がする」で終わる → 数値（PR数・バグ修正数・機能追加数）で記録することが重要","デバッグ解説をサラッとまとめすぎる → 詰まった時間・試したこと・最終的に気づいたことを具体的に話す"],"miniEx":"30分作業したら一度立ち止まって「今何をしているか・次に何をするか」を確認しよう。"},{"num":"03","title":"PRの作成と提出","dur":"30分","why":"PRのdescriptionに「Before/Afterのスクリーンショット」を貼るだけで、レビュアーへの伝わり方が全然違う。手間でもやる価値がある。","body":"作業が完了したら動作確認をしよう。正常ケース（期待通り動くケース）だけでなく、空入力・ネットワークエラー・ログインしていない状態などの異常ケースも確認する。\n\nスクリーンショットを撮る。UIの変更がある場合はBefore（修正前）とAfter（修正後）の両方。Before画像は作業前に撮っておかないと後から作れないので要注意。\n\nPRのdescriptionに「変更内容・理由・確認方法・スクリーンショット」を書いて提出。はるのすけをレビュアーに指定する。","code":null,"codeNote":"descriptionのスクリーンショットはGitHubにドラッグ&ドロップで貼り付けられる。","mistakes":["Before画像を撮り忘れる → 作業前に必ずスクリーンショットを撮る習慣をつける","正常ケースしか確認しない → 空入力・エラー状態などの異常ケースも確認する"],"miniEx":"PRを提出したらSlackの#est-学習チャンネルにPRのURLを貼って「PRを出しました」と報告しよう。"}],"exercise":{"title":"Phase 3 実力確認 演習課題","desc":"今週のテーマ「Phase 3 実力確認」に沿って成果物を作成し、PRとして提出しよう。","items":["出したPRを一覧にまとめた（最低4本）","一番難しかったバグのデバッグ解説をはるのすけに実施した","エラーメモが1件以上ある","担当LCへのツール状況報告をまとめた","Phase 4でやりたいことの提案を1件送った"],"rubric":["featureブランチが作成されている","PRのdescriptionに変更内容・理由・確認方法が書かれている","スクリーンショットがPRに貼られている","レビューを受けてマージされた"]},"faq":[{"q":"詰まったとき何をすれば一番早いか","a":"①エラーメッセージをそのままGoogleで検索する、②console.logを追加して問題の箇所を絞り込む、③30分調べてもわからなければはるのすけに「○○をしようとして○○というエラーが出ます」という形で聞く。「どこかわからない」より「ここがわからない」と聞ける方が解決が早い。"},{"q":"PRのdescriptionは日本語で書いていい？","a":"AJのESTでは日本語で書いてOK。ただし英語で書けるなら英語の方がポートフォリオとしての汎用性が上がる。最初は日本語で書き、慣れてきたら英語に挑戦しよう。"}],"checklist":[{"text":"今週の担当Issueを選んでアサインを受けた","role":"coder"},{"text":"featureブランチを作成して作業した","role":"coder"},{"text":"PRにBefore/Afterのスクリーンショットを貼った","role":"coder"},{"text":"PRをレビューしてもらいマージした","role":"coder"},{"text":"#est-学習にPRのURLを共有した","role":"both"}],"refs":[{"title":"GitHub — PRのベストプラクティス","url":"https://docs.github.com/ja/pull-requests/","note":""},{"title":"Chrome DevTools — デバッグ入門","url":"https://developer.chrome.com/docs/devtools/","note":""}],"hint":"GitHubのcontribution graphが緑になっているはず。それがPhase 3の証拠。コードで残したものは永遠に残る。"},{"id":27,"phase":4,"title":"新機能開発への参加","hours":"8〜10","target":"coder","prereqs":["Week 20完了","前週の課題を提出済み"],"intro":"Phase 4はESTとしての集大成。今週は機能追加の規模を上げ、要件定義からFirestoreの設計・実装・リリースまでを通しで経験する。「仕様を決める」のは意外と難しい。はるのすけと一緒に「誰のための機能か・どうあれば完了か」を言語化するところから始めよう。","goals":["要件定義を言語化しFirestoreのコレクション設計を提案して実装・リリースまで完結できる","はるのすけのフィードバックを受けて改善できる","チャンネルに成果物を投稿できる"],"steps":[{"num":"01","title":"作業準備とタスク確認","dur":"20分","why":"「何をするか」を明確にしてから始めることで、作業中の迷子を防げる。","body":"まずはるのすけのIssueリストから今週の課題を確認しよう。担当するIssueにコメントして「アサインをお願いします」と伝える。次にgit pull origin mainで最新のmainを取り込んでから、featureブランチを切る。\n\nブランチ名は「fix/バグの内容」または「feat/機能名」の形式で。例えばfix/login-button-not-workingやfeat/add-lc-filter-button。\n\n作業開始前に「どこを変えるのか」「なぜそこを変えるのか」「完了の条件は何か」を一度文字にしてみよう。これがPRのdescriptionの骨子になる。","code":null,"codeNote":null,"mistakes":["Issueを確認せずに作業を始めて「同じ作業を2人でやっていた」という事態になる → 作業前にIssueにコメントしてアサインを受ける","mainが古い状態でブランチを切る → 作業前に必ずgit pull origin main"],"miniEx":"Issueリストを開いて今週の担当Issueを1件選び、コメントで「取り組みます」と伝えよう。"},{"num":"02","title":"新機能開発への参加の本作業","dur":"2〜4時間","why":"「要件が曖昧なまま実装に入る」のが最大の手戻りの原因。要件定義のプロセスを体験することで、後のキャリアでのエンジニアと非エンジニアの対話が劇的にうまくなる。","body":"「誰が・いつ・何のために・何をすると・どうなるか」を箇条書きで書き出す。曖昧な表現（「使いやすくする」など）は具体的な行動（「1クリックで○○できる」）に置き換える。完了条件が明確になったら、Firestoreにどんなデータを追加する必要があるかを設計する。\n\nFirestoreのコレクション設計は「既存のコレクションに追加するか・新しいコレクションを作るか」「フィールドの型（string / number / boolean / timestamp）」「データの更新パターン（上書きか追記か）」を考え、図に描いてはるのすけに提案する。設計OKが出たら実装に入る。\n\n実装完了後は自分でテストをして（正常・異常・エッジケース）、PRを出してマージ。マージ後は担当LCにリリースアナウンスをSlackで送ろう。","code":"// Firestore のコレクション設計提案の書き方例\n\n// 機能: LC間の応援メッセージ機能\n// コレクション: messages\n//   ドキュメント: [自動ID]\n//     fromLcId: string（送り手のLC ID）\n//     toLcId:   string（受け手のLC ID）\n//     content:  string（本文、最大200文字）\n//     createdAt: timestamp\n//     isRead:   boolean（既読フラグ）\n\n// アクセスパターン:\n// ① toLcId == 自分のLCID の未読メッセージを取得\n// query(collection(db,'messages'),\n//   where('toLcId','==',myLcId),\n//   where('isRead','==',false),\n//   orderBy('createdAt','desc'))\n\n// ② メッセージを送信\n// await addDoc(collection(db,'messages'), {\n//   fromLcId, toLcId, content,\n//   createdAt: serverTimestamp(),\n//   isRead: false\n// });","codeNote":"新機能開発への参加の核心作業。詰まったら早めにはるのすけへ。","mistakes":["要件の確認なしに実装に入る → 「仕様の確認→実装」の順番を守る。実装後の仕様変更は2倍の時間がかかる","Firestoreの設計がアプリの使い方と合っていない → 「どうデータを読み取るか（クエリ）」から逆算してデータ構造を設計する"],"miniEx":"30分作業したら一度立ち止まって「今何をしているか・次に何をするか」を確認しよう。"},{"num":"03","title":"PRの作成と提出","dur":"30分","why":"PRのdescriptionに「Before/Afterのスクリーンショット」を貼るだけで、レビュアーへの伝わり方が全然違う。手間でもやる価値がある。","body":"作業が完了したら動作確認をしよう。正常ケース（期待通り動くケース）だけでなく、空入力・ネットワークエラー・ログインしていない状態などの異常ケースも確認する。\n\nスクリーンショットを撮る。UIの変更がある場合はBefore（修正前）とAfter（修正後）の両方。Before画像は作業前に撮っておかないと後から作れないので要注意。\n\nPRのdescriptionに「変更内容・理由・確認方法・スクリーンショット」を書いて提出。はるのすけをレビュアーに指定する。","code":null,"codeNote":"descriptionのスクリーンショットはGitHubにドラッグ&ドロップで貼り付けられる。","mistakes":["Before画像を撮り忘れる → 作業前に必ずスクリーンショットを撮る習慣をつける","正常ケースしか確認しない → 空入力・エラー状態などの異常ケースも確認する"],"miniEx":"PRを提出したらSlackの#est-学習チャンネルにPRのURLを貼って「PRを出しました」と報告しよう。"}],"exercise":{"title":"新機能開発への参加 演習課題","desc":"今週のテーマ「新機能開発への参加」に沿って成果物を作成し、PRとして提出しよう。","items":["要件を箇条書きで書いてはるのすけの合意を得た","Firestoreコレクション設計を図で描いて確認した","実装・テスト・PR提出・マージした","担当LCにリリースアナウンスを送った"],"rubric":["featureブランチが作成されている","PRのdescriptionに変更内容・理由・確認方法が書かれている","スクリーンショットがPRに貼られている","レビューを受けてマージされた"]},"faq":[{"q":"詰まったとき何をすれば一番早いか","a":"①エラーメッセージをそのままGoogleで検索する、②console.logを追加して問題の箇所を絞り込む、③30分調べてもわからなければはるのすけに「○○をしようとして○○というエラーが出ます」という形で聞く。「どこかわからない」より「ここがわからない」と聞ける方が解決が早い。"},{"q":"PRのdescriptionは日本語で書いていい？","a":"AJのESTでは日本語で書いてOK。ただし英語で書けるなら英語の方がポートフォリオとしての汎用性が上がる。最初は日本語で書き、慣れてきたら英語に挑戦しよう。"}],"checklist":[{"text":"今週の担当Issueを選んでアサインを受けた","role":"coder"},{"text":"featureブランチを作成して作業した","role":"coder"},{"text":"PRにBefore/Afterのスクリーンショットを貼った","role":"coder"},{"text":"PRをレビューしてもらいマージした","role":"coder"},{"text":"#est-学習にPRのURLを共有した","role":"both"}],"refs":[{"title":"GitHub — PRのベストプラクティス","url":"https://docs.github.com/ja/pull-requests/","note":""},{"title":"Chrome DevTools — デバッグ入門","url":"https://developer.chrome.com/docs/devtools/","note":""}],"hint":"「仕様が曖昧なまま実装に入る」のが手戻りの最大原因。実装の前に「完了条件は何か」をはるのすけと合意することを怠らないでほしい。"},{"id":28,"phase":4,"title":"ドキュメント整備","hours":"6〜8","target":"both","prereqs":["Week 21完了","前週の課題を提出済み"],"intro":"コードが動いていてもドキュメントがなければ次の担当者は何もできない。「自分が抜けた瞬間にツールが誰も触れないものになる」を防ぐのがこの週のミッション。コーダーはコードコメントとHANDOVER.md、一元化担当はREADMEとLCマニュアルを完成させよう。","goals":["担当コードにわかりやすいコメントを追記し、次の担当者向けのHANDOVER.mdを書ける","はるのすけのフィードバックを受けて改善できる","チャンネルに成果物を投稿できる"],"steps":[{"num":"01","title":"作業準備とタスク確認","dur":"20分","why":"「何をするか」を明確にしてから始めることで、作業中の迷子を防げる。","body":"まずはるのすけのIssueリストから今週の課題を確認しよう。担当するIssueにコメントして「アサインをお願いします」と伝える。次にgit pull origin mainで最新のmainを取り込んでから、featureブランチを切る。\n\nブランチ名は「fix/バグの内容」または「feat/機能名」の形式で。例えばfix/login-button-not-workingやfeat/add-lc-filter-button。\n\n作業開始前に「どこを変えるのか」「なぜそこを変えるのか」「完了の条件は何か」を一度文字にしてみよう。これがPRのdescriptionの骨子になる。","code":null,"codeNote":null,"mistakes":["Issueを確認せずに作業を始めて「同じ作業を2人でやっていた」という事態になる → 作業前にIssueにコメントしてアサインを受ける","mainが古い状態でブランチを切る → 作業前に必ずgit pull origin main"],"miniEx":"Issueリストを開いて今週の担当Issueを1件選び、コメントで「取り組みます」と伝えよう。"},{"num":"02","title":"ドキュメント整備の本作業","dur":"2〜4時間","why":"ドキュメントは「未来の自分や次の担当者へのラブレター」。書くのが面倒でも、6ヶ月後に自分がそのコードを見たとき、あるいは次の担当者がオンボーディングするときに何倍も助かる。","body":"コードコメントを整備しよう。「何をしているか」だけでなく「なぜそう書いたか」も書くと次の人に伝わりやすい。特に「なんでこんな書き方なの？」と思われそうな箇所・複雑な条件分岐・Firestoreの特定のクエリには説明コメントを入れよう。\n\nHANDOVER.mdをdocsフォルダに作成しよう。書くべき内容：①このプロジェクトの概要（2〜3行）、②開発環境のセットアップ手順、③主要なファイルの説明、④よくある詰まりポイントとその解決法、⑤今後の改善・TODO、⑥連絡先（はるのすけのSlack ID）。\n\n一元化担当はREADMEを最新状態に更新し、LCユーザー向けの操作マニュアルをスクリーンショット付きで作成しよう。「このボタンを押すと何が起きるか」を1ステップずつ説明するマニュアルが、LCメンバーのツール活用を促進する。","code":"// コードコメントの良い例と悪い例\n\n// ❌ 悪い例（コードを読めばわかることを書いても意味がない）\n// ユーザーをログアウトする\nconst handleLogout = async () => {\n  await signOut(auth);\n};\n\n// ✅ 良い例（なぜそうしているかを書く）\n// ログアウト後にFirestoreのリスナーをすべて解除する\n// （解除しないとメモリリークが発生する）\nconst handleLogout = async () => {\n  unsubscribeAll(); // onSnapshotリスナーを解除\n  await signOut(auth);\n  window.location.href = '/login'; // ログインページにリダイレクト\n};\n\n// HANDOVER.md のテンプレート\n// # lc-tracker 引き継ぎメモ\n// ## 概要\n// ## セットアップ手順\n// ## ファイル構成\n// ## よくあるエラーと解決法\n// ## TODO・改善候補\n// ## 連絡先","codeNote":"ドキュメント整備の核心作業。詰まったら早めにはるのすけへ。","mistakes":["コードコメントを「後でまとめて書く」と先延ばしにする → 実装直後が最も記憶が新鮮。今週がコメントを書く最適なタイミング","HANDOVER.mdに書いた内容が古い・不正確 → 実際にセットアップ手順を一度自分で実行してみて動くことを確認してから書く"],"miniEx":"30分作業したら一度立ち止まって「今何をしているか・次に何をするか」を確認しよう。"},{"num":"03","title":"PRの作成と提出","dur":"30分","why":"PRのdescriptionに「Before/Afterのスクリーンショット」を貼るだけで、レビュアーへの伝わり方が全然違う。手間でもやる価値がある。","body":"作業が完了したら動作確認をしよう。正常ケース（期待通り動くケース）だけでなく、空入力・ネットワークエラー・ログインしていない状態などの異常ケースも確認する。\n\nスクリーンショットを撮る。UIの変更がある場合はBefore（修正前）とAfter（修正後）の両方。Before画像は作業前に撮っておかないと後から作れないので要注意。\n\nPRのdescriptionに「変更内容・理由・確認方法・スクリーンショット」を書いて提出。はるのすけをレビュアーに指定する。","code":null,"codeNote":"descriptionのスクリーンショットはGitHubにドラッグ&ドロップで貼り付けられる。","mistakes":["Before画像を撮り忘れる → 作業前に必ずスクリーンショットを撮る習慣をつける","正常ケースしか確認しない → 空入力・エラー状態などの異常ケースも確認する"],"miniEx":"PRを提出したらSlackの#est-学習チャンネルにPRのURLを貼って「PRを出しました」と報告しよう。"}],"exercise":{"title":"ドキュメント整備 演習課題","desc":"今週のテーマ「ドキュメント整備」に沿って成果物を作成し、PRとして提出しよう。","items":["担当コードのコメントを整備した（なぜそう書いたかまで）","docs/HANDOVER.mdを作成した","一元化：全ツールのREADMEを最新状態に更新した","一元化：LCユーザー向けマニュアルをスクリーンショット付きで作成した","ツール棚卸しシート最終版を完成させた"],"rubric":["featureブランチが作成されている","PRのdescriptionに変更内容・理由・確認方法が書かれている","スクリーンショットがPRに貼られている","レビューを受けてマージされた"]},"faq":[{"q":"詰まったとき何をすれば一番早いか","a":"①エラーメッセージをそのままGoogleで検索する、②console.logを追加して問題の箇所を絞り込む、③30分調べてもわからなければはるのすけに「○○をしようとして○○というエラーが出ます」という形で聞く。「どこかわからない」より「ここがわからない」と聞ける方が解決が早い。"},{"q":"PRのdescriptionは日本語で書いていい？","a":"AJのESTでは日本語で書いてOK。ただし英語で書けるなら英語の方がポートフォリオとしての汎用性が上がる。最初は日本語で書き、慣れてきたら英語に挑戦しよう。"}],"checklist":[{"text":"今週の担当Issueを選んでアサインを受けた","role":"coder"},{"text":"featureブランチを作成して作業した","role":"coder"},{"text":"PRにBefore/Afterのスクリーンショットを貼った","role":"coder"},{"text":"PRをレビューしてもらいマージした","role":"coder"},{"text":"#est-学習にPRのURLを共有した","role":"both"}],"refs":[{"title":"GitHub — PRのベストプラクティス","url":"https://docs.github.com/ja/pull-requests/","note":""},{"title":"Chrome DevTools — デバッグ入門","url":"https://developer.chrome.com/docs/devtools/","note":""}],"hint":"ドキュメントは自分のためでもある。1年後に戻ってきたとき助かるのは自分。「次の人のため」と「未来の自分のため」の両方のために丁寧に書こう。"},{"id":29,"phase":4,"title":"引き継ぎ設計","hours":"6〜8","target":"both","prereqs":["Week 22完了","前週の課題を提出済み"],"intro":"このESTが2627で終わらないために。「次の人が同じところからスタートできる」状態を作ることが今週の最重要ミッション。EST応募を検討している2728 IMエリアメンバーに向けた案内も、この週で作成・展開しよう。","goals":["自分がいなくなったら止まるものをリストアップし、コードウォークスルーを実施してESTスタートアップガイドを作れる","はるのすけのフィードバックを受けて改善できる","チャンネルに成果物を投稿できる"],"steps":[{"num":"01","title":"作業準備とタスク確認","dur":"20分","why":"「何をするか」を明確にしてから始めることで、作業中の迷子を防げる。","body":"まずはるのすけのIssueリストから今週の課題を確認しよう。担当するIssueにコメントして「アサインをお願いします」と伝える。次にgit pull origin mainで最新のmainを取り込んでから、featureブランチを切る。\n\nブランチ名は「fix/バグの内容」または「feat/機能名」の形式で。例えばfix/login-button-not-workingやfeat/add-lc-filter-button。\n\n作業開始前に「どこを変えるのか」「なぜそこを変えるのか」「完了の条件は何か」を一度文字にしてみよう。これがPRのdescriptionの骨子になる。","code":null,"codeNote":null,"mistakes":["Issueを確認せずに作業を始めて「同じ作業を2人でやっていた」という事態になる → 作業前にIssueにコメントしてアサインを受ける","mainが古い状態でブランチを切る → 作業前に必ずgit pull origin main"],"miniEx":"Issueリストを開いて今週の担当Issueを1件選び、コメントで「取り組みます」と伝えよう。"},{"num":"02","title":"引き継ぎ設計の本作業","dur":"2〜4時間","why":"「自分がいないと動かない」状態は組織として脆弱。引き継ぎ設計を丁寧にやることで、ESTが継続的なプログラムとして定着する。これが個人ではなく組織としての成果になる。","body":"「自分がいなくなったら止まるもの」をすべて列挙しよう。Firestoreのアクセス権限・GitHub Organizationへの招待・定期的なメンテナンス作業・ドキュメントの更新権限・LC対応の窓口など。一つひとつについて「誰に・いつ・どうやって引き継ぐか」を書く。\n\n2728のEST候補者（または新入生）を相手に1時間のコードウォークスルーを実施しよう。「このツールはこういう仕組みで動いている」「最初につまずきやすいのはここ」を伝える。Week 1のオンボーディングに戻ったつもりで、初めて見る人の視点で話すのがコツ。\n\nESTスタートアップガイドを作ろう。「Week 0でやること・Week 1でやること・最初の2週間の流れ」を書いた1〜2ページのガイド。このカリキュラムのWeek 0を自分の経験を踏まえて書き直したものになるはず。「これがあったら最初の自分は助かった」という内容を心がけて。","code":null,"codeNote":"引き継ぎ設計の核心作業。詰まったら早めにはるのすけへ。","mistakes":["引き継ぎリストを「主なものだけ」にしてしまう → 「自分がいなくなったら止まるか止まらないか」という基準で漏れなくリストアップする。些細に見えることでも書く","コードウォークスルーを自分視点でやってしまう → 「初めて見る人の視点」で話す。自分にとって当たり前のことでも相手は知らないと思って丁寧に"],"miniEx":"30分作業したら一度立ち止まって「今何をしているか・次に何をするか」を確認しよう。"},{"num":"03","title":"PRの作成と提出","dur":"30分","why":"PRのdescriptionに「Before/Afterのスクリーンショット」を貼るだけで、レビュアーへの伝わり方が全然違う。手間でもやる価値がある。","body":"作業が完了したら動作確認をしよう。正常ケース（期待通り動くケース）だけでなく、空入力・ネットワークエラー・ログインしていない状態などの異常ケースも確認する。\n\nスクリーンショットを撮る。UIの変更がある場合はBefore（修正前）とAfter（修正後）の両方。Before画像は作業前に撮っておかないと後から作れないので要注意。\n\nPRのdescriptionに「変更内容・理由・確認方法・スクリーンショット」を書いて提出。はるのすけをレビュアーに指定する。","code":null,"codeNote":"descriptionのスクリーンショットはGitHubにドラッグ&ドロップで貼り付けられる。","mistakes":["Before画像を撮り忘れる → 作業前に必ずスクリーンショットを撮る習慣をつける","正常ケースしか確認しない → 空入力・エラー状態などの異常ケースも確認する"],"miniEx":"PRを提出したらSlackの#est-学習チャンネルにPRのURLを貼って「PRを出しました」と報告しよう。"}],"exercise":{"title":"引き継ぎ設計 演習課題","desc":"今週のテーマ「引き継ぎ設計」に沿って成果物を作成し、PRとして提出しよう。","items":["引き継ぎリストを文書化した（止まるもの・引き継ぎ先・方法）","コードウォークスルーを1時間実施した","ESTスタートアップガイドを作成した","2728 ESTアプライ案内資料を作成した（一元化担当）","2728 IMエリアメンバーに案内を届けた（一元化担当）"],"rubric":["featureブランチが作成されている","PRのdescriptionに変更内容・理由・確認方法が書かれている","スクリーンショットがPRに貼られている","レビューを受けてマージされた"]},"faq":[{"q":"詰まったとき何をすれば一番早いか","a":"①エラーメッセージをそのままGoogleで検索する、②console.logを追加して問題の箇所を絞り込む、③30分調べてもわからなければはるのすけに「○○をしようとして○○というエラーが出ます」という形で聞く。「どこかわからない」より「ここがわからない」と聞ける方が解決が早い。"},{"q":"PRのdescriptionは日本語で書いていい？","a":"AJのESTでは日本語で書いてOK。ただし英語で書けるなら英語の方がポートフォリオとしての汎用性が上がる。最初は日本語で書き、慣れてきたら英語に挑戦しよう。"}],"checklist":[{"text":"今週の担当Issueを選んでアサインを受けた","role":"coder"},{"text":"featureブランチを作成して作業した","role":"coder"},{"text":"PRにBefore/Afterのスクリーンショットを貼った","role":"coder"},{"text":"PRをレビューしてもらいマージした","role":"coder"},{"text":"#est-学習にPRのURLを共有した","role":"both"}],"refs":[{"title":"GitHub — PRのベストプラクティス","url":"https://docs.github.com/ja/pull-requests/","note":""},{"title":"Chrome DevTools — デバッグ入門","url":"https://developer.chrome.com/docs/devtools/","note":""}],"hint":"スタートアップガイドは「次の自分への手紙」。今週の自分が1年前の自分に何を伝えたいかを書こう。"},{"id":30,"phase":4,"title":"最終発表・クロージング","hours":"4〜6","target":"both","prereqs":["Week 23完了（引き継ぎドキュメントが揃っている）","24週間のPR・コミット履歴がある","最終レポートを書く準備ができている"],"intro":"24週間のプログラムの最終週。新しいことを学ぶ週ではなく、積み上げてきたものを整理して次に渡す週。GitHubのcontribution graphを見て、自分が残したものを実感しよう。このESTが2728以降も続くかどうかは、あなたが「次の人に渡せたか」にかかっている。","goals":["24週間の成果（PR数・バグ修正数・機能追加数）を一覧で提示できる","最終発表（15分）を実施できる","引き継ぎドキュメントがすべて最終完成状態になっている"],"steps":[{"num":"01","title":"24週間の成果をまとめる","dur":"45分","why":"数値で成果を可視化することで「自分はこれだけやった」という自信と、「次の担当者に引き渡す責任」が明確になる。この数値集計がそのまま最終発表の骨子になる。","body":"GitHubのPR一覧・コミット履歴・クローズしたIssue数を確認して、24週間の成果を数値でまとめよう。「PR ○本・バグ修正 ○件・機能追加 ○件・エラーメモ ○件・ドキュメント ○件」という形で書き出す。\n\nGitHubのプロフィールページを開くと「contribution graph」が表示される。24週間のコミット数が緑のマス目で可視化されている。これがこの半年のあなたの活動の証拠。\n\n一元化担当はLCとのやり取り数・ヒアリング件数・展開したマニュアルのページ数をまとめよう。コードを書かない担当だからこそ「どれだけLCと連携したか」が成果の指標になる。","code":"# GitHub で成果を確認するコマンド\n\n# 自分が作成したPRの一覧（GitHub CLI）\ngh pr list --state merged --author @me\n\n# コミット数（特定の期間）\ngit log --oneline --author=\"自分の名前\" | wc -l\n\n# ファイルへの貢献量\ngit log --stat --author=\"自分の名前\" | grep \"+\"\n\n# GitHub プロフィールの contribution graph:\n# https://github.com/自分のユーザー名\n# 右上の緑のマス目が今週までのコミット履歴","codeNote":"GitHubの草（contribution graph）を緑にすることが目的ではなく、「コードを継続的に書いた証拠」として自然と緑になっているのが理想。強制的に草を生やすコミットは意味がない。","mistakes":["成果を過小評価する → 「バグ修正1件だけ」でも立派な成果。そのバグ修正でLCメンバーが快適に作業できるようになったことを忘れずに","成果を数値だけで語る → 数値に「どんな影響を与えたか（LCのツール活用率が上がった等）」という文脈を添えると発表が深くなる"],"miniEx":"今すぐGitHubのPRタブを開いて「Merged」のPR一覧を表示しよう。何件あるか数えてSlackにメモを送ってみる。"},{"num":"02","title":"最終発表を実施する","dur":"60分","why":"「発表する」という体験は、学んだことを整理して言語化する最高の機会。聞く人に伝わるように構成を考えることで、自分の理解がさらに深まる。","body":"はるのすけ（と可能なら他のMCメンバー）の前で、24週間の活動を15分程度でプレゼンしよう。スライド（Google Slides）を使ってもいいし、GitHubのページを直接見せながら話してもいい。\n\n発表の構成（目安）：①自己紹介・担当（1分）→ ②Phase 1-4の振り返り（各2分）→ ③最も難しかった課題とどう乗り越えたか（3分）→ ④残せたもの・引き継いだもの（2分）→ ⑤次の担当者へのメッセージ（1分）。\n\n「やったこと・難しかったこと・残せたもの・次年度に伝えたいこと」の4点で構成すると話しやすい。完璧なプレゼンでなくていい。「自分の言葉で24週間を語れる」ことが大切。","code":null,"codeNote":"発表後に質問を受けよう。「なぜその技術を選んだのか」「一番苦労したのはどこか」「次の担当者に一番伝えたいことは何か」という質問が来やすい。","mistakes":["発表をスキップして最終レポートだけ送って終わりにする → 発表することで24週間が「完結」する。省略しないで"],"miniEx":"今すぐ発表のアウトラインを3分で書いてみよう。4つの章（振り返り・難しかったこと・残せたもの・メッセージ）のそれぞれに1〜2行書く。"},{"num":"03","title":"最終レポートを提出する","dur":"30分","why":"最終レポートは自分のための記録でもある。6ヶ月後・1年後に読み返すと「あのとき自分はここで詰まっていたんだな」「ずいぶん成長したな」と実感できる。","body":"「このESTで得たもの・残したもの」を1ページのレポートにまとめてはるのすけに送ろう。形式は自由（Notion・Google Doc・Markdownなんでも）。\n\n書いてほしい内容：①数値の成果（PR数・機能追加数など）、②一番難しかった技術的課題とその解決、③プログラミング・ツール開発・チーム開発について学んだこと、④次の担当者への3つのアドバイス、⑤AIESECの活動を通じてどう成長したか（技術以外でも）。\n\n数値だけでなく「自分がどう変わったか」という主観的な成長も書いてほしい。「エンジニアリングが少し怖くなくなった」「コードを読めるようになって組織の課題解決に自信が持てた」のような変化は、数値には出ない大切な成長。","code":null,"codeNote":"レポートは「ここに置いておきます」でなく「こういうことを学んだ・感じた」という一人称で書こう。報告書ではなく「振り返りの手紙」のつもりで書くと良いものになる。","mistakes":["レポートを箇条書きだけで終わらせる → 少し文章で書く部分も入れてほしい。「なぜそう感じたか」というコンテキストが大事"],"miniEx":"最終レポートの最初の1段落（3〜4文）を今すぐ書いてみよう。「このESTを通じて一番成長したと感じることは...」から書き始めると書きやすい。"}],"exercise":{"title":"最終発表 + レポート提出 + 引き継ぎ完了","desc":"24週間の締めくくりとして、以下をすべて完了させてESTを完結させよう。","items":["24週間の成果一覧（PR数・機能追加数・エラーメモ数など）を作成","最終発表（15分）を実施","引き継ぎドキュメント・HANDOVER.md・マニュアルが最終完成状態になっていることを確認","2728 EST候補者へのアプライ案内を届けた確認","最終レポート（1ページ）を提出"],"rubric":["PR一覧が数値で示されている","最終発表を実施した（スクリーンショットをSlackに投稿）","HANDOVER.mdがリポジトリにある","最終レポートを提出した","2728への案内が届いている（一元化担当）"]},"faq":[{"q":"最終発表は何分くらい話せばいい？","a":"目安は15〜20分。短すぎると24週間の学びが伝わらないし、長すぎると相手も疲れる。スライド6〜8枚を1〜2分ずつ話す構成がちょうどいい。質疑応答含めて30分以内に収まるイメージ。"},{"q":"24週間でPRが少なかった場合、成果が少ないと感じてしまう","a":"PR数だけが成果ではない。コードを読めるようになったこと、バグを特定できるようになったこと、Gitの操作に慣れたこと、LCとのコミュニケーションができたこと、ドキュメントを整備したこと——これらはすべて価値のある成果。「プログラミングが少し怖くなくなった」だけでも、このESTの大きな成功。"},{"q":"ESTが終わった後もAJのツール開発に携われる？","a":"もちろん！ESTは「AJのデジタルインフラを担えるエンジニアを育てる」ためのプログラム。終了後は通常のIM担当として、または次のEST担当として継続して関わっていってほしい。はるのすけに「引き続き関わりたい」と伝えてもらえれば連携の形を一緒に考える。"}],"checklist":[{"text":"24週間の成果を数値でまとめた（PR数・機能追加数・エラーメモ数）","role":"both"},{"text":"最終発表を実施した","role":"both"},{"text":"HANDOVER.mdがリポジトリにコミットされている","role":"coder"},{"text":"LCユーザー向けマニュアルが最新版になっている","role":"uni"},{"text":"2728 EST候補者へのアプライ案内を届けた","role":"uni"},{"text":"最終レポートをはるのすけに提出した","role":"both"}],"refs":[{"title":"GitHub プロフィール（contribution graph確認）","url":"https://github.com/","note":"自分のユーザー名でアクセス"},{"title":"GitHub — 過去のPR一覧確認","url":"https://github.com/pulls","note":"自分が出した全PRを確認できる"}],"hint":"「このESTが続くかどうかは、あなたが次の人に渡せたかにかかっている」。24週間、本当によく頑張った。お疲れ様でした。"}];
const st={current:null,currentType:'week',checked:{}};

function buildNav(){
  const tree=document.getElementById('nav-tree');
  tree.innerHTML='';

  // Week 0 (onboarding) - special item
  const w0grp=document.createElement('div');
  w0grp.className='ph-group';
  const w0h=document.createElement('div');
  w0h.className='ph-head';
  w0h.innerHTML='<span class="ph-dot dot-p0"></span>スタート';
  w0grp.appendChild(w0h);
  const w0a=document.createElement('div');
  w0a.className='wk-link wk-p0';
  w0a.id='nav-w0';
  w0a.innerHTML='<span class="wk-n">W00</span><span class="wk-name">オンボーディング</span>';
  w0a.addEventListener('click',()=>showWeek(0));
  w0grp.appendChild(w0a);
  tree.appendChild(w0grp);

  // Phases 1-4
  PHASES.filter(p=>p.id>=1).forEach(ph=>{
    const grp=document.createElement('div');
    grp.className='ph-group';
    const head=document.createElement('div');
    head.className='ph-head';
    head.innerHTML=`<span class="ph-dot ${ph.dotClass}"></span>${ph.label} — ${ph.title}`;
    grp.appendChild(head);
    WEEKS.filter(w=>w.phase===ph.id).forEach(w=>{
      const a=document.createElement('div');
      a.className=`wk-link ${ph.weekClass}`;
      a.id=`nav-w${w.id}`;
      a.innerHTML=`<span class="wk-n">W${String(w.id).padStart(2,'0')}</span><span class="wk-name">${w.title}</span>`;
      a.addEventListener('click',()=>showWeek(w.id));
      grp.appendChild(a);
    });
    tree.appendChild(grp);
  });

  // Reference pages
  const refs=[
    {id:'ext',label:'VS Code 拡張機能'},
    {id:'sc',label:'ショートカット集'},
    {id:'cmd',label:'コマンド集'},
  ];
  const rgrp=document.createElement('div');
  rgrp.className='ph-group';
  const rh=document.createElement('div');
  rh.className='ph-head';
  rh.innerHTML='<span class="ph-dot" style="background:#666"></span>リファレンス';
  rgrp.appendChild(rh);
  refs.forEach(r=>{
    const a=document.createElement('div');
    a.className='wk-link wk-ref';
    a.id=`nav-ref-${r.id}`;
    a.innerHTML=`<span class="wk-n ref-icon">&#x1F4D6;</span><span class="wk-name">${r.label}</span>`;
    a.addEventListener('click',()=>showRef(r.id));
    rgrp.appendChild(a);
  });
  tree.appendChild(rgrp);
}

function showWelcome(){
  const c=document.getElementById('content');
  const totalChk=WEEKS.reduce((s,w)=>s+(w.checklist?w.checklist.length:0),0);
  const done=Object.values(st.checked).filter(Boolean).length;
  let pHTML=PHASES.filter(p=>p.id>=1).map(ph=>`
    <div class="ph-card" onclick="showWeek(${WEEKS.find(w=>w.phase===ph.id).id})">
      <div class="ph-card-num ${ph.colorClass}">P${ph.id}</div>
      <div>
        <div class="ph-card-title">${ph.label} — ${ph.title}</div>
        <div class="ph-card-goal">${ph.goal}</div>
        <div class="ph-card-meta">${ph.weeks}週間</div>
      </div>
    </div>`).join('');
  c.innerHTML=`
    <div class="wlc-eyebrow">AIESEC Japan 2627</div>
    <h1 class="wlc-title">Entity Support Team<br>カリキュラム</h1>
    <p class="wlc-desc">AJのツール（Action Tracker・Pakuri Tracker）を「読める・触れる・担える」状態になるための30週間プログラム。プログラミング未経験からスタートし、実際に使われているプロダクトの開発経験を積む。</p>
    <div class="wlc-stats">
      <div><div class="wlc-stat-val">24</div><div class="wlc-stat-lbl">週間</div></div>
      <div><div class="wlc-stat-val">${totalChk}</div><div class="wlc-stat-lbl">チェック項目</div></div>
      <div><div class="wlc-stat-val">${done}</div><div class="wlc-stat-lbl">完了済み</div></div>
    </div>
    <div style="background:#F0FBF5;border:1px solid #A8DDB8;border-left:3px solid #00875A;padding:14px 18px;margin-bottom:32px">
      <div style="font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#00875A;margin-bottom:5px">まず最初に</div>
      <div style="font-size:13px;color:#1A4030;line-height:1.75">「Week 0 オンボーディング」から始めよう。VS Codeの拡張機能・ターミナル・ショートカット・SSH認証を最初に整えておくと、その後の30週間の効率が大きく変わる。</div>
      <button onclick="showWeek(0)" style="margin-top:10px;font-family:inherit;font-size:12px;padding:7px 14px;border:1px solid #00875A;background:#00875A;color:#fff;cursor:pointer">Week 0 から始める →</button>
    </div>
    <div class="ph-cards">${pHTML}</div>`;
}

function showWeek(id){
  document.querySelectorAll('.wk-link').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById(`nav-w${id}`);
  if(nav){nav.classList.add('active');nav.scrollIntoView({block:'nearest'});}

  const w=WEEKS.find(x=>x.id===id);
  if(!w)return;
  st.current=id; st.currentType='week';
  const ph=PHASES.find(p=>p.id===w.phase);
  const roleLabel={both:'コーダー / 一元化',coder:'コーダー担当',uni:'一元化担当'};
  const roleMap={both:'r-b',coder:'r-c',uni:'r-u'};
  const roleText={both:'共通',coder:'coder',uni:'uni'};

  const stepsHTML=(w.steps||[]).map(s=>{
    const codeBlock=s.code?`<div class="code-wrap"><div class="code-blk"><pre>${esc(s.code)}</pre></div>${s.codeNote?`<div class="code-note">${esc(s.codeNote)}</div>`:''}</div>`:'';
    const mistakesBlock=(s.mistakes&&s.mistakes.length)?`<div class="mistakes-box"><div class="mistakes-lbl">&#x26A0; よくあるミス</div><ul class="mistakes-list">${s.mistakes.map(m=>`<li>${esc(m)}</li>`).join('')}</ul></div>`:'';
    const miniBlock=s.miniEx?`<div class="mini-ex"><div class="mini-ex-lbl">&#x25BA; ミニ演習</div><div class="mini-ex-text">${esc(s.miniEx)}</div></div>`:'';
    return `<div class="step">
      <div class="step-top">
        <div class="step-num">${s.num}</div>

          <div class="step-header"><span class="step-title">${s.title}</span><span class="step-dur">${s.dur}</span></div>
          ${s.why?`<div class="step-why">${esc(s.why)}</div>`:''}
          ${(s.body||'').split('\n\n').map(p=>`<p>${esc(p)}</p>`).join('')}
          ${codeBlock}${mistakesBlock}${miniBlock}
        </div>
      </div></div>`;
  }).join('');

  const ex=w.exercise||{};
  const rubricHTML=(ex.rubric&&ex.rubric.length)?`<div class="rubric-lbl">採点基準</div><ul class="rubric-list">${ex.rubric.map(r=>`<li>${r}</li>`).join('')}</ul>`:'';
  const exHTML=`<div class="ex-box">
    <div class="ex-tag">今週の演習課題</div>
    <div class="ex-name">${ex.title||''}</div>
    <p class="ex-desc">${ex.desc||''}</p>
    <ol class="ex-items">${(ex.items||[]).map(i=>`<li>${i}</li>`).join('')}</ol>${rubricHTML}</div>`;

  const chkHTML=(w.checklist||[]).map((c,ci)=>{
    const key=`${id}-${ci}`;const checked=st.checked[key]||false;
    return `<div class="chk-row" onclick="toggleCheck('${key}',this)">
      <input class="chk-box" type="checkbox" ${checked?'checked':''} onclick="event.stopPropagation();toggleCheck('${key}',this.closest('.chk-row'))">
      <label class="chk-lbl ${checked?'done':''}">${esc(c.text)}</label>
      <span class="role-tag ${roleMap[c.role]||'r-b'}">${roleText[c.role]||'共通'}</span></div>`;
  }).join('');

  const faqHTML=(w.faq&&w.faq.length)?`<div class="sec-label">よくある質問</div><div class="faq-list">${w.faq.map(f=>`<div class="faq-item"><div class="faq-q">Q. ${f.q}</div><div class="faq-a">A. ${f.a}</div></div>`).join('')}</div>`:'';
  const refsHTML=(w.refs&&w.refs.length)?`<div class="sec-label">参考リンク</div><div class="refs-list">${w.refs.map(r=>`<div class="ref-row"><span class="ref-arrow">&#x2192;</span><div><div class="ref-title"><a href="${r.url}" target="_blank" rel="noopener">${r.title}</a></div>${r.note?`<div class="ref-note">${esc(r.note)}</div>`:''}</div></div>`).join('')}</div>`:'';
  const prereqHTML=(w.prereqs&&w.prereqs.length)?`<div class="prereq-box"><div class="prereq-lbl">&#x2714; この週を始める前の確認</div><ul class="prereq-list">${w.prereqs.map(p=>`<li>${p}</li>`).join('')}</ul></div>`:'';

  const phaseTag=w.phase===0?`<span class="wk-phase-tag tag-p0" style="color:#555;border-color:#999;background:#F5F5F5">スタート — オンボーディング</span>`:`<span class="wk-phase-tag ${ph.tagClass}">${ph.label} — ${ph.title}</span>`;
  const weekLabel=w.id===0?'Week 0':`Week ${w.id}`;

  const c=document.getElementById('content');
  c.innerHTML=`
    ${phaseTag}
    <h1 class="wk-title">${weekLabel} &mdash; ${w.title}</h1>
    <div class="wk-meta"><span>目安 ${w.hours} 時間</span><span>${roleLabel[w.target]||''}</span></div>
    ${prereqHTML}
    <div class="wk-intro">${esc(w.intro||'')}</div>
    <div class="sec-label">この週が終わったらできること</div>
    <ul class="goals-list">${(w.goals||[]).map(g=>`<li>${g}</li>`).join('')}</ul>
    <div class="sec-label">学習ステップ</div>
    <div>${stepsHTML}</div>
    ${exHTML}
    <div class="sec-label">完了チェックリスト</div>
    <div class="chk-list">${chkHTML}</div>
    ${faqHTML}${refsHTML}
    ${w.hint?`<div class="hint-box"><div class="hint-lbl">はるのすけより</div>${esc(w.hint)}</div>`:''}
    <div style="display:flex;gap:12px;margin-top:40px;padding-top:24px;border-top:1px solid #EEEEF8;flex-wrap:wrap">
      ${id>0?`<button class="nav-btn" onclick="showWeek(${id-1})">&larr; Week ${id-1}</button>`:''}
      <button class="nav-btn" onclick="showWelcome()" style="border-color:#C4C4DC;color:#999">ホームへ</button>
      ${id<30?`<button class="nav-btn" onclick="showWeek(${id+1})" style="margin-left:auto">Week ${id+1} &rarr;</button>`:''}
    </div>`;
  updateProgress();window.scrollTo(0,0);
}

function showRef(refId){
  document.querySelectorAll('.wk-link').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById(`nav-ref-${refId}`);
  if(nav){nav.classList.add('active');nav.scrollIntoView({block:'nearest'});}
  st.current=refId; st.currentType='ref';

  const refs={
    ext: buildExtensionsPage(),
    sc: buildShortcutsPage(),
    cmd: buildCommandsPage(),
  };
  document.getElementById('content').innerHTML=refs[refId]||'Not found';
  window.scrollTo(0,0);
}

</table>`).join('');

  return `
<div class="wlc-eyebrow">リファレンス</div>
<h1 class="wk-title" style="font-size:24px">コマンド集</h1>
<div class="wk-intro">ターミナル・Git・npm の基本コマンド一覧。暗記する必要はないが、困ったときにここを開いて探せる状態にしておこう。Week 9以降はGitコマンドを毎日使う。</div>
<div class="hint-box"><div class="hint-lbl">⚠️ 注意</div>rm -rfは取り消しができない削除コマンド。絶対に rm -rf / や rm -rf ~ などを実行してはいけない（PCのデータが全消えする）。怪しいコマンドはGoogleで検索してから実行しよう。</div>
${sHTML}`;
}

function toggleCheck(key,row){
  st.checked[key]=!st.checked[key];
  const box=row.querySelector('.chk-box'),lbl=row.querySelector('.chk-lbl');
  if(box)box.checked=st.checked[key];
  if(lbl){st.checked[key]?lbl.classList.add('done'):lbl.classList.remove('done');}
  if(st.current!==null&&st.currentType==='week'){
    const w=WEEKS.find(x=>x.id===st.current);
    if(w){
      const total=w.checklist?w.checklist.length:0;
      const done=Object.keys(st.checked).filter(k=>k.startsWith(st.current+'-')&&st.checked[k]).length;
      const nav=document.getElementById(`nav-w${st.current}`);
      if(nav&&done===total&&total>0)nav.classList.add('done');
      else if(nav)nav.classList.remove('done');
    }
  }
  updateProgress(); saveProgress();
}

function updateProgress(){
  const total=WEEKS.reduce((s,w)=>s+(w.checklist?w.checklist.length:0),0);
  const done=Object.values(st.checked).filter(Boolean).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=`${done} / ${total} 完了`;
}
function saveProgress(){try{localStorage.setItem('est-v3-progress',JSON.stringify(st.checked));}catch(e){}}
function loadProgress(){try{const s=localStorage.getItem('est-v3-progress');if(s)st.checked=JSON.parse(s);}catch(e){}}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

loadProgress();buildNav();showWelcome();updateProgress();

</script>
