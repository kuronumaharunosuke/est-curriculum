<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EST カリキュラム — AIESEC Japan 2627</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:Montserrat,sans-serif;background:#fff;color:#1A1A4E;display:flex;min-height:100vh}

/* ── Sidebar ── */
#sidebar{width:268px;min-height:100vh;background:#1A1A4E;position:fixed;top:0;left:0;display:flex;flex-direction:column;overflow-y:auto;z-index:100;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.sb-head{padding:28px 22px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-org{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#00AEEF;margin-bottom:6px}
.sb-title{font-size:15px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:3px}
.sb-sub{font-size:10.5px;color:rgba(255,255,255,.32)}
.sb-nav{flex:1;padding:8px 0}
.ph-group{margin-bottom:2px}
.ph-head{display:flex;align-items:center;gap:8px;padding:9px 20px 5px;font-size:8.5px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.ph-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.wk-link{display:flex;align-items:center;padding:5px 20px 5px 32px;font-size:11px;color:rgba(255,255,255,.45);cursor:pointer;transition:color .12s,background .12s;position:relative;line-height:1.4}
.wk-link:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.04)}
.wk-link.active{color:#fff;background:rgba(0,174,239,.13)}
.wk-link.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px}
.wk-n{font-size:8.5px;font-weight:700;color:rgba(255,255,255,.2);min-width:26px;flex-shrink:0}
.wk-link.active .wk-n{color:#00AEEF}
.wk-name{font-size:11px;line-height:1.35}
.wk-link.done .wk-n{color:#00875A}
.sb-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.07)}
.sb-prog-lbl{font-size:8.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:7px}
.prog-wrap{height:2px;background:rgba(255,255,255,.07);margin-bottom:6px}
.prog-fill{height:100%;background:#00AEEF;transition:width .35s ease}
.prog-txt{font-size:10px;color:rgba(255,255,255,.28)}

/* ── Main ── */
#main{margin-left:268px;flex:1;min-height:100vh}
#content{max-width:820px;padding:52px 64px 80px;min-height:100vh}

/* ── Welcome ── */
.wlc-eyebrow{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#00AEEF;margin-bottom:14px}
.wlc-title{font-size:32px;font-weight:700;color:#1A1A4E;line-height:1.15;margin-bottom:18px}
.wlc-desc{font-size:13.5px;line-height:1.9;color:#4A4A7E;margin-bottom:36px;max-width:600px}
.wlc-stats{display:flex;gap:28px;margin-bottom:40px;padding-bottom:32px;border-bottom:1px solid #EEEEF8}
.wlc-stat-val{font-size:28px;font-weight:700;color:#1A1A4E;line-height:1}
.wlc-stat-lbl{font-size:11px;color:#999;margin-top:3px}
.ph-cards{display:flex;flex-direction:column;gap:12px}
.ph-card{display:flex;gap:16px;align-items:flex-start;padding:16px 18px;border:1px solid #E4E4F0;cursor:pointer;transition:border-color .15s,transform .1s}
.ph-card:hover{border-color:#00AEEF;transform:translateX(2px)}
.ph-card-num{font-size:26px;font-weight:700;line-height:1;flex-shrink:0;width:40px}
.ph-card-title{font-size:13.5px;font-weight:700;margin-bottom:4px}
.ph-card-goal{font-size:12px;color:#5A5A8E;line-height:1.55}
.ph-card-meta{font-size:10px;color:#BBB;margin-top:5px;font-weight:600;letter-spacing:.5px}

/* ── Week header ── */
.wk-phase-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border:1px solid;margin-bottom:14px}
.wk-title{font-size:25px;font-weight:700;color:#1A1A4E;line-height:1.2;margin-bottom:10px}
.wk-meta{display:flex;gap:16px;font-size:11px;color:#999;margin-bottom:24px;padding-bottom:22px;border-bottom:1px solid #EEEEF8;flex-wrap:wrap}
.wk-meta span{display:flex;align-items:center;gap:5px}
.wk-meta span::before{content:"";width:3px;height:3px;background:currentColor;border-radius:50%;flex-shrink:0}
.wk-intro{font-size:13.5px;line-height:1.95;color:#3A3A6E;margin-bottom:28px;padding:14px 18px;border-left:3px solid #00AEEF;background:#F5FBFF}

/* ── Prerequisites ── */
.prereq-box{background:#FFFBEC;border:1px solid #F5DC7A;border-left:3px solid #E6A817;padding:14px 18px;margin-bottom:32px}
.prereq-lbl{font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#9A6700;margin-bottom:9px}
.prereq-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.prereq-list li{font-size:12.5px;color:#5A4000;display:flex;gap:9px;line-height:1.5}
.prereq-list li::before{content:"?";font-size:10px;font-weight:700;color:#E6A817;flex-shrink:0;margin-top:1px}

/* ── Section label ── */
.sec-label{font-size:8.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#00AEEF;margin-top:40px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:"";flex:1;height:1px;background:#EEEEF8}

/* ── Goals ── */
.goals-list{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:4px}
.goals-list li{display:flex;gap:11px;align-items:flex-start;font-size:13px;line-height:1.65;color:#2A2A5E}
.goals-list li::before{content:"";width:14px;height:14px;border:2px solid #00AEEF;flex-shrink:0;margin-top:2px}

/* ── Steps ── */
.step{padding:26px 0;border-bottom:1px solid #EEEEF8}
.step:last-child{border-bottom:none}
.step-top{display:flex;gap:20px}
.step-num{font-size:38px;font-weight:700;color:#EEEEF8;line-height:1;flex-shrink:0;width:50px;text-align:right;padding-top:3px}
.step-body{flex:1}
.step-header{display:flex;align-items:baseline;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.step-title{font-size:15px;font-weight:600;color:#1A1A4E}
.step-dur{font-size:9.5px;font-weight:600;color:#AAA;background:#F5F5FC;padding:2px 9px;letter-spacing:.3px}
.step-why{font-size:12.5px;line-height:1.8;color:#4A4A7E;font-style:italic;padding:10px 14px;background:#F8F8FD;border-left:2px solid #C0C0DC;margin-bottom:12px}
.step-body p{font-size:13px;line-height:1.9;color:#444466;margin-bottom:10px}
.step-body p:last-of-type{margin-bottom:0}

/* ── Code block ── */
.code-wrap{margin:14px 0}
.code-blk{background:#0D0D2B;padding:16px 20px;overflow-x:auto;border-left:2px solid #00AEEF}
.code-blk pre{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:#C8D3F5;line-height:1.78;white-space:pre}
.code-note{font-size:11.5px;color:#888;line-height:1.65;padding:7px 0 0}

/* ── Mistakes ── */
.mistakes-box{background:#FFF8F8;border:1px solid #F0C0C0;border-left:3px solid #C4003E;padding:12px 16px;margin-top:14px}
.mistakes-lbl{font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#C4003E;margin-bottom:8px}
.mistakes-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.mistakes-list li{font-size:12px;color:#5A1A1A;display:flex;gap:8px;line-height:1.55}
.mistakes-list li::before{content:"!";font-weight:800;color:#C4003E;flex-shrink:0;width:10px;font-size:11px;margin-top:1px}

/* ── Mini exercise ── */
.mini-ex{background:#F0FBF5;border:1px solid #A8DDB8;border-left:3px solid #00875A;padding:12px 16px;margin-top:14px}
.mini-ex-lbl{font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#00875A;margin-bottom:5px}
.mini-ex-text{font-size:12.5px;color:#1A4030;line-height:1.75}

/* ── Exercise ── */
.ex-box{background:#F7F7FD;border:1px solid #E0E0F0;border-left:4px solid #1A1A4E;padding:22px 24px;margin:32px 0}
.ex-tag{font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#1A1A4E;margin-bottom:6px}
.ex-name{font-size:17px;font-weight:700;color:#1A1A4E;margin-bottom:10px}
.ex-desc{font-size:13px;line-height:1.82;color:#4A4A7E;margin-bottom:14px}
.ex-items{list-style:none;counter-reset:ex;display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.ex-items li{counter-increment:ex;display:flex;gap:10px;font-size:12.5px;color:#3A3A6E;line-height:1.65}
.ex-items li::before{content:counter(ex)".";font-weight:700;color:#1A1A4E;flex-shrink:0;min-width:20px}
.rubric-lbl{font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#00875A;margin-top:16px;margin-bottom:8px}
.rubric-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.rubric-list li{font-size:12px;color:#1A3A2A;display:flex;gap:8px;line-height:1.55}
.rubric-list li::before{content:"✓";font-weight:700;color:#00875A;flex-shrink:0;width:14px}

/* ── FAQ ── */
.faq-list{display:flex;flex-direction:column;gap:18px}
.faq-item{border-left:2px solid #E8E8F0;padding-left:16px}
.faq-q{font-size:13px;font-weight:600;color:#1A1A4E;margin-bottom:6px}
.faq-a{font-size:12.5px;color:#4A4A7E;line-height:1.8}

/* ── Checklist ── */
.chk-list{display:flex;flex-direction:column}
.chk-row{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid #F5F5FC;cursor:pointer}
.chk-row:last-child{border-bottom:none}
.chk-box{width:15px;height:15px;border:2px solid #C4C4DC;flex-shrink:0;margin-top:1px;cursor:pointer;appearance:none;-webkit-appearance:none;position:relative;background:#fff}
.chk-box:checked{background:#1D9E75;border-color:#1D9E75}
.chk-box:checked::after{content:"";position:absolute;left:2px;top:0;width:5px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}
.chk-lbl{font-size:12.5px;line-height:1.65;color:#3A3A6E;flex:1}
.chk-lbl.done{text-decoration:line-through;color:#AAAAC8}
.role-tag{font-size:8.5px;font-weight:700;padding:1px 7px;border:1px solid;flex-shrink:0;margin-top:2px;white-space:nowrap;letter-spacing:.3px}
.r-c{color:#0070CC;border-color:#0070CC}.r-u{color:#8B2BE2;border-color:#8B2BE2}.r-b{color:#1A1A4E;border-color:#C4C4DC}

/* ── Hint ── */
.hint-box{font-size:12.5px;line-height:1.82;color:#3A3A6E;padding:13px 16px;border:1px solid #D8EEFF;background:#F0F8FF;margin-top:28px}
.hint-lbl{font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#0070CC;margin-bottom:5px}

/* ── Refs ── */
.refs-list{display:flex;flex-direction:column;gap:13px}
.ref-row{display:flex;gap:11px}
.ref-arrow{font-size:12px;font-weight:700;color:#00AEEF;flex-shrink:0;margin-top:1px}
.ref-title a{font-size:13px;font-weight:600;color:#1A1A4E;text-decoration:none;border-bottom:1px solid #D0D0E8}
.ref-title a:hover{border-bottom-color:#00AEEF}
.ref-note{font-size:11px;color:#999;margin-top:2px}

/* ── Nav buttons ── */
.nav-btn{font-family:inherit;font-size:12px;padding:8px 16px;border:1px solid #E0E0F0;background:#fff;cursor:pointer;color:#4A4A7E;transition:border-color .12s,color .12s}
.nav-btn:hover{border-color:#00AEEF;color:#00AEEF}

/* ── Phase color system ── */
.p1{color:#00AEEF}.p2{color:#0070CC}.p3{color:#00875A}.p4{color:#C4003E}
.tag-p1{color:#00AEEF;border-color:#00AEEF;background:#EBF9FE}
.tag-p2{color:#0070CC;border-color:#0070CC;background:#EBF5FF}
.tag-p3{color:#00875A;border-color:#00875A;background:#EAFAF4}
.tag-p4{color:#C4003E;border-color:#C4003E;background:#FDEEF4}
.dot-p1{background:#00AEEF}.dot-p2{background:#0070CC}.dot-p3{background:#00875A}.dot-p4{background:#C4003E}
.active.wk-p1::before{background:#00AEEF}.active.wk-p2::before{background:#0070CC}
.active.wk-p3::before{background:#00875A}.active.wk-p4::before{background:#C4003E}

.p0{color:#555}.tag-p0{color:#555;border-color:#999;background:#F5F5F5}
.dot-p0{background:#999}.wk-p0.active::before{background:#555}
.wk-ref .wk-n{font-size:13px}.wk-ref.active{background:rgba(255,255,255,.06)}
.wk-ref.active::before{background:#666}

</style>
</head>
<body>
<aside id="sidebar">
  <div class="sb-head">
    <div class="sb-org">AIESEC Japan</div>
    <div class="sb-title">EST カリキュラム</div>
    <div class="sb-sub">2627 Term &nbsp;&#xB7;&nbsp; 30週プログラム</div>
  </div>
  <nav class="sb-nav" id="nav-tree"></nav>
  <div class="sb-foot">
    <div class="sb-prog-lbl">全体進捗</div>
    <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-txt" id="prog-txt">0 / 0 完了</div>
  </div>
</aside>
<main id="main"><div id="content"></div></main>
<script>
const PHASES=[{"id":0,"label":"Week 0","title":"オンボーディング","goal":"開発に最適なPC環境を整え、拡張機能・ショートカット・SSH認証を設定する","weeks":1,"colorClass":"p0","tagClass":"tag-p0","dotClass":"dot-p0","weekClass":"wk-p0"},{"id":1,"label":"Phase 1","title":"Web基礎","goal":"HTML・CSS・JavaScriptの基礎を身につけ、動的なWebページを自力で作れる","weeks":10,"colorClass":"p1","tagClass":"tag-p1","dotClass":"dot-p1","weekClass":"wk-p1"},{"id":2,"label":"Phase 2","title":"ツールを読む","goal":"AJツールのコードを読んで何をしているかを人に説明できる","weeks":8,"colorClass":"p2","tagClass":"tag-p2","dotClass":"dot-p2","weekClass":"wk-p2"},{"id":3,"label":"Phase 3","title":"触れるようになる","goal":"バグを自力で特定・修正し、PRを出してマージまで完結できる","weeks":8,"colorClass":"p3","tagClass":"tag-p3","dotClass":"dot-p3","weekClass":"wk-p3"},{"id":4,"label":"Phase 4","title":"担えるようになる","goal":"次の担当者に引き継げる状態を作り、AJデジタルインフラを守る","weeks":4,"colorClass":"p4","tagClass":"tag-p4","dotClass":"dot-p4","weekClass":"wk-p4"}];
const WEEKS=[{"id":0,"phase":0,"title":"オンボーディング — PC環境と拡張機能","hours":"2〜3","target":"both","prereqs":["PCを持っていること（Mac または Windows）","インターネット接続環境があること","やる気"],"intro":"ESTに合格したらまず最初にやること。コードを1行も書く前に「開発に最適な環境」を整えよう。拡張機能・ショートカット・ターミナルの設定を最初にやっておくと、その後の24週間の効率が大きく変わる。「準備に30分かけて、その後の数百時間を快適にする」が今日の目標。","goals":["VS Codeに必須拡張機能8つとあると便利な拡張機能を全部インストールできる","Macのキーボードショートカット（VS Code・ターミナル・Chrome）をチートシートで確認できる","ターミナルを開いてbasicなコマンドを実行できる"],"steps":[{"num":"01","title":"VS Code 拡張機能を全部入れる","dur":"45分","why":"拡張機能はVS Codeの「アシスタント」。Prettierがなければコードは乱雑になり、Error Lensがなければエラーに気づくのが遅くなり、Auto Rename Tagがなければタグの変更で毎回ミスが起きる。最初の30分で入れておくだけで、その後の学習効率が全然違う。","body":"VS Codeの拡張機能は左サイドバーの四角いアイコン（Cmd+Shift+X）から検索してインストールできる。\n\n【必須4つ — 絶対入れる】\n① Japanese Language Pack（esbenp） — VS Codeを日本語化。インストール後にVS Code再起動で適用。\n② Prettier（esbenp.prettier-vscode） — 保存するたびにコードを自動整形。インデントのズレ・クォートの混在が自動修正される。settings.jsonに設定が必要（下のコード参照）。\n③ Live Server（ritwickdey） — HTMLファイルを保存するたびにブラウザが自動リロード。VS Code右下に「Go Live」ボタンが追加される。\n④ Auto Rename Tag（formulahendry） — HTMLの開始タグを変更すると終了タグも自動で変わる。<div>を<section>に変えるとき片方だけ直してバグになるのを防いでくれる。\n\n【あると便利 — できれば入れる】\n⑤ Error Lens（usernamehw） — エラーや警告をその行に直接赤文字で表示する。「ConsoleのエラーってどこのコードのことかわからないIDEは困る」問題を解決する強力な拡張機能。\n⑥ Indent Rainbow（oderwat） — インデントを色分けして視覚化。ネストが深いコードでも今どの階層にいるかが一目でわかる。\n⑦ Color Highlight（naumovs） — コード中のカラーコード（#1A1A4Eや rgba(0,174,239)）をその実際の色で表示する。CSSを書くときに非常に便利。\n⑧ Better Comments（aaron-bond） — コメントの種類を色分けする。// TODO: 黄色、// !: 赤（警告）、// ?: 青（質問）、// *: 緑（重要）で視覚的に区別できる。","code":"// settings.json の完全版（Cmd+Shift+P → \"Open User Settings (JSON)\"）\n{\n  // Prettier 設定\n  \"editor.formatOnSave\": true,\n  \"editor.defaultFormatter\": \"esbenp.prettier-vscode\",\n  \"editor.tabSize\": 2,\n  \"files.trimTrailingWhitespace\": true,\n\n  // 見やすさ改善\n  \"editor.fontSize\": 13,\n  \"editor.lineHeight\": 22,\n  \"editor.wordWrap\": \"on\",\n  \"editor.minimap.enabled\": false,      // 右端のミニマップを非表示\n  \"editor.renderWhitespace\": \"boundary\", // 余分な空白を表示\n\n  // ブラケットの色分け（VS Code 内蔵機能）\n  \"editor.bracketPairColorization.enabled\": true,\n  \"editor.guides.bracketPairs\": \"active\",\n\n  // ファイルアイコン（Material Icon Theme を入れた場合）\n  \"workbench.iconTheme\": \"material-icon-theme\",\n\n  // Auto Save（任意 — 好みに合わせて）\n  \"files.autoSave\": \"afterDelay\",\n  \"files.autoSaveDelay\": 1000\n}","codeNote":"このsettings.jsonをそのままコピペして使ってOK。後から自分好みにカスタマイズしていこう。特にbracketPairColorizationは内蔵機能なので拡張機能なしで括弧を色分けできる。","mistakes":["拡張機能をインストールしたのにVS Codeを再起動しなかった → 一部の拡張機能は再起動後に有効になる","Prettierをインストールしたがsettings.jsonを設定しなかった → インストールだけでは動かない。editor.formatOnSaveを設定する必要がある","拡張機能を入れすぎてVS Codeが重くなる → 必須4つ+便利4つの計8つで十分。わからないうちにどんどん入れないこと"],"miniEx":"VS Codeの拡張機能パネルを開き（Cmd+Shift+X）、「Indent Rainbow」を検索してインストールしよう。次に適当なHTMLファイルを開いてインデントが色分けされることを確認する。"},{"num":"02","title":"ターミナルを使えるようにする","dur":"30分","why":"ターミナルを使いこなすとGitのコマンド・ファイル操作・サーバーの起動が全部できるようになる。Week 9のGit操作から毎回使うツールなので、今のうちに「怖くないもの」と認識しておこう。","body":"MacのターミナルはApplications → Utilities → Terminalから開く。または、Spotlight（Cmd+Space）で「Terminal」と検索すると早い。もしくはVS Code内のターミナル（Cmd+`）を使えばVS Codeと行き来しなくていい。\n\nターミナルは「テキストでPCを操作するツール」。クリックではなく文字でコマンドを入力して実行する。最初は怖く見えるが、使うコマンドは10個程度しかない。\n\nMacのデフォルトシェルはzsh。Windowsを使う場合はPowerShell（推奨）またはWSL（Windows Subsystem for Linux）を使う。ホームディレクトリ（チルダ ~ で表現）がターミナルを開いたときの初期位置。","code":"# よく使うターミナルコマンド一覧\n\n# ─── 移動・確認 ───\npwd                    # 現在いるフォルダのパスを表示\nls                     # 今のフォルダのファイル一覧\nls -la                 # 隠しファイルも含めて詳細表示\ncd フォルダ名           # フォルダに移動\ncd ..                  # 1つ上のフォルダに移動\ncd ~                   # ホームディレクトリに移動\ncd ~/Desktop           # デスクトップに移動\n\n# ─── ファイル操作 ───\nmkdir フォルダ名        # フォルダを作成\ntouch ファイル名        # 空のファイルを作成\ncp 元ファイル 先        # ファイルをコピー\nmv 元ファイル 先        # ファイルを移動（リネームにも使える）\nrm ファイル名           # ファイルを削除（ゴミ箱に入らない！注意）\nrm -rf フォルダ名       # フォルダごと削除（超注意！元に戻らない）\ncat ファイル名          # ファイルの内容を表示\n\n# ─── VS Codeで開く ───\ncode .                 # 現在のフォルダをVS Codeで開く\ncode ファイル名         # 特定のファイルをVS Codeで開く\n\n# ─── 便利な操作 ───\nclear                  # ターミナルの画面をクリア\nCtrl+C                 # 実行中のプロセスを止める（超重要）\n↑キー                  # 前のコマンドを呼び出す\nTabキー                # コマンド・パス名を自動補完\n\n# ─── Node.js 確認 ───\nnode --version         # Node.jsのバージョン確認\nnpm --version          # npmのバージョン確認","codeNote":"rm -rfは実行するとゴミ箱に入らず完全に削除される。絶対に rm -rf / や rm -rf ~ などは実行しないこと（PCのデータが全消えする）。","mistakes":["ターミナルをGUI（クリック）で操作するものと混同する → ターミナルはすべてキーボード入力で操作する","コマンドを途中で止めたいのにウィンドウを閉じる → Ctrl+Cで実行中のプロセスを止められる。閉じる必要はない","cdしたフォルダがわからなくなる → pwdを実行すると現在地が表示される。迷ったらcd ~でホームに戻る"],"miniEx":"ターミナルを開いてpwdを実行し現在地を確認しよう。次にcd ~/Desktopでデスクトップに移動し、mkdir est-testでフォルダを作成する。ls -laでフォルダが作成されたことを確認する。"},{"num":"03","title":"キーボードショートカットを覚える","dur":"20分","why":"ショートカットを使うかどうかで開発速度が2〜3倍変わる。特に「Cmd+D」（同じ文字を複数選択）と「Cmd+Shift+F」（プロジェクト全体検索）は毎日何十回も使う。今週から意識的に使って体に染み込ませよう。","body":"VS Codeのショートカットは多いが、まず10個だけ覚えれば日常の作業がずっと快適になる。以下のコード欄に「絶対に覚えるべきショートカット」をまとめた。\n\nMacの修飾キー：Cmd（⌘）・Option（⌥）・Shift（⇧）・Ctrl（^）。WindowsはCmdの代わりにCtrl、OptionはAltが対応する。\n\nVS CodeとChrome DevToolsのショートカットは特に重要。この2つのツールを24週間毎日使うので、ショートカットが手に染み込んでいると作業速度が段違い。","code":"# ─── VS Code（最重要10選）───\n\nCmd+P              # ファイルをクイック検索・切り替え（超よく使う）\nCmd+Shift+P        # コマンドパレット（何でもできる万能コマンド）\nCmd+F              # 現在のファイル内を検索\nCmd+Shift+F        # プロジェクト全体を横断検索\nCmd+/              # 選択行をコメントアウト・解除（トグル）\nCmd+D              # カーソル下の単語を選択 → 連続押しで次も選択\nAlt+↑/↓           # 選択した行を上下に移動\nCmd+Option+↑/↓   # マルチカーソル追加（複数箇所を同時編集）\nCmd+クリック        # 関数・変数の定義箇所にジャンプ\nCmd+`              # VS Code内蔵ターミナルを開く・閉じる\nCmd+B              # サイドバー（エクスプローラー）を表示・非表示\nCmd+Z              # アンドゥ（取り消し）\nCmd+Shift+Z        # リドゥ（やり直し）\n\n# ─── Chrome DevTools ───\n\nF12 / Cmd+Option+I # DevToolsを開く・閉じる\nCmd+Shift+M        # デバイスツールバー（スマホ表示シミュレート）\nCmd+Option+J       # Consoleパネルを直接開く\nCmd+Shift+C        # Elements検証モード（要素をクリックして即確認）\nCmd+R              # ページをリロード\nCmd+Shift+R        # キャッシュクリアしてリロード（CSSが反映されないとき）\n\n# ─── Mac 全般 ───\n\nCmd+Space          # Spotlight検索（アプリ・ファイルを即座に開く）\nCmd+Tab            # アプリを切り替え\nCmd+W              # タブを閉じる\nCmd+T              # 新しいタブを開く\nCmd+L              # ブラウザのURLバーにフォーカス\nCtrl+A             # 行の先頭に移動（ターミナルで有効）\nCtrl+E             # 行の末尾に移動（ターミナルで有効）","codeNote":"印刷してデスクに貼っておくのがおすすめ。最初の1ヶ月は意識的にショートカットを使うようにすると自然に身につく。","mistakes":["ショートカットを全部覚えようとして混乱する → まず「Cmd+P・Cmd+Shift+F・Cmd+/・Cmd+D」の4つから始めよう","Windowsの場合Cmdの代わりにCtrlを使うことを忘れる → MacのCmdキー = WindowsのCtrlキー（ほとんどの場合）"],"miniEx":"VS Codeでindex.htmlを開き、「<\/div>」を検索（Cmd+F）してみよう。次にその単語を選択した状態でCmd+Dを何度か押して複数選択を体験する。"},{"num":"04","title":"GitHubアカウントとSSH認証の設定","dur":"20分","why":"GitHubへのpush時に毎回パスワードを求められる問題を最初に解決しておかないと、Week 9以降のすべてのGit操作でストレスがたまる。SSH認証を一度設定すれば以降は自動で認証される。","body":"GitHubは2021年にパスワード認証を廃止した。現在はSSHキーまたはPersonal Access Tokenでの認証が必要。SSHキーの方が一度設定すれば再入力不要なので便利。\n\nSSHキーの仕組み：①自分のPCに「秘密鍵」と「公開鍵」のペアを作る。②公開鍵をGitHubに登録する。③GitHubとの通信時に秘密鍵で「自分が自分であること」を証明する。パスワードを送らないのでセキュリティが高い。\n\nGitHub CLIという選択肢もある。brew install ghでインストールし、gh auth loginを実行するだけで認証が完了する（SSHキーの設定も自動でやってくれる）。こちらの方が初心者には簡単。","code":"# 方法1: GitHub CLI（推奨・簡単）\nbrew install gh        # Mac の場合（Homebrew が必要）\ngh auth login          # 指示に従って認証\n\n# 方法2: SSH キーを手動で設定する\n# Step 1: SSH キーを生成\nssh-keygen -t ed25519 -C \"あなたのGitHubメールアドレス\"\n# → ファイルの保存場所を聞かれる → Enterで ~/.ssh/id_ed25519 に保存\n# → パスフレーズを聞かれる → 空でEnterでもOK（パスフレーズなし）\n\n# Step 2: 公開鍵をクリップボードにコピー\npbcopy < ~/.ssh/id_ed25519.pub   # Mac の場合\n\n# Step 3: GitHub に登録\n# GitHub → Settings → SSH and GPG keys → New SSH key\n# Title: 自分のPCの名前（例: \"Harunosuke MacBook\"）\n# Key: コピーした公開鍵をペーストして保存\n\n# Step 4: 接続テスト\nssh -T git@github.com\n# → \"Hi ユーザー名! You've successfully authenticated\" と表示されれば成功\n\n# Step 5: クローン時はHTTPSではなくSSHのURLを使う\n# HTTPS: https://github.com/username/repo.git\n# SSH:   git@github.com:username/repo.git  ← これを使う","codeNote":"GitHub CLIが最も簡単な方法。brew install gh → gh auth login の2コマンドで完了する。Homebrewがない場合は brew.sh からインストールする。","mistakes":["SSH認証を設定したのにgit cloneでHTTPSのURLを使ってしまう → SSH認証を使うにはgit@github.com:ユーザー名/リポジトリ名.gitの形式のURLを使う","秘密鍵（id_ed25519）を誰かに送ってしまう → 公開鍵（id_ed25519.pub）のみGitHubに登録する。秘密鍵は絶対に送らない・シェアしない"],"miniEx":"ターミナルでssh -T git@github.comを実行して「successfully authenticated」と表示されれば完了。表示されなければSSHキーの設定を確認する。"}],"exercise":{"title":"オンボーディング完了チェック","desc":"全項目をチェックして「開発に最適な環境」を整えよう。1つでもチェックが入っていなければその項目を完了させてから次に進もう。","items":["VS Codeに必須拡張機能4つをインストールした（Japanese, Prettier, Live Server, Auto Rename Tag）","VS Codeに便利拡張機能を追加した（Error Lens, Indent Rainbow, Color Highlight, Better Comments のうち最低1つ）","settings.jsonにPrettierの設定を追加した","ターミナルを開いてpwd・ls・cdを実行した","Cmd+P・Cmd+Shift+F・Cmd+/・Cmd+Dの4つのショートカットを試した","GitHubのSSH認証を設定してssh -T git@github.comが成功した"],"rubric":["必須拡張機能4つがVS Codeにインストールされている","settings.jsonにformatOnSave: trueが設定されている","ターミナルでbasicコマンドが実行できる","SSH認証テストが成功している"]},"faq":[{"q":"Homebrewって何？入れないといけない？","a":"HomebrewはMacのパッケージマネージャー（ソフトをインストール・管理するツール）。brewコマンドでGit・Node.js・GitHub CLIなどを簡単にインストールできる。インストールは brew.sh のページに書かれた1行のコマンドをターミナルで実行するだけ。MacでWeb開発をするなら必須と言っていいレベルのツール。"},{"q":"WindowsでもMacと同じ設定ができる？","a":"ほぼ同じ。主な違いは：①CmdキーはCtrlキーに置き換える、②ターミナルはPowerShell（またはWSL）を使う、③HomebrewはWindowsでは使えないので winget またはChocolateyを使う。WSL（Windows Subsystem for Linux）を使うとMacに近い環境になるのでおすすめ。"},{"q":"Color Highlight拡張機能が動いていない","a":"Color Highlightは.css・.scss・.htmlなどCSSが書かれるファイルで機能する。.jsファイルでも動くが、CSSのカラーコードの形式（#FFF や rgba()）で書かれた文字列にのみ色が付く。VS Codeを再起動してから再確認しよう。"}],"checklist":[{"text":"VS Codeに必須拡張機能4つをインストールした","role":"both"},{"text":"settings.jsonにPrettierとeditor.formatOnSaveを設定した","role":"coder"},{"text":"Indent Rainbow・Color Highlight・Better Commentsのうち最低1つを入れた","role":"coder"},{"text":"ターミナルを開いてpwd・ls・cdを実行できた","role":"both"},{"text":"VS CodeのCmd+P・Cmd+Shift+F・Cmd+/・Cmd+Dを試した","role":"coder"},{"text":"GitHubのSSH認証を設定した（ssh -T git@github.com が成功）","role":"both"}],"refs":[{"title":"VS Code 拡張機能マーケットプレイス","url":"https://marketplace.visualstudio.com/vscode","note":"拡張機能の検索・インストール"},{"title":"Homebrew（Mac パッケージマネージャー）","url":"https://brew.sh/","note":"Mac必須ツール。1行のコマンドでインストール"},{"title":"GitHub SSH認証の設定","url":"https://docs.github.com/ja/authentication/connecting-to-github-with-ssh","note":"GitHub公式のSSH設定手順"},{"title":"VS Code キーボードショートカット（Mac）","url":"https://code.visualstudio.com/shortcuts/keyboard-shortcuts-macos.pdf","note":"公式PDF。印刷して手元に置こう"}],"hint":"オンボーディングは「正直面倒くさい」作業だけど、最初に全部整えておくと後の学習効率が全然違う。特にSSH認証は今やっておかないとWeek 9以降の毎回のpushで苦労する。"},{"id":1,"phase":1,"title":"環境構築・開発の準備","hours":"6〜8","target":"both","prereqs":["特になし。プログラミング完全未経験でも大丈夫","PCにインターネット接続環境があること","Chromeブラウザが入っていること（なければ先にインストール）"],"intro":"AJのツールを読んだり触ったりするには、まず開発環境を整える必要がある。VS Codeというエディタでコードを書き、ブラウザで動作確認するサイクルがすべての開発の起点になる。最初の設定に1〜2時間かけることで残り23週間の学習効率が大きく変わる。焦らず丁寧に整えよう。","goals":["VS CodeでHTMLファイルを作成し、Live Serverでブラウザにリアルタイム表示できる","Chrome DevToolsを開き、Elements・Consoleパネルの基本操作ができる","GitHubアカウントを作成し、lc-trackerリポジトリのファイル一覧を開ける"],"steps":[{"num":"01","title":"VS Codeのインストールと設定","dur":"45分","why":"エンジニアが使うツールの中で最も重要なのがコードエディタ。VS Codeを適切に設定すれば、タイプミスは自動整形され、コードは常に読みやすい状態に保たれる。最初の30分を丁寧に使うことで残り23週間の学習効率が大きく変わる。","body":"VS Codeはcode.visualstudio.comから環境に合ったものをダウンロードしてインストールするだけ。AJツールの開発もすべてこれで行っている。\n\nインストール後にまずやることは3つ。①「Japanese Language Pack」拡張機能でVS Codeを日本語化する。②「Prettier」拡張機能でコードの自動整形を設定する。③「Live Server」拡張機能でブラウザの自動リロードを設定する。\n\nPrettierはインストールしただけでは動かない。コマンドパレット（Cmd+Shift+P）を開き「Preferences: Open User Settings (JSON)」と入力してsettings.jsonを開き、右の設定を追加しよう。これで保存するたびにコードが自動整形されるようになる。","code":"// VS Code settings.json に追加する設定\n{\n  \"editor.formatOnSave\": true,\n  \"editor.defaultFormatter\": \"esbenp.prettier-vscode\",\n  \"editor.tabSize\": 2,\n  \"files.trimTrailingWhitespace\": true\n}","codeNote":"settings.jsonへの変更はすぐに反映される。Prettierが動いているか確認するには、インデントがバラバラなHTMLを書いて保存してみよう。自動で整列されれば成功。","mistakes":["Prettierをインストールしたが動かない → settings.jsonへの設定追加を忘れている。editor.formatOnSaveとeditor.defaultFormatterの2行を追加すること","日本語化したのにVS Codeが英語のまま → VS Code自体を再起動すると適用される","Go Liveボタンが見当たらない → Live Server拡張機能がインストールされているか確認する。HTMLファイルをアクティブなタブで開いた状態でVS Code右下を確認する"],"miniEx":"est-practiceフォルダを作成しVS Codeで開く。新しいファイル（test.html）を作り、インデントがバラバラなHTMLを書いて保存する。Prettierが自動で整列されることを確認しよう。"},{"num":"02","title":"はじめてのHTMLファイルを作る","dur":"30分","why":"HTMLの最小構成（DOCTYPE・html・head・body）の役割を説明できない状態でCSSやJavaScriptを学んでも「なんかうまくいかない」が続く。5行のコードを書きながら、それぞれが何のためにあるかを体で覚えることが今後の基盤になる。","body":"<head>タグの中には「ページの設定情報（ユーザーには見えないもの）」を書く。<meta charset=\"UTF-8\">はこのファイルがUTF-8という文字コードで書かれていることを宣言しており、これを忘れると日本語が文字化けする。<title>に書いたテキストはブラウザのタブに表示される。\n\n<body>タグの中には「実際にブラウザに表示されるコンテンツ」を書く。VS Codeでhtmlファイルを開き「!」と入力してTabキーを押すと「Emmet」という機能が最小構成を自動補完してくれる。最初は手動で書いて覚え、慣れてきたらEmmetを使おう。\n\nLive Serverを使うには、VS Codeのステータスバー（右下）の「Go Live」をクリックするだけ。以降は保存するたびにブラウザが自動リロードされる。ブラウザのURLは http://127.0.0.1:5500 のようになり、これは「自分のPC上のサーバー」にアクセスしているという意味。","code":"<!DOCTYPE html>\n<html lang=\"ja\">\n<head>\n  <!-- ページの設定情報（ブラウザには見えない部分） -->\n  <meta charset=\"UTF-8\">\n  <!-- スマホ対応のために必要（今は意味がわからなくてもコピペでOK） -->\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>はじめてのページ<\/title>\n<\/head>\n<body>\n  <!-- ブラウザに表示されるコンテンツをここに書く -->\n  <h1>AIESEC EST 2627<\/h1>\n  <p>はじめての HTML ファイルです。<\/p>\n<\/body>\n<\/html>","codeNote":"<meta name=\"viewport\">はスマホ対応のための設定。これがないとスマホで開いたとき縮小されて表示される。今は意味がわからなくてもコピペしておく習慣をつけよう。","mistakes":["<meta charset=\"UTF-8\">を書き忘れると日本語が文字化けする。特にWindowsでは文字化けしやすいので必ず入れること","ブラウザが更新されない → 「保存（Cmd+S / Ctrl+S）」を押していない。VS Codeのタブのファイル名に白丸がついていたら未保存状態","<head>と<body>を混同する。「ユーザーに見えるコンテンツはすべてbodyの中」と覚えておく"],"miniEx":"hello.htmlを作成してLive Serverで表示しよう。表示されたら<h1>の中身を自分のAIESEC名に変えて保存し、ブラウザがリアルタイムで更新されることを確認する。"},{"num":"03","title":"Chrome DevToolsを使ってみる","dur":"30分","why":"DevToolsはエンジニアの虫眼鏡。「なぜここに余白があるの？」「この色はどこから来てるの？」という疑問に即座に答えてくれる。今後24週間毎回使うツールなので、今週のうちに操作感を掴んでおく価値がある。","body":"DevToolsはChromeブラウザに内蔵された開発者向けツール。F12（Mac: Cmd+Option+I）で開く。「Elements」「Console」など多数のパネルがあるが、最初に使うのはElementsとConsoleの2つだけ。\n\nElementsパネルは「現在のページのHTML構造をリアルタイムで確認・編集できる」場所。HTMLタグをクリックするとブラウザ上の対応する要素がハイライトされる。Stylesパネル（Elements内の右側）でCSSの値をリアルタイムで変更できる。リロードすれば元に戻るので安心して試しながら覚えよう。\n\nConsoleパネルはJavaScriptのエラーや console.log の出力が表示される場所であり、直接コードを入力して実行できる実験台でもある。Week 5からのJavaScript学習でここが毎日の実験場になる。","code":"// Consoleパネルで試してみよう（F12 → Console タブ）\nconsole.log(\"Hello DevTools\");\n// → Hello DevTools と出力される\n\nconsole.log(1 + 2 + 3);\n// → 6 と出力される（計算もできる）\n\n// 現在のページのタイトルを取得する\nconsole.log(document.title);\n// → はじめてのページ（title タグの中身）が表示される","codeNote":"DevToolsのConsoleは即席の計算機・実験台として使える。コードを書いてすぐ試したいときはここに入力して実行するのが一番早い。","mistakes":["DevToolsのパネルが多すぎて迷子になる → 最初はElementsとConsoleの2つだけ覚えれば十分","Elementsで変更したCSSがリロードすると消える → 意図した動作。本番コードを変更するにはVS Codeのファイルを編集する","Consoleに赤いエラーが大量に表示されて怖い → hello.htmlの段階では今は気にしなくてOK"],"miniEx":"hello.htmlをブラウザで開きDevToolsを起動する。ElementsパネルでH1タグをクリックして選択し、StylesパネルでColor: redと入力してH1の文字色を赤に変えてみよう。次にConsoleを開いてconsole.log(document.title)と入力してEnterを押す。"},{"num":"04","title":"GitHubアカウントを作成してリポジトリを覗く","dur":"20分","why":"AJのツールはすべてGitHub上で管理されている。今週は見るだけでOK。リポジトリ・コミット・Issue・PRという概念に早めに慣れておくことがPhase 2以降の学習を楽にする。","body":"GitHubはコードを管理・共有するためのWebサービス。lc-trackerのリポを開くと、ファイル一覧・更新履歴・Issues（課題管理）・Pull Requests（コード変更の提案）などが見られる。\n\n今週はアカウントを作成し、はるのすけからURLを受け取ってlc-trackerリポを開いてみよう。コードの中身が一切わからなくて全然OK。「こういうファイルたちがここにある」という認識だけで十分。\n\nGitHubのusernameは公開されるので、AIESECのOBとして将来も使うことを考えると英語表記の名前やニックネームが無難。プロフィール写真とbioも設定しておくとコラボレーターとして認識されやすい。","code":"// GitHub で知っておくべき用語（今週は眺めるだけでOK）\n\n// リポジトリ（リポ）\n//   プロジェクトのコードをまとめたフォルダのようなもの\n\n// コミット\n//   変更の記録（いつ・誰が・何を変えたか が残る）\n\n// Issue\n//   バグ報告・機能リクエスト・TODO を管理するチケット\n\n// Pull Request（PR）\n//   コード変更の提案（レビューを受けてからマージ）\n\n// Branch（ブランチ）\n//   開発の分岐（本番を壊さずに作業するための仕組み）\n\n// これらは Week 9 から実際に使い始める","codeNote":"GitとGitHubは別物。Git=ローカル（自分のPC）で使うコマンドラインツール、GitHub=クラウド上のWebサービス。GitHubはGitのGoogle Drive版というイメージが近い。","mistakes":["GitとGitHubを混同する。今週はGitHub（Webサービス）だけ使う。Gitのコマンドラインは Week 9 から使い始める","Issueを開いたら英語の長文が出てきて読む気がなくなる → まずタイトルだけ読めばOK","GitHubのusernameに個人情報を含めてしまう → usernameは公開される。英語表記の名前やニックネームが無難"],"miniEx":"GitHubアカウントを作成したら、lc-trackerリポジトリを開き「ファイルが何個あるか」「最後のコミットメッセージは何か」「Issueは何件あるか」をメモして#est-学習チャンネルに投稿する。"}],"exercise":{"title":"EST自己紹介カードページ","desc":"hello.html を編集して、以下の内容を含む自己紹介ページを作ろう。CSSはまだ学んでいないのでHTMLのみで構成すること。「完璧に作る」ことよりも「自分でHTMLを書いてブラウザに表示できた」という体験を大切にしよう。","items":["名前（AIESEC名義）","AIESECに入った理由（1〜2文）","このESTで学びたいこと（1〜2文）","将来やってみたい仕事・分野（なんでもOK）","h1・h2・p・ul・li タグを少なくとも1回ずつ使うこと","スクリーンショットを #est-学習 チャンネルに投稿する"],"rubric":["hello.html がブラウザで正しく表示できている","h1・h2・p・ul・li タグがすべて使われている","日本語が文字化けしていない（charset=UTF-8 が設定されている）","ブラウザのタブに適切なタイトルが表示されている","スクリーンショットが投稿されている"]},"faq":[{"q":"Prettierで保存したらコードが崩れた","a":"Prettierが正しいコードと判断する形式に整形した結果、見た目が変わることがある（クォートの統一、インデントの修正など）。これは意図した動作なので受け入れてOK。もし本当に壊れているなら、HTMLが文法的に誤っている可能性があるのでエラー箇所を確認しよう。"},{"q":"Go Liveボタンが見当たらない","a":"Live Serverの拡張機能がインストールされると、VS Code右下のステータスバーに「Go Live」ボタンが表示される。HTMLファイルをアクティブなタブで開いた状態で右下を確認しよう。それでもなければ拡張機能パネル（Cmd+Shift+X）でLive Serverを再インストールしてみる。"},{"q":"GitHubのリポジトリが見つからない","a":"リポジトリのURLをはるのすけから受け取ってからアクセスしよう。プライベートリポジトリ（非公開）の場合は、はるのすけからコラボレーター招待を受ける必要がある。招待が来たらメールで承認する。"}],"checklist":[{"text":"VS CodeをインストールしJapanese Language Packで日本語化できた","role":"both"},{"text":"Prettier拡張機能を入れ settings.json で保存時自動整形を設定できた","role":"coder"},{"text":"Live Server拡張機能を入れ Go Live ボタンでブラウザ表示できた","role":"coder"},{"text":"DevToolsを開きElementsパネルで hello.html のタグを確認できた","role":"both"},{"text":"ConsoleパネルにJavaScriptを入力して実行できた","role":"both"},{"text":"GitHubアカウントを作成した","role":"both"},{"text":"lc-trackerリポジトリを開きファイル数・最終コミット・Issue数を確認した","role":"both"},{"text":"自己紹介ページを作りスクリーンショットを #est-学習 に投稿した","role":"both"}],"refs":[{"title":"Visual Studio Code 公式","url":"https://code.visualstudio.com/","note":"インストールはここから"},{"title":"Chrome DevTools 入門","url":"https://developer.chrome.com/docs/devtools/","note":"Google公式（日本語あり）"},{"title":"GitHub","url":"https://github.com/","note":"アカウント作成"},{"title":"Emmet チートシート","url":"https://docs.emmet.io/cheat-sheet/","note":"VS Codeの自動補完機能一覧"}],"hint":"インストールに詰まったらすぐに相談してOK。環境構築は「一人でやり切る」より「チームで揃える」ことの方が大事。詰まったまま1時間過ごすより5分で聞いて解決する方がずっといい。"},{"id":2,"phase":1,"title":"HTML基礎 — タグ・構造・セマンティクス","hours":"6〜8","target":"coder","prereqs":["Week 1 完了（VS Code + Live Server が動く状態）","hello.html をブラウザに表示できる","DevTools の Elements パネルを開ける"],"intro":"HTMLはWebページの「骨格」を作る言語。CSSやJavaScriptは後から追加するものであり、まずHTML単体でコンテンツの構造を正しく書くことが大前提になる。「意味のある構造（セマンティクス）」を意識したHTMLが書けると、Action Trackerのコードを読むときに構造が素早く把握できるようになる。","goals":["基本タグ（h1〜h3, p, a, img, ul, ol, li, table）を正しく使ったページを作れる","セマンティックHTML（header, main, nav, section, article, footer）の意味と使い分けを説明できる","DevToolsのElementsパネルでDOMツリーの親子関係を確認できる"],"steps":[{"num":"01","title":"基本タグを一通り使う","dur":"60分","why":"HTMLタグの役割はその名前に込められている。タグの意味を理解していると、初めて見るコードでも「ああ、これはリンクだな」「これは見出しだな」と素早く把握できるようになる。Action TrackerのHTMLを読む練習だと思って丁寧に覚えよう。","body":"HTMLタグは「開始タグ＋コンテンツ＋終了タグ」で構成される。h1〜h6は見出し（heading）でh1が最上位・h6が最下位。pは段落（paragraph）。aはリンク（anchor）でhref属性にURLを書く。imgは画像（image）でsrc属性にファイルパス、alt属性に代替テキストを書く。\n\nリストはul（Unordered List: 箇条書き）とol（Ordered List: 番号付きリスト）の2種類があり、それぞれの中にli（List Item）でアイテムを並べる。テーブルはtable要素の中にtr（行）→td（セル）の順で書く。\n\n各タグの「属性（attribute）」に注目しよう。href・src・alt・class・idなど、タグに追加情報を付け加えるものが属性。属性はすべて開始タグの中に書き、値はダブルクォートで囲む。","code":"<!-- 見出し -->\n<h1>メインタイトル<\/h1>\n<h2>セクション見出し<\/h2>\n<h3>小見出し<\/h3>\n\n<!-- 段落とリンク -->\n<p>テキストの中に<a href=\"https://aiesec.org\">リンク<\/a>を含められる<\/p>\n\n<!-- 画像（alt は必ず書く） -->\n<img src=\"logo.png\" alt=\"AIESECロゴ\">\n\n<!-- 箇条書きリスト -->\n<ul>\n  <li>Action Tracker<\/li>\n  <li>Pakuri Tracker<\/li>\n<\/ul>\n\n<!-- 番号付きリスト -->\n<ol>\n  <li>環境構築<\/li>\n  <li>HTML基礎<\/li>\n  <li>CSS基礎<\/li>\n<\/ol>","codeNote":"imgタグのalt属性は「画像が表示できないときの代替テキスト」であり、スクリーンリーダー（視覚障害者向けツール）が読み上げる際にも使われる。必ず書く習慣をつけよう。","mistakes":["h1タグをページ内に複数使ってしまう → h1はページ内に1つが原則。サブ見出しにはh2・h3を使う","imgタグにaltを書き忘れる → 画像が読み込めなかったとき何も表示されなくなる。必ず書く習慣を","タグを閉じ忘れる（<\/p>や<\/ul>の忘れ）→ その後のHTMLレイアウト全体が崩れる原因になる"],"miniEx":"自己紹介ページにulリストで「AIESEC EST で学びたいこと（3〜5件）」を追加してみよう。次に<a href=\"https://aiesec.or.jp\">AIESEC日本公式<\/a>というリンクを段落の中に入れてみる。"},{"num":"02","title":"セマンティックHTMLとは","dur":"40分","why":"divでなんでも囲むのではなく、コンテンツの意味に合ったタグを使うことを「セマンティックHTML」と言う。Action Trackerのコードを読むとき、セマンティックなタグで構造が整理されていれば「どこが何を担当しているか」が一目でわかる。","body":"HTML5で導入されたセマンティックタグには以下のものがある。header（ページやセクションのヘッダー）、nav（ナビゲーション）、main（メインコンテンツ、ページ内に1つ）、section（意味のあるセクション）、article（独立したコンテンツ）、aside（補足情報）、footer（フッター）。\n\nこれらを使う最大の理由は「コードの可読性の向上」。<div class=\"header\">より<header>の方が、一目で「ここがヘッダーだ」とわかる。チーム開発では、コードを読む時間がコードを書く時間より長いことが多い。可読性を高める習慣が早い段階から大事になる。\n\nAction Trackerのindex.htmlを開いてみると、headerとmainの構造が使われているはず。それを今週の自分のHTMLと比べてみよう。","code":"<!-- div だらけの古い書き方 -->\n<div class=\"header\">\n  <div class=\"nav\">...<\/div>\n<\/div>\n<div class=\"main\">\n  <div class=\"section\">...<\/div>\n<\/div>\n\n<!-- セマンティックな書き方（こちらが正解） -->\n<header>\n  <nav>\n    <ul>\n      <li><a href=\"/\">ホーム<\/a><\/li>\n      <li><a href=\"/tools\">ツール一覧<\/a><\/li>\n    <\/ul>\n  <\/nav>\n<\/header>\n<main>\n  <section>\n    <h2>AJ ツール<\/h2>\n    <p>内部ツールの紹介<\/p>\n  <\/section>\n<\/main>\n<footer>\n  <p>AIESEC Japan EST 2627<\/p>\n<\/footer>","codeNote":"sectionとarticleの違いを聞かれることがある。section=テーマのある区切り（章や節のイメージ）、article=それ単体で意味が成立する独立したコンテンツ（ブログ記事・ニュース記事など）。","mistakes":["mainタグをページ内に複数使ってしまう → mainはページ内に1つが原則","headerとh1の混同 → header=ページ上部のコンテナ（タグ）、h1=見出しのテキスト（タグ）。全く別物","navの中に必ずulリストを入れなければいけないと思い込む → ulが慣習だが必須ではない。aタグを直接並べても問題ない"],"miniEx":"Week 1の自己紹介ページを、header・main・section・footerを使って書き直してみよう。DevToolsのElementsパネルで親子関係を確認しながら作業する。"},{"num":"03","title":"DOMツリーをDevToolsで確認する","dur":"30分","why":"HTMLはブラウザによって「ツリー構造（DOM: Document Object Model）」として解釈される。このDOM ツリーの見方を理解しておくと、Week 6のDOM操作とWeek 11のコードリーディングで迷子にならずに済む。","body":"DOMはHTMLの入れ子構造をオブジェクトのツリーとして表現したもの。DevToolsのElementsパネルを開くと、この構造がビジュアルに表示される。▶ アイコンをクリックすると子要素を展開できる。\n\nElementsパネルの左側でHTMLタグを選択すると、ブラウザ上の対応する要素がハイライトされる。この「コードとブラウザ表示の対応を確認する」作業は、バグを見つけるときに毎回使うテクニックになる。\n\nDevToolsのElementsパネルでHTMLを直接編集することもできる（タグをダブルクリックで編集可能）。これも「試し」専用で、リロードすれば元に戻る。本番のコードを変えるには必ずVS Codeで作業すること。","code":"<!-- この HTML を DevTools でどう見えるか確認しよう -->\n<main>\n  <section>\n    <!-- ここでクリックすると section 要素がハイライトされる -->\n    <h2>見出し<\/h2>\n    <p>段落テキスト<\/p>\n    <ul>\n      <li>アイテム 1<\/li>\n      <li>アイテム 2<\/li>\n    <\/ul>\n  <\/section>\n<\/main>\n\n<!-- DOMツリー イメージ:\nmain\n  └─ section\n       ├─ h2\n       ├─ p\n       └─ ul\n            ├─ li\n            └─ li\n-->","codeNote":"マウスを使わずにElements内のタグを選ぶ方法：ページ上で要素を右クリック → 「検証（Inspect）」を選ぶと、その要素が自動的にElementsパネルで選択される。バグを見つけるときはこの方法が一番早い。","mistakes":["DOMとHTMLは同じものだと思い込む → HTMLはテキストファイル（書いたコード）、DOMはブラウザがHTMLを解析して作ったオブジェクトのツリー。JavaScriptからはDOMを操作する","Elementsパネルでの変更がVS Codeに反映されると思い込む → 反映されない。DevToolsでの変更はブラウザのメモリ上だけに存在する","親要素と子要素の関係がわからなくなる → インデントの深さで親子関係がわかる。インデントが深いほど「子」の位置"],"miniEx":"hello.htmlをブラウザで開き、DevToolsでh1タグをクリックして選択する。次に同じ要素を右クリック →「Edit as HTML」を選んで文字を変えてみよう（リロードで元に戻る）。"}],"exercise":{"title":"自己紹介ページ v2（構造版）","desc":"Week 1で作った自己紹介ページを、セマンティックHTMLを使って書き直そう。CSSはまだ当てないのでスタイルは素っ気ないが「構造として正しいか」を意識することが大切。","items":["headerタグにサイトタイトル（AIESEC EST 自己紹介）を配置","main > section構造で内容を整理（「自己紹介」「学習目標」「経歴」などのセクション）","ulリストで「ESTでやりたいこと（3件以上）」を書く","footerに「作成者名・作成日」を配置","DevToolsでDOMツリーを確認し構造のスクリーンショットを撮る","スクリーンショットを #est-学習 に投稿する"],"rubric":["header/main/section/footerがすべて使われている","h1・h2・p・ul・li・aタグが適切に使われている","DOMツリーのスクリーンショットが投稿されている","日本語が文字化けしていない","<title>タグが設定されている"]},"faq":[{"q":"divとsectionはどちらを使えばいいの？","a":"「このブロックに意味・テーマがあるか」で判断する。意味のある区切りならsection、単にレイアウトのために囲むだけならdiv。例えば「お知らせセクション」「ツール紹介セクション」は意味があるのでsection。「ボタンを横並びにするために囲む」だけならdiv。"},{"q":"aタグのhrefに何を書けばいいか","a":"外部サイトは https:// から始まるURL全体を書く。同じフォルダのhtmlファイルには ./ファイル名.html と書く（例: href=\"./page2.html\"）。ページ内の特定箇所にジャンプするには # + id名を書く（例: href=\"#section1\"）。"},{"q":"imgタグのsrcに書くパスが正しいか確認する方法","a":"まずブラウザで表示して画像が表示されているか確認する。表示されていなければDevToolsのConsoleに「Failed to load resource」というエラーが赤文字で表示される。パスの書き方：同じフォルダにある場合は「logo.png」（ファイル名だけ）、一つ上のフォルダは「../logo.png」、サブフォルダは「images/logo.png」。"}],"checklist":[{"text":"h1〜h3, p, a, img, ul/li タグを使ったページを作れた","role":"coder"},{"text":"aタグで外部リンクを正しく作れた（hrefにURLを書けた）","role":"coder"},{"text":"imgタグで画像を表示し、altを必ず書いた","role":"coder"},{"text":"header / main / section / footer のセマンティックなタグを使えた","role":"coder"},{"text":"DevToolsのElementsパネルでDOMツリーの親子関係を確認できた","role":"coder"},{"text":"書き直した自己紹介ページのスクリーンショットを #est-学習 に投稿した","role":"coder"}],"refs":[{"title":"Progate HTML入門","url":"https://prog-8.com/lessons/html/","note":"無料範囲で基礎を網羅"},{"title":"MDN — HTML要素リファレンス","url":"https://developer.mozilla.org/ja/docs/Web/HTML/Element","note":"困ったときに引く辞書として使う"},{"title":"セマンティックHTMLの詳細","url":"https://developer.mozilla.org/ja/docs/Learn/HTML/Introduction_to_HTML/Document_and_website_structure","note":"MDN公式（日本語）"}],"hint":"「divだらけのコード」と「セマンティックなコード」は見た目は同じでも読みやすさが全然違う。AJツールを読む練習と思って丁寧にやってみて。セマンティックHTMLは採用面接でも聞かれる基礎知識。"},{"id":3,"phase":1,"title":"CSS基礎 — セレクタとボックスモデル","hours":"6〜8","target":"coder","prereqs":["Week 2 完了（セマンティックHTMLで自己紹介ページが作れる）","DevToolsのElementsパネルの基本操作ができる","DOMツリーの親子関係を説明できる"],"intro":"CSS（Cascading Style Sheets）はHTMLの見た目を制御する言語。「どの要素に（セレクタ）、どんなスタイルを（プロパティ）、どんな値で（値）付けるか」という形式で書く。今週のもう一つの重要テーマがボックスモデル。すべてのHTML要素は「コンテンツ・パディング・ボーダー・マージン」の4層構造で成り立っており、これを理解しないとレイアウト調整が常に感覚頼りになってしまう。","goals":["CSSファイルを作成しlinkタグでHTMLに読み込んで、クラスセレクタとidセレクタを使えた","margin, padding, borderの違いをボックスモデルの図を見ながら説明できる","DevToolsのStylesパネルでCSSを変更して表示に反映できる"],"steps":[{"num":"01","title":"CSSファイルの作り方とセレクタの種類","dur":"50分","why":"CSSのセレクタとは「スタイルを適用したいHTML要素を指定する仕組み」。どのセレクタをどう使い分けるかが、保守しやすいCSSを書くための基本になる。AJツールのCSSを読むときも、セレクタの理解があると「このスタイルはどこに適用されているのか」が素早くわかる。","body":"CSSはHTMLファイルとは別に.cssファイルを作り、HTMLのheadタグ内でlinkタグを使って読み込む形が基本。セレクタには3種類ある。①要素セレクタ（p { }）：指定したタグのすべてにスタイルを適用。②クラスセレクタ（.title { }）：class属性が一致する要素に適用。複数の要素に同じスタイルを使い回せる。③idセレクタ（#header { }）：id属性が一致する要素に適用。1ページに1回しか使わない要素に使う。\n\nCSSプロパティには色・フォント・余白などがある。colorは文字色、background-colorは背景色、font-sizeは文字サイズ（px・em・remで指定）、font-weightは太さ（400が通常・700が太字）。単位はpxが最も直感的だが、最近はremを使うことも多い（16pxが1rem）。\n\n詳細度（Specificity）という概念も覚えておこう。同じ要素に複数のCSSが当たる場合、より「詳細な」セレクタが優先される。idセレクタ > classセレクタ > 要素セレクタの順に詳細度が高い。この優先順位を理解していないと「スタイルが当たらない！」で詰まることがある。","code":"/* style.css */\n\n/* 要素セレクタ：すべての p タグに適用 */\np {\n  color: #3A3A6E;\n  line-height: 1.8;\n}\n\n/* クラスセレクタ：class=\"section-title\" の要素に適用 */\n.section-title {\n  font-size: 20px;\n  font-weight: 600;\n  margin-bottom: 12px;\n}\n\n/* id セレクタ：id=\"main-header\" の要素に適用 */\n#main-header {\n  background-color: #1A1A4E;\n  color: white;\n  padding: 24px 32px;\n}\n\n/* 子孫セレクタ：nav の中にある a タグ のみに適用 */\nnav a {\n  color: white;\n  text-decoration: none;\n}","codeNote":"linkタグの書き方：<link rel=\"stylesheet\" href=\"./style.css\">。rel=\"stylesheet\"はこのファイルがCSSファイルであることをブラウザに伝える属性。href=\"./style.css\"はCSSファイルの場所（同じフォルダなら./ファイル名.css）。","mistakes":["CSSが全く効かない → linkタグのhrefのパスが間違っている可能性が高い。DevToolsのNetworkパネルでstyle.cssが404（見つからない）になっていないか確認","idセレクタとclassセレクタの使い分けがわからなくなる → 原則としてidはJavaScript用（1ページに1回）、classはスタイリング用（複数の要素に使い回す）。idをスタイリングに使うと詳細度が高くなりすぎてCSSの管理が難しくなる","スタイルが当たらない → 詳細度の問題の可能性がある。DevToolsのStylesパネルで取り消し線が付いているプロパティがあれば、別のルールに上書きされている"],"miniEx":"自己紹介ページにstyle.cssを作成しlinkタグで読み込もう。bodyに背景色、h1に文字色とフォントサイズ、.section-titleというclassを作ってh2に適用してみる。DevToolsのStylesパネルで「どのセレクタのスタイルが適用されているか」を確認する。"},{"num":"02","title":"ボックスモデルを完全に理解する","dur":"40分","why":"すべてのHTML要素はボックス（箱）として扱われる。このボックスの仕組み（ボックスモデル）を理解していないと、余白の調整が常に「なんとなく数値を変える」作業になってしまう。Action TrackerのCSSを読む際も、ボックスモデルの理解があれば「なぜここに余白があるのか」がすぐわかる。","body":"ボックスモデルは内側から4層で構成される。①content（コンテンツ）：実際の文字や画像が入る領域。width・heightで指定できる。②padding（パディング）：contentとborderの間の余白。要素の内側の余白。③border（ボーダー）：枠線。太さ・スタイル（solid/dashed/none）・色を指定できる。④margin（マージン）：border の外側の余白。隣の要素との距離。\n\nDevToolsのElementsパネルで要素を選択すると、右下の「Computed」タブにボックスモデルの図が色分けで表示される（青=content、緑=padding、黄=border、橙=margin）。この図を見ながら数値を調整する習慣をつけよう。\n\nbox-sizingというプロパティも覚えておこう。デフォルト（content-box）では、widthはcontentのサイズのみを指す。paddingを追加すると要素全体の幅はcontent+paddingになってしまう。border-boxにするとwidthがborder+padding+contentの合計になり直感的に扱える。CSSの最初の行に * { box-sizing: border-box; }と書くのが現代の慣習。","code":".card {\n  /* 内側の余白 (content ↔ border の間) */\n  padding: 16px 24px; /* 上下 16px、左右 24px */\n\n  /* 枠線 */\n  border: 1px solid #E0E0F0;\n\n  /* 外側の余白 (border の外側) */\n  margin: 16px 0; /* 上下 16px、左右 0 */\n\n  /* width が border を含むようにする（推奨） */\n  box-sizing: border-box;\n}\n\n/* 全要素に border-box を適用するのが現代の慣習 */\n* {\n  box-sizing: border-box;\n}","codeNote":"paddingとmarginのショートハンド：値が1つ→全方向、2つ→「上下 左右」、3つ→「上 左右 下」、4つ→「上 右 下 左（時計回り）」。例えばpadding: 16px 24px は「上下16px、左右24px」。","mistakes":["paddingとmarginを混同する → padding=要素の内側の余白（要素の背景色が付く）、margin=要素の外側の余白（背景色が付かない）。DevToolsのボックスモデル図で確認しよう","widthを設定したのにpaddingを追加したら要素が広がってしまう → * { box-sizing: border-box; } を最初に書く","マージンが合算されてしまう（マージンの相殺）→ 上下の要素のmarginが隣接しているとき、大きい方だけが適用される。padding-topを使うか、片方だけにmarginを設定することで回避できる"],"miniEx":"DevToolsでlc-trackerを開き（はるのすけからURLを受け取っている場合）、任意のカード要素をクリックしてComputedタブのボックスモデル図を確認してみよう。padding・border・marginの値を読み取って記録する。"},{"num":"03","title":"DevToolsのStylesパネルでCSSを試す","dur":"40分","why":"DevToolsのStylesパネルは「CSSの実験台」。コードを書く前にここで試すと、無駄な試行錯誤が減る。「なぜスタイルが当たらないのか」を調べる最速のツールでもある。","body":"DevToolsのElementsパネルでHTMLタグを選ぶと、右側にStylesパネルが表示される。ここで現在その要素に適用されているCSSルールをすべて確認できる。取り消し線が付いているプロパティは「別のルールに上書きされている」という意味。\n\nStylesパネルの最上部に「element.style」というセクションがある。ここに直接プロパティと値を入力すると、その要素だけにインラインスタイルを追加できる（試し用）。数値はクリックした状態でスクロールすると増減するのでドラッグで調整できる。\n\nComputedタブを開くと、すべてのCSSルールが計算された最終結果として表示される。「なぜこの要素がこのサイズになっているのか」がわからないときは、Computedタブを確認するのが最速。","code":"/* Styles パネルで読み取れる情報の例 */\n\n/* 赤字で表示 = 文法エラーのあるプロパティ */\n/* 取り消し線 = 詳細度の高い別のルールに上書きされている */\n\n/* 例：なぜ色が変わらないか調べる場合 */\n/* .card の color が取り消し線になっていたら */\n/* もっと詳細度の高いセレクタ（例 #main .card）で */\n/* 別の color が指定されているということ */\n\n/* 解決策：より詳細なセレクタを使うか */\n/* 不要なスタイルを削除する */\n#main .card {\n  color: #1A1A4E; /* ← これが優先されている */\n}","codeNote":"CSSプロパティの値をStylesパネルで変更するとき、数値の上にカーソルを置いて↑↓キーを押すと1ずつ増減できる。Shift+↑↓で10ずつ変更できるので調整がしやすい。","mistakes":["スタイルを変更したのにDevToolsに反映されない → ページをリロードせずに変更しているか確認。Stylesパネルでの変更はリロードすると消える","取り消し線が付いているのに気づかず「CSSが効かない！」と混乱する → 取り消し線=上書きされているサイン。詳細度が高いセレクタを探す","DevToolsで変更したものをVS Codeに反映するのを忘れる → DevToolsは試し用。本番に反映するにはVS Codeのファイルを編集する"],"miniEx":"自己紹介ページをブラウザで開き、h2要素を選択してStylesパネルで文字色・フォントサイズ・paddingを変えてみよう。気に入った見た目になったら、同じ値をVS Codeのstyle.cssに書き写して保存する。"}],"exercise":{"title":"スタイル付き自己紹介ページ","desc":"Week 2で作った自己紹介ページ（構造版）にstyle.cssを追加して、以下のスタイルをすべて適用しよう。DevToolsのボックスモデル図で確認しながら作業すること。","items":["* { box-sizing: border-box; } をCSSの最初に書く","bodyに背景色・文字色・フォントサイズを設定する","headerにbackground-colorとpaddingを設定する","sectionにborderとpaddingを設定し、ボックスモデルを意識する","h2にmargin-bottomを設定して下の段落との間に余白を作る","DevToolsのComputedタブでsectionのボックスモデル図を確認しスクリーンショットを投稿","スタイル付きページのスクリーンショットを投稿"],"rubric":["style.cssが作成されlinkタグでHTMLから読み込まれている","* { box-sizing: border-box }が書かれている","クラスセレクタとidセレクタの両方が使われている","DevToolsのボックスモデル図のスクリーンショットが投稿されている","スタイル付きページのスクリーンショットが投稿されている"]},"faq":[{"q":"paddingとmarginのどちらを使えばいいか迷う","a":"「要素の背景色を余白にも広げたいか」で判断する。カードの内側の余白（文字と枠線の間を空けたい）はpadding。要素と要素の間を空けたいだけ（背景色は関係ない）はmargin。迷ったらDevToolsのボックスモデル図で確認しながら調整すると感覚が掴みやすい。"},{"q":"CSSを書いたのにスタイルが当たらない","a":"まずDevToolsのStylesパネルを開いて確認しよう。①linkタグのhrefが正しいか（NetworkパネルでCSSファイルが404になっていないか）②セレクタの指定が正しいか（クラス名のスペルミスなど）③取り消し線が付いていないか（詳細度の高いルールに上書きされていないか）の順に確認する。"},{"q":"DevToolsで変更した値をVS Codeに持ってくる方法","a":"DevToolsで気に入ったスタイルになったら、その値をメモしてVS Codeのstyle.cssに手動で書き写す。DevToolsとVS Codeは連動しないので、毎回手動で反映する必要がある。ちなみにDevToolsのSourcesパネルでCSSファイルを直接編集する方法もあるが、今は手動で十分。"}],"checklist":[{"text":"style.cssを作成しlinkタグでHTMLから読み込めた","role":"coder"},{"text":"クラスセレクタとidセレクタを使い分けてスタイルを当てられた","role":"coder"},{"text":"margin, paddingの違いをボックスモデルの図を見ながら説明できた","role":"coder"},{"text":"* { box-sizing: border-box } をCSSの最初に書いた","role":"coder"},{"text":"DevToolsのStylesパネルでCSSを変更して表示に反映できた","role":"coder"},{"text":"DevToolsのComputedタブでボックスモデル図を確認できた","role":"coder"},{"text":"スタイル付き自己紹介ページのスクリーンショットを投稿した","role":"coder"}],"refs":[{"title":"Progate CSS入門","url":"https://prog-8.com/lessons/css/","note":"ボックスモデルの章まで"},{"title":"MDN — CSSボックスモデル","url":"https://developer.mozilla.org/ja/docs/Learn/CSS/Building_blocks/The_box_model","note":"図解で理解できる"},{"title":"MDN — CSS詳細度","url":"https://developer.mozilla.org/ja/docs/Web/CSS/Specificity","note":"スタイルが当たらないときの参考に"}],"hint":"DevToolsでmargin・paddingを変更しながら確認するのが一番早い。「なんとなく数値を変える」から「理由を持って変える」に移行できるとプロになれる。"},{"id":4,"phase":1,"title":"CSS Flexbox とレスポンシブ対応","hours":"6〜8","target":"coder","prereqs":["Week 3 完了（セレクタ・ボックスモデルを理解している）","style.cssをlinkタグで読み込める","DevToolsのStylesパネルを使える"],"intro":"Action TrackerのレイアウトはほぼすべてFlexboxで組まれている。「横並び」「中央揃え」「余白の均等分配」など、Flexboxを使えばCSSだけで複雑なレイアウトが実現できる。加えてメディアクエリを使ったレスポンシブ対応も学ぶ。スマホでツールを確認するLCメンバーもいるため、画面幅に応じて表示を変える考え方は必須になる。","goals":["display: flex と主要プロパティ（justify-content, align-items, flex-wrap, gap）を使ったレイアウトを組める","Flexbox Froggy を 24 問全問クリアできる","@mediaを使ってスマホサイズで表示を切り替えられる"],"steps":[{"num":"01","title":"Flexboxの基本プロパティ","dur":"60分","why":"floatやpositionを使った古いレイアウト手法と違い、Flexboxは「親要素の設定だけで子要素の並び方を制御できる」という革命的なCSSの機能。Action Trackerのサイドバーとメインエリアの横並びレイアウトがFlexboxで実現されている。DevToolsで確認してみると「ああこれか」となるはず。","body":"display: flexを親要素に指定するだけで、直接の子要素が横並びになる。親要素を「Flexコンテナ」、子要素を「Flexアイテム」と呼ぶ。\n\n主要プロパティ4つを覚えよう。①justify-content：主軸（デフォルトは横方向）の並び方を制御する。flex-start（左端）・flex-end（右端）・center（中央）・space-between（両端に配置、間は均等）・space-around（全要素の周りに均等な余白）が主な値。②align-items：交差軸（デフォルトは縦方向）の並び方を制御する。flex-start（上端）・flex-end（下端）・center（縦中央）・stretch（コンテナの高さに引き伸ばす）が主な値。③flex-wrap：wrapにすると子要素が親の幅を超えたとき自動で折り返す。④gap：Flexアイテム間の余白を一括で指定できる。","code":".toolbar {\n  display: flex;\n  justify-content: space-between;  /* 左端と右端に分散 */\n  align-items: center;             /* 縦方向で中央揃え */\n  gap: 12px;                       /* アイテム間の余白 */\n}\n\n.card-grid {\n  display: flex;\n  flex-wrap: wrap;     /* 折り返しあり */\n  gap: 16px;           /* カード間の余白 */\n}\n\n/* アイテムが余ったスペースを均等に分け合う */\n.flex-item {\n  flex: 1;  /* flex-grow: 1 の省略形 */\n}","codeNote":"DevToolsで任意の要素を選択してStylesパネルで「display: flex」を追加すると、Elementsパネルにflex バッジが表示される。そのバッジをクリックするとFlexboxのオーバーレイが表示され、各アイテムの配置が視覚化できる。","mistakes":["justify-contentとalign-itemsのどちらが横でどちらが縦かわからなくなる → flex-direction: column（縦並び）にすると軸が入れ替わる。混乱したら「主軸（flex-directionの方向）がjustify、交差軸がalign」と覚える","flex-wrapを設定し忘れて子要素がはみ出る → display: flexだけ指定すると子要素は折り返さずに横に伸び続ける。折り返したい場合はflex-wrap: wrapを追加","gapを使ったのに余白が付かない → gapはFlexコンテナ・Gridコンテナの子要素間にのみ効く。一般的な要素のmarginとは違うので注意"],"miniEx":"自己紹介ページのheaderの中に「ロゴ（テキストでOK）」と「ナビゲーション（ulリスト）」を横並びにしてみよう。display: flex と justify-content: space-between で配置し、DevToolsのFlexオーバーレイで確認する。"},{"num":"02","title":"Flexbox Froggy で全問クリア","dur":"40分","why":"Flexbox Froggyはゲーム形式でFlexboxを学べるサービス。実際に手を動かして問題を解くことで、プロパティの組み合わせが体感として身につく。24問全問クリアしたころには、頭で考えなくても手が動くレベルになっている。","body":"Flexbox Froggy（flexboxfroggy.com）は、カエルを正しいハスの葉の上に置くゲームでFlexboxを練習できる。24問あり、前半は基本的なプロパティ、後半は組み合わせで解く問題になっている。\n\n詰まりやすいポイントとして、flex-directionをcolumnにすると主軸と交差軸が入れ替わることに注意。justify-contentが縦方向、align-itemsが横方向になる。これを忘れると後半の問題で詰まる。\n\nalign-contentはflex-wrap: wrapで折り返しが発生したときの行間を制御するプロパティ。align-itemsとの違いに注意しよう。align-items=各行の中でのアイテムの配置、align-content=複数行全体の配置。","code":"// Flexbox Froggy で学べる主要プロパティまとめ\n// flexboxfroggy.com を開いて以下の順に学ぶ\n\n// 基本プロパティ（前半）\n// justify-content: flex-start | flex-end | center\n//                  space-between | space-around | space-evenly\n// align-items:     flex-start | flex-end | center\n//                  baseline | stretch\n// flex-direction:  row | row-reverse | column | column-reverse\n// flex-wrap:       nowrap | wrap | wrap-reverse\n// flex-flow:       flex-direction と flex-wrap の省略形\n\n// 応用プロパティ（後半）\n// align-content:   複数行の配置\n// align-self:      個別のアイテムの縦方向配置\n// order:           表示順を変える\n// flex:            flex-grow, shrink, basis の省略形","codeNote":"Flexbox Froggy の問題が解けないときは、まずDevToolsを開いてそのページのCSSを試しに変えてみるのが早い。答えを調べる前に5分は自力で考えてみよう。","mistakes":["flex-directionをcolumnにしたときにjustify-contentとalign-itemsの役割が逆になることを忘れる → これが一番多いミス。columnにしたら頭の中で軸を90度回転させて考える","Flexboxのプロパティを親要素（コンテナ）と子要素（アイテム）のどちらに書くかわからなくなる → justify-content・align-items・flex-direction・flex-wrap は親要素に書く。align-self・order・flex は子要素に書く"],"miniEx":"Flexbox Froggy を開いて問題1〜12まで解こう。詰まった問題はどのプロパティを使えば解けるかをメモしておく。"},{"num":"03","title":"メディアクエリでレスポンシブ対応","dur":"45分","why":"@mediaはWebデザインの必須スキル。スマホユーザーがPCユーザーを超えた現代では、あらゆるWebアプリがスマホ対応を求められる。AJのツールも今後スマホ対応を強化していく方向性があるため、この考え方は早めに身につけておこう。","body":"@mediaは「特定の条件を満たすときだけCSSを適用する」機能。最もよく使われるのは画面幅（max-width・min-width）による条件分岐。@media (max-width: 768px) { } の中に書いたCSSは、画面幅が768px以下のときだけ適用される。\n\n「モバイルファースト」の設計思想では、まずスマホ用のCSSを書き（デフォルト）、次にmin-widthを使ってタブレット・PCのスタイルを追加していく書き方をする。一方「PCファースト」では最初にPC用を書いてmax-widthでスマホ用を上書きする。どちらでも動くが、モバイルファーストが現代の主流。\n\nDevToolsの「デバイスツールバー（Cmd+Shift+M）」を開くと、様々なデバイスのサイズをシミュレートできる。iPhoneやPixelなど実機のサイズも選択できるので、開発中はここで確認しながら作業しよう。","code":"/* デフォルト（PC） */\n.columns {\n  display: flex;\n  gap: 24px;\n}\n\n.column-main { flex: 2; }\n.column-side { flex: 1; }\n\n/* タブレット（768px 以下） */\n@media (max-width: 768px) {\n  .columns {\n    flex-direction: column;\n  }\n}\n\n/* スマホ（480px 以下） */\n@media (max-width: 480px) {\n  .columns {\n    gap: 16px;\n  }\n\n  /* フォントサイズもスマホに合わせて小さく */\n  body {\n    font-size: 14px;\n  }\n}","codeNote":"ブレークポイントの一般的な目安：480px以下=スマホ、768px以下=タブレット、1024px以下=ノートPC、1200px以上=デスクトップ。プロジェクトによって変わるので固定値はない。","mistakes":["@media内で書いたCSSが効かない → @mediaの書き方が間違っている（@media and (max-width:...)のようにandを忘れることがある）か、詳細度の問題かを確認","DevToolsのデバイスツールバーでスマホサイズにしたのにレイアウトが変わらない → <meta name=\"viewport\">がHTMLのheadに書かれているか確認。これがないとメディアクエリが正常に動作しないことがある"],"miniEx":"自己紹介ページにレスポンシブ対応を追加しよう。PC（768px以上）では3列レイアウト、スマホ（768px以下）では1列に変わるレイアウトを作成する。DevToolsのデバイスツールバーでiPhoneサイズにして確認する。"}],"exercise":{"title":"AJツール紹介レスポンシブページ","desc":"Action TrackerとPakuri Trackerを紹介する一覧ページをFlexboxで作ろう。PCとスマホで表示が変わるレスポンシブ対応を実装すること。","items":["ヘッダー（ロゴ文字＋ナビゲーションリンクをFlexboxで横並び）","ツールカードを Flexbox で 2〜3 列表示（各カードにツール名・説明・リンク）","スマホサイズ（600px以下）でカードが縦1列になるレスポンシブ対応","DevToolsのデバイスツールバーでiPhoneサイズの確認スクリーンショットを撮る","Flexbox Froggy を 24 問全問クリアしたスクリーンショットを投稿"],"rubric":["ヘッダーのロゴとナビゲーションがFlexboxで横並びになっている","ツールカードが複数列で表示されている","@mediaでスマホサイズで縦1列になっている","DevToolsのデバイスツールバーでの確認スクリーンショットがある","Flexbox Froggy 全問クリアのスクリーンショットがある"]},"faq":[{"q":"justify-contentとalign-itemsの違いがいつも混乱する","a":"「justify=主軸（flex-directionで指定した方向）、align=交差軸（主軸と直交する方向）」と覚えよう。デフォルトのflex-direction: rowでは、justify-contentが横方向、align-itemsが縦方向になる。flex-direction: columnにすると逆になる。混乱したらDevToolsのFlexオーバーレイを表示して視覚的に確認するのが一番早い。"},{"q":"flexboxfroggy.comにアクセスできない","a":"フィルタリング等でアクセスできない場合は、Flexbox Defenseというサイト（flexboxdefense.com）も同様のゲーム形式で学べる。また、MDN Web Docsの「Flexbox のガイド」には詳細な説明と図解があるのでそちらで学んでもOK。"},{"q":"@mediaのブレークポイントは何pxにすればいい？","a":"絶対的な正解はない。よく使われる値として768px（タブレットの境界線）と480px（スマホの境界線）がある。ただし最近のレスポンシブデザインでは特定のpx値を決めず「コンテンツが崩れるところ」で切るべきという考え方もある。今週は768pxをブレークポイントとして使っておけばOK。"}],"checklist":[{"text":"display: flex, justify-content, align-items を組み合わせたレイアウトを組めた","role":"coder"},{"text":"Flexbox Froggy を 24 問全問クリアした","role":"coder"},{"text":"gap プロパティでアイテム間の余白を指定できた","role":"coder"},{"text":"@media でスマホサイズに切り替えられた","role":"coder"},{"text":"DevTools のデバイスツールバーでスマホ表示を確認できた","role":"coder"},{"text":"ツール紹介ページを #est-学習 に投稿した","role":"coder"}],"refs":[{"title":"Flexbox Froggy","url":"https://flexboxfroggy.com/","note":"ゲーム形式で全24問"},{"title":"MDN — Flexboxの基本コンセプト","url":"https://developer.mozilla.org/ja/docs/Web/CSS/CSS_flexible_box_layout/Basic_concepts_of_flexbox","note":""},{"title":"A Complete Guide to Flexbox — CSS-Tricks","url":"https://css-tricks.com/snippets/css/a-guide-to-flexbox/","note":"英語だが図解が圧倒的にわかりやすい"}],"hint":"Action Trackerのサイドバーとメインエリアの横並びレイアウトもFlexboxで実現されている。DevToolsで確認してみると「ああこれか」となるはず。コードを読む練習として今週の課題を作ってみて。"},{"id":5,"phase":1,"title":"JavaScript基礎 — 変数・関数・制御フロー","hours":"7〜9","target":"coder","prereqs":["Week 4完了（Flexboxでレスポンシブレイアウトが組める）","DevToolsのConsoleパネルの基本操作ができる","HTML・CSSでページを作成できる"],"intro":"JavaScript（JS）はWebページに「動き」を与えるプログラミング言語。AJのツールの動作（ボタンを押すとデータが保存される・ページを開くとリストが表示される）はすべてJSで書かれている。この週はJS文法の基礎である変数・関数・条件分岐・ループを学ぶ。プログラミング未経験でも段階を踏めば必ず身につく。","goals":["let / constの違いを説明し適切に使い分けられる","引数と戻り値を持つ関数を定義して呼び出せる","if文とforループを使ったFizzBuzzを書ける"],"steps":[{"num":"01","title":"変数と型の基本","dur":"50分","why":"変数はデータを入れておく「箱」。letとconstの使い分けを最初から正しく習慣づけることが、読みやすいコードへの第一歩。AJのツールのコードを読むと、ほぼすべての変数がconstで宣言されていることがわかる。","body":"JavaScriptの変数宣言にはlet（変更可能）とconst（変更不可、定数）がある。基本的にはconstを使い、後から値を変更する必要があるときだけletを使う。かつてはvarも使われていたが、スコープの問題から現代のJSでは使わない。\n\nデータの種類（型）には文字列（string）・数値（number）・真偽値（boolean）・配列（array）・オブジェクト（object）・null・undefinedがある。JavaScriptは動的型付け言語なので、変数の型を宣言する必要はなく、値によって自動的に型が決まる。\n\nテンプレートリテラル（バッククォート ` で囲む記法）を使うと、文字列の中に変数を埋め込める。${変数名}という形式で使う。文字列の結合に+を使うより読みやすいので積極的に使おう。","code":"const name = 'はるのすけ';    // 文字列\nconst age = 20;               // 数値\nconst isActive = true;        // 真偽値\nconst tools = ['Action Tracker', 'Pakuri Tracker'];\nconst user = { name: 'はる', lc: 'Keio' }; // オブジェクト\n\n// テンプレートリテラル（可読性が高い）\nconsole.log(`こんにちは、${name}さん（${age}歳）`);\n\n// 配列の操作\nconsole.log(tools[0]);        // Action Tracker（0始まり）\nconsole.log(tools.length);    // 2\n\n// オブジェクトのプロパティアクセス\nconsole.log(user.name);       // はる\nconsole.log(user['lc']);      // Keio","codeNote":"nullとundefinedの違いも覚えておこう。undefined=変数が宣言されているが値が代入されていない（JavaScriptが自動でセットする）。null=明示的に「空」を表すために代入した値。「値がない」を明示したいときはnull、初期化していない状態はundefined。","mistakes":["varを使ってしまう → 現代のJSではlet・constを使う。varはスコープが関数スコープで混乱しやすい","const で宣言した変数を再代入しようとしてエラーになる → constは再代入不可。変更が必要ならletを使う","配列のインデックスが0始まりであることを忘れる → tools[1]はPakuri Trackerを指す。tools[2]はundefined"],"miniEx":"DevToolsのConsoleを開いて以下を入力して試してみよう。const myLc = '自分のLC名'; console.log(`私は${myLc}のEST担当です`); と入力してEnterを押す。次にconst nums = [10,20,30]; console.log(nums[1]); を試す。"},{"num":"02","title":"関数を定義して呼び出す","dur":"50分","why":"関数は「処理のまとまりに名前をつけて再利用できるようにしたもの」。AJのツールのコードのほぼ100%は関数で構成されている。関数を正しく読み書きできると、初めて見るコードでも「この関数は何をするものか」が素早く把握できるようになる。","body":"JavaScriptの関数宣言には「function宣言」と「アロー関数」の2種類がある。どちらも同じことができるが、AJのツールのコードではアロー関数が多く使われている。\n\n関数の重要な概念が「引数」と「戻り値」。引数は関数に渡す入力データ、戻り値はreturnで返す出力データ。「入力→処理→出力」という流れで関数を設計する考え方が基本。\n\nアロー関数の省略記法も覚えておこう。引数が1つの場合はカッコを省略できる。処理が1行でreturnのみの場合は中括弧とreturnを省略できる（暗黙的なreturn）。AJのコードでこの省略形がよく使われている。","code":"// 通常の関数宣言\nfunction greet(name) {\n  return 'こんにちは、' + name + 'さん！';\n}\n\n// アロー関数（同じ意味）\nconst greet = (name) => {\n  return 'こんにちは、' + name + 'さん！';\n};\n\n// 省略形（処理が1行でreturnのみの場合）\nconst greet = (name) => 'こんにちは、' + name + 'さん！';\n\n// 引数が1つの場合はカッコも省略できる\nconst double = n => n * 2;\n\nconsole.log(greet('はるのすけ'));\nconsole.log(double(5)); // 10\n\n// 配列の高階関数（forEach・map・filter）\nconst lcs = ['HI', 'HIT', 'Keio', 'Waseda'];\nlcs.forEach(lc => console.log(lc));\nconst upper = lcs.map(lc => lc.toUpperCase());\nconst filtered = lcs.filter(lc => lc.length === 2);","codeNote":"forEach・map・filterは「高階関数」と呼ばれ、配列の各要素に対して処理を行う。forEach=各要素に処理を実行するだけ（戻り値なし）、map=各要素を変換した新しい配列を返す、filter=条件に合う要素だけの新しい配列を返す。AJのツールのコードでよく使われる。","mistakes":["returnを書き忘れる → returnがないと関数はundefinedを返す。値を使う関数では必ずreturnを書く","アロー関数の省略形でreturnを書いてしまう → const fn = x => { return x * 2 }; の省略形はconst fn = x => x * 2; で、returnを書くと文法エラーになる（中括弧がないとreturnを書けない）","関数を定義したが呼び出していない → 定義だけでは実行されない。greet('名前');のように呼び出す必要がある"],"miniEx":"ConsoleでFizzBuzzの前準備として、引数に数値を受け取り「その数値が3で割り切れるか」をtrue/falseで返すisDivisibleBy3関数をアロー関数で書いてみよう。"},{"num":"03","title":"条件分岐（if）とループ（for）","dur":"50分","why":"条件分岐とループはすべてのプログラムの基本構造。AJのツールの中でも「もしユーザーがログインしていなければリダイレクトする」「すべてのLCのデータをループして表示する」というパターンが頻繁に登場する。","body":"if文は「条件式がtrueのときだけ処理を実行する」制御構文。else if・elseで複数の分岐を作れる。比較演算子に注意が必要で、==（緩やかな等値比較・型変換あり）と===（厳密な等値比較・型変換なし）の違いを把握しておこう。現代のJSでは===を使うのが基本。\n\nforループは指定した回数だけ処理を繰り返す。for(let i = 0; i < 10; i++)という形式で書く。配列に対してはforEachが読みやすいが、「途中でループを止めたい」「インデックスが必要」な場合は通常のfor文が適している。\n\n論理演算子（&&=かつ、||=または、!=否定）を組み合わせると複雑な条件を表現できる。三項演算子（条件 ? true時の値 : false時の値）はシンプルな条件分岐をワンライナーで書ける便利な記法。","code":"// if / else if / else\nconst score = 75;\nif (score >= 80) {\n  console.log('優秀');\n} else if (score >= 60) {\n  console.log('合格');\n} else {\n  console.log('不合格');\n}\n\n// === と == の違い（必ず === を使う）\nconsole.log(0 == false);  // true （型変換が起きる）\nconsole.log(0 === false); // false（型が違うので false）\n\n// for ループ\nfor (let i = 1; i <= 5; i++) {\n  console.log(i);\n}\n\n// 配列の forEach\nconst lcs = ['HI', 'HIT', 'Keio'];\nlcs.forEach((lc, index) => {\n  console.log(index + 1, lc); // 1 HU, 2 HIT, ...\n});\n\n// 三項演算子\nconst label = score >= 60 ? '合格' : '不合格';","codeNote":"breakとcontinueも覚えておこう。break=ループを即座に終了する。continue=現在のループの反復をスキップして次の反復に進む。forEachではbreakが使えない（通常のfor文を使う）。","mistakes":["==と===を使い間違える → JSでは必ず===を使う。==は型変換が起きて予期しない挙動の原因になる","forループのi < n（未満）とi <= n（以下）を混同する → i < 5は0〜4の5回、i <= 5は0〜5の6回ループする","off-by-oneエラー → 「1から10まで」を意図したのに1から9まで・または1から11まで動いてしまう。ループの境界条件を書くときは必ず一度確認する"],"miniEx":"FizzBuzzを書こう。1から30まで順に出力し、3の倍数はFizz、5の倍数はBuzz、15の倍数はFizzBuzzと出力するプログラムをConsoleで動かす。"}],"exercise":{"title":"FizzBuzz（コンソール版）","desc":"以下の仕様に従ってFizzBuzzを書こう。hello.htmlのscriptタグ内に書いてConsoleで確認する方法でも、Consoleに直接入力する方法でもOK。","items":["1から30まで順に出力する","3の倍数のときは数字の代わりに「Fizz」と出力","5の倍数のときは「Buzz」と出力","15の倍数（3と5の公倍数）のときは「FizzBuzz」と出力","それ以外はそのまま数字を出力","余裕があれば：FizzBuzz関数（引数：上限の数値、戻り値：結果の配列）として書き直してみよう"],"rubric":["1〜30の出力がConsoleで確認できる","3の倍数でFizz、5の倍数でBuzz、15の倍数でFizzBuzzが正しく出力されている","if/else if/elseで書かれている（switchでも可）","余裕があれば関数化されている"]},"faq":[{"q":"constで配列を宣言したのに要素を追加できた。なぜ？","a":"constは「変数への再代入を禁止する」だけで、配列やオブジェクトの中身の変更は禁止しない。const arr = [];のarrという変数を別の値に再代入することはできない（arr = []は不可）が、arr.push('新しい値')のように中身を変えることはできる。"},{"q":"=と==と===の違いがわからなくなる","a":"=は代入（値を変数に入れる）。==は緩やかな等値比較（型変換あり。0==false→true）。===は厳密な等値比較（型変換なし。0===false→false）。プログラムの比較には必ず===を使う習慣をつけよう。"},{"q":"forEachとfor...ofとforループの使い分けは？","a":"配列の全要素に処理するだけならforEach。途中でbreakが必要ならfor...of（for(const item of array)）またはforループ。インデックスが必要ならforEachの第2引数（index）またはforループ。今週はforループとforEachの2つを覚えれば十分。"}],"checklist":[{"text":"letとconstの違いを説明できた","role":"coder"},{"text":"引数と戻り値を持つ関数をアロー関数で書けた","role":"coder"},{"text":"forEach・map・filterを使って配列を操作できた","role":"coder"},{"text":"if/else if/elseを使った条件分岐を書けた","role":"coder"},{"text":"forループで1〜30を出力できた","role":"coder"},{"text":"FizzBuzzをConsoleで正しく動作させられた","role":"coder"}],"refs":[{"title":"Progate JavaScript入門","url":"https://prog-8.com/lessons/es6/","note":"基礎を網羅している"},{"title":"MDN — JavaScript入門","url":"https://developer.mozilla.org/ja/docs/Learn/JavaScript/First_steps","note":""}],"hint":"Consoleで試す習慣をつけると上達が早い。「これどうなるんだろ」と思ったら書いてConsoleで確認してみよう。エラーが出ても怖くない。エラーメッセージは解決策のヒントが書いてある。"},{"id":6,"phase":1,"title":"JavaScript基礎 — DOM操作とイベント","hours":"7〜9","target":"coder","prereqs":["Week 5完了（let/const・関数・if・forが書ける）","FizzBuzzが書けた","DevToolsのConsoleでJSを実行できる"],"intro":"DOM（Document Object Model）はブラウザがHTMLを解析して作るオブジェクトのツリー構造。JavaScriptからDOMを操作することで「ボタンを押したらリストに項目が追加される」「入力した文字が即座に画面に反映される」といった動的なWebページが作れる。AJのツールのUI操作はすべてここの技術で成り立っている。","goals":["getElementById と querySelectorAll でHTML要素を取得できる","addEventListener でボタンクリック時に処理を実行できる","classList.add / remove でスタイルを動的に切り替えられる"],"steps":[{"num":"01","title":"DOM要素をJavaScriptから取得する","dur":"45分","why":"「JavaScriptからHTMLの要素にアクセスする」のがDOM操作の第一歩。要素の取得方法を覚えておくと、「このボタンを押したときに処理する」「この入力の値を読み取る」という操作が実装できる。","body":"document.getElementById('id名')でidを持つ要素を取得できる。取得した要素の.textContentプロパティに文字列を代入すると、そのHTML要素のテキストを書き換えられる。.innerHTMLプロパティを使うとHTML自体を書き換えることもできるが、セキュリティ上の注意が必要（ユーザー入力をinnerHTMLに直接入れないこと）。\n\ndocument.querySelector('.class名')はCSSセレクタを使って最初に一致する要素を取得する。document.querySelectorAll('.class名')はすべての一致する要素をNodeList（配列に似たもの）で取得する。複数の要素を操作するときはquerySelectorAllを使う。\n\n要素のinput値を取得するには.valueプロパティを使う。テキストボックスに入力された文字を取得するのによく使う。","code":"// HTML: <h1 id=\"page-title\">もとのタイトル<\/h1>\nconst title = document.getElementById('page-title');\nconsole.log(title.textContent); // もとのタイトル\ntitle.textContent = '新しいタイトル'; // 書き換え\n\n// HTML: <input id=\"name-input\" type=\"text\">\nconst input = document.getElementById('name-input');\nconsole.log(input.value); // 入力されたテキストを取得\n\n// CSS セレクタで複数要素を取得\nconst cards = document.querySelectorAll('.task-card');\ncards.forEach(card => console.log(card.textContent));\n\n// 要素の作成と追加\nconst newItem = document.createElement('li');\nnewItem.textContent = '新しいタスク';\nconst list = document.getElementById('task-list');\nlist.appendChild(newItem);","codeNote":"createElement + appendChildでHTMLに新しい要素を動的に追加できる。これがTODOリストの「追加」機能の核心部分。document.createElementで要素を作り、.textContentで中身を書き、.appendChildで親要素の末尾に追加する。","mistakes":["取得した要素がnullになる → idやclass名のスペルミス、またはJSが実行されるタイミングが早くてまだDOMが構築されていない可能性がある。scriptタグをbodyの末尾に置くか、DOMContentLoadedイベントを使う","querySelect と querySelector が混同する → querySelectorは最初の1つを返す。querySelectorAllはすべてをNodeListで返す","NodeListはforEachが使えるが、mapやfilterは使えない → NodeListをArrayに変換するにはArray.from(nodeList)を使う"],"miniEx":"hello.htmlに<h1 id=\"greeting\">Hello<\/h1>と<button id=\"change-btn\">変更<\/button>を追加しよう。JS側でボタンを取得してクリックしたときにh1のテキストを変更する処理を書いてみる（addEventListenerは次のステップで学ぶ）。"},{"num":"02","title":"addEventListenerでイベントを監視する","dur":"50分","why":"addEventListenerはユーザーのアクション（クリック・入力・キー押下など）に反応するための仕組み。AJのツールのすべてのボタン処理はこのパターンで書かれている。これをマスターすれば「ボタンを押すと何かが起きる」が全部実装できる。","body":"addEventListener(イベント名, コールバック関数)という形式で使う。第1引数には「どのイベントを監視するか」、第2引数には「イベントが発生したときに実行する関数」を渡す。主なイベント名：'click'（クリック）・'input'（テキスト入力）・'change'（値変更）・'submit'（フォーム送信）・'keydown'（キー押下）。\n\nコールバック関数の引数（慣習的にeまたはevent）にはイベントの詳細情報が入っている。e.target.valueでイベントが発生した要素のvalue値を取得できる。e.preventDefault()でブラウザのデフォルト動作（フォーム送信によるページリロードなど）を止められる。\n\nバリデーション（入力値の検証）も重要。「入力が空のとき」「文字数が超えているとき」などの条件でreturnして処理を止める。AJのツールでも、タスクタイトルが空の場合は追加しないというバリデーションが実装されている。","code":"// HTML: <button id=\"add-btn\">追加<\/button>\n//        <input id=\"task-input\" type=\"text\">\n//        <ul id=\"task-list\"><\/ul>\n\nconst addBtn = document.getElementById('add-btn');\nconst taskInput = document.getElementById('task-input');\nconst taskList = document.getElementById('task-list');\n\naddBtn.addEventListener('click', () => {\n  const text = taskInput.value.trim(); // 前後の空白を除去\n\n  // バリデーション：空なら何もしない\n  if (text === '') {\n    alert('タスクを入力してください');\n    return;\n  }\n\n  // li 要素を作成してリストに追加\n  const li = document.createElement('li');\n  li.textContent = text;\n  taskList.appendChild(li);\n\n  // 入力欄をリセット\n  taskInput.value = '';\n});\n\n// Enterキーでも追加できるようにする\ntaskInput.addEventListener('keydown', (e) => {\n  if (e.key === 'Enter') addBtn.click();\n});","codeNote":"trim()はString型のメソッドで、文字列の前後の空白・改行を除去する。入力フォームの値には意図しない空白が含まれることがあるため、バリデーション前にtrim()を呼ぶのが慣習。","mistakes":["addEventListenerを呼んでいるのにイベントが発火しない → 要素の取得がnullになっていないか確認する（console.log(要素)で確認）","コールバック関数の引数を使わないのにeと書かなければいけないと思い込む → 使わない場合は引数を省略してOK：btn.addEventListener('click', () => { ... })","フォームのsubmitイベントでページがリロードされてしまう → e.preventDefault()を呼び忘れている"],"miniEx":"TODOリストのベース部分を作ろう。入力ボックス+追加ボタンを用意し、ボタンクリックで入力した文字がulリストに追加されるようにする。空入力のときは追加しないバリデーションも入れること。"},{"num":"03","title":"classListでスタイルを動的に変える","dur":"40分","why":"classListを使ったスタイルの切り替えはUIの状態管理の基本。「タスクが完了したら打ち消し線を表示する」「ボタンを押したらアクティブ状態にする」といった挙動がこれで実装できる。AJのツールのUI状態管理もこのパターンを多用している。","body":"classList.add('class名')で要素にCSSクラスを追加、classList.remove('class名')で削除、classList.toggle('class名')で「あれば削除・なければ追加」を切り替えられる。classList.contains('class名')はそのクラスが付いているかをtrue/falseで返す。\n\nCSSとの連携が重要。JSでクラスを追加したとき適用されるスタイルをCSSに書いておく。例えば.completedクラスにtext-decoration: line-throughを設定しておき、タスク完了時にJS側でclassList.add('completed')を呼ぶ。\n\ndata属性（data-*)も便利なテクニック。HTMLのタグにdata-id=\"123\"のような属性を付けておくと、JS側でelement.dataset.idで取得できる。要素に関連するデータを持たせたいときに使う。","code":"// CSS側の設定\n// .completed { text-decoration: line-through; color: #AAA; }\n\n// HTML: <li id=\"task-1\" data-id=\"1\">タスク1<\/li>\n//        <button onclick=\"completeTask(1)\">完了<\/button>\n\n// classList のメソッド\nconst task = document.getElementById('task-1');\n\ntask.classList.add('completed');        // クラスを追加\ntask.classList.remove('completed');     // クラスを削除\ntask.classList.toggle('completed');     // 切り替え\ntask.classList.contains('completed');   // 含むか確認\n\n// data属性の取得\nconst btn = document.querySelector('[data-id=\"1\"]');\nconsole.log(btn.dataset.id); // \"1\"","codeNote":"classList.toggle()はチェックボックスのオン/オフのような「2状態の切り替え」に最適。毎回add/removeを条件分岐で書くより、toggleを使う方が1行でシンプルに書ける。","mistakes":["classList.addで追加したクラスがCSSに定義されていない → JSでクラスを追加しても、そのクラスのCSSスタイルが定義されていなければ見た目は変わらない","classList.removeで存在しないクラスを削除しようとする → エラーは出ないが何も起きない。問題はないがclassList.containsで確認してから削除する習慣をつけよう","data-idの値が文字列として取得される → dataset.idは文字列型。数値として使うにはNumber(element.dataset.id)で変換する"],"miniEx":"TODOリストに「完了」ボタンを追加しよう。ボタンをクリックするとそのli要素にcompletedクラスが付き、CSS側でtext-decoration: line-throughが適用される。もう一度クリックすると完了が解除されるtoggle機能も実装する。"}],"exercise":{"title":"シンプルTODOリスト","desc":"HTML + CSS + JS のみで動くTODOリストを作ろう。ReactもFirebaseも使わない純粋なJS だけで実装することが今週のポイント。動くものを作り切ることを最優先にしよう。","items":["テキストボックスに入力して「追加」ボタンで項目が追加される","各項目に「完了」ボタンがあり押すと打ち消し線が表示される（toggleできる）","「削除」ボタンでリストから項目を消せる","入力が空のときは追加できない（バリデーション）","Enterキーでも追加できる","完成したらGitHubのest-practiceリポジトリにpushしてURLを共有"],"rubric":["追加・完了・削除の3機能が動作している","空入力のバリデーションが実装されている","Enterキーでの追加ができる","CSSで完了状態のスタイルが定義されている","GitHubに push して URL が共有されている"]},"faq":[{"q":"追加した要素にaddEventListenerが動かない","a":"動的に追加した要素には、後からaddEventListenerを設定する必要がある。または、liを追加するときにinnerHTMLで書くのではなくcreateElement + appendChildで作り、その要素に直接addEventListenerを設定する。"},{"q":"削除ボタンを押したときに「どの要素を削除するか」がわからない","a":"liを作るとき、削除ボタンのコールバック関数の中でそのliへの参照を使う（クロージャーを使った方法）。またはdata-id属性で識別子を持たせて、削除時にそのidで要素を検索して削除する。"},{"q":"buttonのtype属性を設定しないといけない？","a":"formタグの中にあるbuttonはtype=\"button\"を設定しないとデフォルトでtype=\"submit\"として動作し、ページがリロードされることがある。今週のTODOリストはformを使わない場合は問題ないが、formを使う場合は必ずtype=\"button\"を設定する。"}],"checklist":[{"text":"getElementByIdとquerySelectorで要素を取得してtextContentを書き換えられた","role":"coder"},{"text":"addEventListenerでclickイベントを処理できた","role":"coder"},{"text":"classList.add / remove / toggleでスタイルを切り替えられた","role":"coder"},{"text":"TODOリストの追加・完了・削除機能が動作した","role":"coder"},{"text":"空入力時のバリデーション処理を書けた","role":"coder"},{"text":"GitHubにpushしてURLを共有した","role":"coder"}],"refs":[{"title":"MDN — DOMの紹介","url":"https://developer.mozilla.org/ja/docs/Web/API/Document_Object_Model/Introduction","note":""},{"title":"MDN — addEventListener","url":"https://developer.mozilla.org/ja/docs/Web/API/EventTarget/addEventListener","note":""}],"hint":"今週作るTODOリストはAction Trackerの原型と同じ考え方で動いている。「なんだ、Action Trackerも結局これか」と思えたらこの週は成功。Firestoreとの接続があるかないかの違いだけ。"},{"id":7,"phase":1,"title":"JavaScript応用 — 非同期処理とFetch API","hours":"7〜9","target":"coder","prereqs":["Week 6完了（DOM操作・addEventListenerができる）","TODOリストを作れた","配列のforEach・map・filterが書ける"],"intro":"FirebaseへのデータアクセスはすべてPromise（非同期処理）ベースで書かれている。「非同期」とは、処理の完了を待ちながら他の処理も並行して進められる仕組みのこと。fetchAPIを使って外部のデータを取得する練習を通じてasync/awaitの読み書きに慣れよう。この感覚を持っておくとWeek 10のFirebase/Firestoreの理解が格段に楽になる。","goals":["Promiseの「成功（resolve）と失敗（reject）」の概念を説明できる","async functionとawaitを使って非同期処理を書ける","fetchで公開APIにリクエストし、結果をHTMLに表示できる"],"steps":[{"num":"01","title":"同期処理 vs 非同期処理","dur":"40分","why":"「なぜ非同期が必要なのか」を理解することが、async/awaitを正しく使うための第一歩。Firebaseへのアクセスは通常0.5秒〜数秒かかる。その間ブラウザが完全に停止していたらユーザーはひどい体験をする。非同期処理はそれを防ぐための仕組み。","body":"同期処理は「1つの処理が完了してから次の処理を実行する」方式。コードは上から順番に実行される。一方、非同期処理は「時間がかかる処理を開始したあと、完了を待たずに次の処理を進める」方式。処理が完了したときに「コールバック」が呼ばれる。\n\nJavaScriptはシングルスレッド（1つの処理しか同時にできない）で動くが、ブラウザのWeb APIsを使うことで非同期処理を実現している。fetchリクエストはWeb APIに委譲され、ブラウザが処理している間JSのメインスレッドは他の処理を進められる。\n\nsetTimeoutは非同期処理の最もシンプルな例。setTimeout(コールバック, ミリ秒)で指定した時間後にコールバックを実行する。この「今すぐじゃなくて後で実行される」感覚が非同期処理の基本。","code":"// 同期処理（上から順番に実行）\nconsole.log('1番目');\nconsole.log('2番目');\nconsole.log('3番目');\n// → 1番目, 2番目, 3番目\n\n// 非同期処理（setTimeoutで遅延）\nconsole.log('1番目');\nsetTimeout(() => {\n  console.log('2番目（1秒後に実行）');\n}, 1000);\nconsole.log('3番目');\n// → 1番目, 3番目, 2番目（1秒後）\n\n// なぜこうなるか:\n// setTimeoutは「1秒後にコールバックを実行する」という\n// 予約をして、すぐに次の行に進む（非同期）。\n// 1秒経ったらコールバックが呼ばれる。","codeNote":"「コールバック地獄」という言葉を聞いたことがあるかもしれない。非同期処理を入れ子のコールバックで書くと、インデントが深くなりコードが読みにくくなる現象のこと。これを解決するために生まれたのがPromiseであり、さらに読みやすく書けるのがasync/await。","mistakes":["「非同期処理は難しい」と思い込んでしまう → setTimeoutを使って試すと「後で実行される」感覚が掴みやすい。Consoleで実際に試してみよう","同期と非同期の実行順序が混乱する → 非同期はいつ実行されるかわからない（「後で」としかわからない）。その「後で」の処理を受け取るのがコールバック/Promise/async-await"],"miniEx":"DevToolsのConsoleを開いて以下を実行してみよう。console.log('A'); setTimeout(()=>console.log('B'), 0); console.log('C'); 出力される順序はAC Bになる理由を考えてみる（0msecでもsetTimeoutは非同期のキューに入る）。"},{"num":"02","title":"Promise と async/await","dur":"60分","why":"Promiseはコールバック地獄を解決するために生まれ、async/awaitはPromiseをさらに同期コードのように読みやすく書くための構文。AJツールのコードのFirebase処理はほぼ100%がasync/awaitで書かれているので、この書き方を読めるようになることが必須。","body":"Promiseは「非同期処理の結果（成功 or 失敗）を表すオブジェクト」。.then()で成功時の処理を、.catch()で失敗時の処理を書ける。複数の非同期処理を.then()でチェーンして書くことができる（Promiseチェーン）。\n\nasync/awaitはPromiseをより同期コードに近い形で書ける構文糖衣（syntax sugar）。asyncキーワードを関数の前に付けると、その関数はPromiseを返すasync functionになる。async function内でawaitを使うと、そのPromiseが完了するまで次の行の実行を待つ。\n\ntry/catchでエラーハンドリングを書く。tryブロック内でPromiseがrejectされると、catchブロックが実行される。非同期処理では必ずtry/catchでエラーハンドリングを書く習慣をつけよう。","code":"// Promiseチェーン（古い書き方）\nfetch('https://api.example.com/data')\n  .then(res => res.json())\n  .then(data => console.log(data))\n  .catch(err => console.error('エラー:', err));\n\n// async/await（現代の書き方・こちらを使う）\nconst fetchData = async () => {\n  try {\n    const res = await fetch('https://api.example.com/data');\n\n    if (!res.ok) {\n      throw new Error(`HTTP error: ${res.status}`);\n    }\n\n    const data = await res.json();\n    console.log(data);\n    return data;\n  } catch (err) {\n    console.error('取得失敗:', err);\n    // エラー時の処理（ユーザーへの通知など）\n  }\n};\n\nfetchData(); // 関数を呼び出す","codeNote":"async functionはPromiseを返すので、呼び出し側でもawaitできる。const data = await fetchData(); というように、返り値を受け取れる。ただし、awaitはasync functionの中でしか使えない点に注意。","mistakes":["await を async function 以外の場所で使ってしまう → awaitはasync functionの中でしか使えない。使おうとすると「SyntaxError: await is only valid in async functions」というエラーが出る","try/catchを書き忘れる → 非同期処理でエラーが発生したときcatchがないと「Unhandled promise rejection」という警告が出る。必ずtry/catchを書く","async functionの戻り値を受け取るのを忘れる → 関数をreturnで終わらせても、呼び出し側がconstで受け取っていなければ使えない"],"miniEx":"以下のコードをConsoleで試してみよう。const delay = ms => new Promise(resolve => setTimeout(resolve, ms)); const test = async () => { console.log('開始'); await delay(1000); console.log('1秒後'); }; test(); 「開始」と表示されてから1秒後に「1秒後」が表示されることを確認する。"},{"num":"03","title":"fetchで公開APIからデータを取得する","dur":"60分","why":"fetchは実際のFirebaseアクセスと同じパターン（async/await + try/catch + データの処理）で書く。公開APIで練習しておくと、Firebaseのデータ取得を書くときに迷わなくなる。","body":"fetchはブラウザ内蔵のHTTPリクエスト関数。URLを渡すだけでGETリクエストができ、.json()でレスポンスをJSONとして解析できる。async/awaitと組み合わせて使う。\n\nAPIとは「外部のデータやサービスにアクセスするためのインターフェース」。郵便番号→住所を変換するAPIや天気APIなど、無料で使える公開APIが多数ある。APIのURLをfetchに渡せばデータが取れる。\n\nローディング状態の管理も覚えておこう。fetchが完了するまでの間「検索中...」という表示を出すことで、ユーザーに「処理中」を伝えられる。処理前にローディング表示をONにして、処理後（成功・失敗どちらでも）OFFにする。","code":"// 郵便番号検索APIを使った例\n// APIドキュメント: https://zipcloud.ibsnet.co.jp/doc/api\n\nconst searchByPostcode = async (postcode) => {\n  const resultEl = document.getElementById('result');\n  resultEl.textContent = '検索中...'; // ローディング表示\n\n  try {\n    const url = `https://zipcloud.ibsnet.co.jp/api/search?zipcode=${postcode}`;\n    const res = await fetch(url);\n    const data = await res.json();\n\n    if (data.results === null) {\n      resultEl.textContent = '住所が見つかりませんでした';\n      return;\n    }\n\n    const addr = data.results[0];\n    resultEl.textContent =\n      addr.address1 + addr.address2 + addr.address3;\n  } catch (err) {\n    resultEl.textContent = '通信エラーが発生しました';\n    console.error(err);\n  }\n};\n\n// ボタンクリックで呼び出す\ndocument.getElementById('search-btn').addEventListener('click', () => {\n  const postcode = document.getElementById('postcode-input').value;\n  searchByPostcode(postcode);\n});","codeNote":"res.ok はHTTPレスポンスのステータスコードが200番台（成功）かどうかをチェックする真偽値。fetchはHTTPエラー（404・500など）でも例外を投げないため、res.okを確認してエラー処理を書く必要がある。","mistakes":["fetchのレスポンスを2回.json()しようとする → レスポンスのbodyはストリームで、一度読み取ると空になる。awaitとconst data = await res.json()の1回だけ呼ぶ","CORSエラーが出る → ブラウザのセキュリティ機能で、異なるドメインへのリクエストが制限されることがある。今週使う郵便番号APIはCORSを許可しているのでOK","ネットワークが遅いときにローディング表示を忘れる → fetchの前にローディング表示をONにして、try/catchどちらの終わりでもOFFにする（finallyを使うと便利）"],"miniEx":"郵便番号検索アプリの最小版を作ろう。テキストボックスに郵便番号を入力してボタンを押すと、APIに問い合わせて住所を表示する。CORSエラーなしで動く無料APIとして「zipcloud」（zipcloud.ibsnet.co.jp）を使う。"}],"exercise":{"title":"郵便番号検索アプリ","desc":"fetchとasync/awaitを使って、郵便番号を入力すると住所が表示されるアプリを作ろう。APIエラーとローディング状態の管理まで含めて実装すること。","items":["テキストボックスに郵便番号を入力して「検索」ボタンで住所が表示される","APIレスポンスを受け取るまで「検索中...」という表示を出す（ローディング）","住所が見つからない場合は「住所が見つかりませんでした」と表示する","通信エラー時は「通信エラーが発生しました」と表示する","try / catch でエラーハンドリングを実装する","GitHubにpushしてURLを共有"],"rubric":["fetchとasync/awaitを使って実装されている","ローディング表示が実装されている","住所が見つからない場合の処理がある","try/catchでエラーハンドリングが書かれている","GitHubにpushしてURLが共有されている"]},"faq":[{"q":"CORSエラーが出てfetchが動かない","a":"CORSエラーはブラウザのセキュリティ機能で、APIのサーバー側がCORSを許可していないと発生する。今週使う郵便番号API（zipcloud）はCORSを許可しているので問題ないはず。もし別のAPIを使おうとしてCORSエラーが出る場合は、CORS対応のAPIを選ぶか、バックエンドのプロキシ経由でアクセスする必要がある。"},{"q":"awaitをasync functionの外で使いたい","a":"awaitはasync functionの中でしか使えない（ESモジュールのトップレベルawaitを除く）。awaitを使いたい処理は必ずasync function内に書く。関数の外で非同期処理を実行したいなら、async functionを呼び出す形にする（例：fetchData().then(data => { ... })）。"},{"q":"fetchの第2引数は何？","a":"fetchの第2引数はリクエストのオプションを指定するオブジェクト。今週のGETリクエストでは省略してOK。POSTリクエスト（データを送信する場合）には{ method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) }のように書く。Firestoreのデータ書き込みにはFirebase SDKを使うのでfetchは使わない。"}],"checklist":[{"text":"Promiseの成功・失敗の概念を説明できた","role":"coder"},{"text":"async/awaitを使って非同期処理を書けた","role":"coder"},{"text":"fetchで公開APIにリクエストしてJSONデータを取得できた","role":"coder"},{"text":"ローディング表示を実装できた","role":"coder"},{"text":"try/catchでエラーハンドリングを実装できた","role":"coder"},{"text":"郵便番号検索アプリをGitHubにpushした","role":"coder"}],"refs":[{"title":"MDN — async function","url":"https://developer.mozilla.org/ja/docs/Web/JavaScript/Reference/Statements/async_function","note":""},{"title":"MDN — Fetch API の使い方","url":"https://developer.mozilla.org/ja/docs/Web/API/Fetch_API/Using_Fetch","note":""},{"title":"zipcloud 郵便番号検索API","url":"https://zipcloud.ibsnet.co.jp/doc/api","note":"練習に使える無料API"}],"hint":"awaitは「この行の処理が完了するまでここで待ってて」という意味。Firebaseへのデータ取得も全く同じパターン（const snap = await getDoc(docRef)）で書かれているので、この週の感覚を大事にして。"},{"id":8,"phase":1,"title":"JavaScript応用 — 配列操作・オブジェクト・データ変換","hours":"7〜9","target":"coder","prereqs":["Week 7完了（async/await・fetchが書ける）","forEachの基本操作ができる","Firestoreのデータ構造の概念を知っている"],"intro":"Firestoreからデータをgetすると、JavaScript側では「オブジェクトの配列」として届く。このデータをどうフィルタ・ソート・変換して画面に表示するかが、AJツールのUIロジックの核心部分。今週はmap・filter・reduceとオブジェクトのスプレッド構文・分割代入を集中的に練習する。","goals":["map・filter・reduceを組み合わせてデータを変換・集計できる","分割代入とスプレッド構文を使ってオブジェクトを操作できる","Firestoreのレスポンス形式に近いデータを変換してHTMLに表示できる"],"steps":[{"num":"01","title":"map・filter・reduce をマスターする","dur":"60分","why":"Firestoreから取得したタスクの配列を「完了済みだけフィルタ」「タスク名だけ取り出す」「完了率を計算する」という3つの操作がそれぞれmap・filter・reduceに対応する。この3つを使いこなせると、AJツールのデータ処理コードが一気に読めるようになる。","body":"mapは「配列の各要素を変換した新しい配列を返す」。filterは「条件に合う要素だけの新しい配列を返す」。reduceは「配列を1つの値に集約する」。forEachは副作用（表示・保存など）のための繰り返しで、戻り値がないという違いがある。\n\nこれらは「メソッドチェーン」でつなげて書ける。例えば「完了済みタスクのタイトルだけ取り出して大文字に変換する」は tasks.filter(t=>t.done).map(t=>t.title.toUpperCase()) と1行で書ける。\n\nAJのツールのコードを読むと、Firestoreのスナップショットをforから取り出してmapで画面表示用のオブジェクトに変換するパターンが頻出する。このパターンを今週身につけよう。","code":"// Firestore から取得したデータに似せたサンプルデータ\nconst tasks = [\n  { id: 't1', title: '認知セミナー準備', done: true,  lcId: 'HI', priority: 2 },\n  { id: 't2', title: 'EP面談', done: false, lcId: 'HI', priority: 1 },\n  { id: 't3', title: '週次報告書',      done: false, lcId: 'Keio', priority: 3 },\n  { id: 't4', title: 'LEADS準備',      done: true,  lcId: 'Keio', priority: 1 },\n];\n\n// filter: 未完了タスクだけ\nconst undone = tasks.filter(t => !t.done);\n// → [{id:'t2',...}, {id:'t3',...}]\n\n// map: タイトルだけ取り出す\nconst titles = tasks.map(t => t.title);\n// → ['認知セミナー準備', 'EP面談', '週次報告書', 'LEADS準備']\n\n// reduce: 完了数をカウント\nconst doneCount = tasks.reduce((acc, t) => acc + (t.done ? 1 : 0), 0);\n// → 2\n\n// メソッドチェーン: HI LC の未完了タスクのタイトル\nconst hiUndone = tasks\n  .filter(t => t.lcId === 'HI' && !t.done)\n  .map(t => t.title);\n// → ['EP面談']","codeNote":"reduceの第2引数（初期値）を忘れがち。reduce((acc, cur) => ..., 0) の「0」の部分が初期値。数値なら0、配列なら[]、オブジェクトなら{}から始めることが多い。","mistakes":["mapとforEachを混同する → mapは新しい配列を返す（変換）、forEachは何も返さない（副作用）。データを変換したいときはmap、displayやconsole.logはforEach","filter後の配列が空になって「データがない」と表示される → フィルタの条件式が間違っている可能性が高い。console.log(tasks.filter(...))で確認する","reduceで最初のaccがundefinedになる → 第2引数（初期値）を忘れている"],"miniEx":"ConsoleでDocumentタスクの完了率（完了数/総数 × 100）をreduceで計算してみよう。答えは50%（2/4）になるはず。"},{"num":"02","title":"分割代入とスプレッド構文","dur":"45分","why":"AJのツールのコードを読むと const { title, done, lcId } = task; というような分割代入と、{ ...task, done: true } というスプレッド構文が頻出する。これを「新しい構文」と見てスキップすると読めないコードが大量に出てくる。今週でマスターしよう。","body":"分割代入（Destructuring）はオブジェクトや配列から値を取り出して変数に代入する構文。const { name, age } = person; は const name = person.name; const age = person.age; と同じ意味だが、はるかに短く書ける。\n\nスプレッド構文（Spread）は配列やオブジェクトを「展開」する。オブジェクトのコピーや「一部を上書きした新しいオブジェクト」を作るときによく使う。Firestoreへのデータ保存時に「元のオブジェクトにupdatedAtを追加したもの」を作るのにも使える。\n\n関数の引数にも分割代入が使える。const renderTask = ({ title, done, lcId }) => { ... } という書き方で、オブジェクトを受け取りながら直接プロパティを展開できる。","code":"// ─── 分割代入 ───\nconst task = { title: 'EP面談', done: false, lcId: 'HI' };\n\n// 従来の書き方\nconst title = task.title;\nconst done  = task.done;\n\n// 分割代入（同じ意味・短く書ける）\nconst { title, done, lcId } = task;\n\n// 別名をつけることもできる\nconst { title: taskTitle, done: isCompleted } = task;\n\n// ─── スプレッド構文 ───\n// オブジェクトのコピー\nconst taskCopy = { ...task };\n\n// 一部を上書きした新しいオブジェクト（元は変更しない）\nconst completedTask = { ...task, done: true };\n\n// フィールドを追加\nconst taskWithTimestamp = {\n  ...task,\n  updatedAt: new Date().toISOString()\n};\n\n// 配列のスプレッド\nconst tasks = ['task1', 'task2'];\nconst newTasks = [...tasks, 'task3']; // コピー + 追加","codeNote":"スプレッド構文でオブジェクトをコピーするとき注意：ネストされたオブジェクトは「浅いコピー」になる。{ ...task } はtaskの直接プロパティはコピーするが、tasksの中の配列のような深い部分は同じ参照を共有する。","mistakes":["スプレッドで上書きする順番を間違える → { ...original, overrideField: newValue } の順番が重要。後に書いたものが優先される","分割代入で存在しないプロパティを取り出そうとしてundefinedになる → デフォルト値を設定できる: const { name = '未設定' } = obj"],"miniEx":"Firestoreのタスクオブジェクト { title, done, lcId, createdAt } に対して、分割代入でtitleだけ取り出し、スプレッドでdone: trueに更新したオブジェクトを作ってconsole.logしてみよう。"},{"num":"03","title":"実践：Firestoreデータを画面表示用に変換する","dur":"60分","why":"「Firestoreから来たデータ（生のオブジェクト）を、画面に表示するための形に変換する」という処理がAJツールの至る所にある。今週の練習で「mapでデータを変換 → DOM操作で表示」という一連の流れを体に染み込ませよう。","body":"FirestoreからのデータはJavaScriptのDate型ではなくFirestoreのTimestamp型で来ることがある。これをtoDate().toLocaleString('ja-JP')で日本語の日時文字列に変換するパターンは頻出。実際のツールのコードで確認できる。\n\nLC一覧を表示するとき、データをLCごとにグループ化するreduce、優先度順にソートするsort、表示可能かチェックするfilterを組み合わせる処理も多い。これらをメソッドチェーンで書くか、読みやすさのために変数に分けて書くかは、コードのスタイル次第。\n\nDOM操作との組み合わせ：mapで「表示用のHTML文字列の配列」を作り、join('')でつなげてinnerHTMLに設定するパターン（テンプレートリテラルとmapの組み合わせ）が最もよく使われる。","code":"// Firestore の onSnaps
