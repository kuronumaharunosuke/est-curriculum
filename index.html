hot コールバックに近いパターン\n// ─── データを表示用に変換して DOM に反映 ───\n\nconst renderTasks = (tasks) => {\n  const list = document.getElementById('task-list');\n\n  if (tasks.length === 0) {\n    list.innerHTML = '<p>タスクはありません<\/p>';\n    return;\n  }\n\n  // filter → sort → map → join → innerHTML という流れ\n  list.innerHTML = tasks\n    .filter(t => !t.archived) // アーカイブ済みを除外\n    .sort((a, b) => a.priority - b.priority) // 優先度順\n    .map(t => `\n      <div class=\"task-item ${t.done ? 'done' : ''}\">\n        <span>${t.title}<\/span>\n        <span class=\"lc\">${t.lcId}<\/span>\n        <span class=\"priority\">${t.priority}<\/span>\n      <\/div>\n    `)\n    .join('');\n};\n\n// sort の書き方\n// 昇順:  (a, b) => a.priority - b.priority\n// 降順:  (a, b) => b.priority - a.priority\n// 文字列: (a, b) => a.title.localeCompare(b.title, 'ja')\n// 日時:  (a, b) => new Date(a.date) - new Date(b.date)","codeNote":"map + join('')でHTMLを生成するパターンはinnerHTMLと相性が良く、AJツールのコードで最も頻出するパターンの1つ。これを使うとcreateElement + appendChildより少ないコードで同じことができる。","mistakes":["sortが元の配列を変更してしまう → sortは元の配列を直接変更する（破壊的メソッド）。元を変えたくなければ [...tasks].sort(...) でコピーしてからソートする","mapの中でDOMを操作しようとする → map内でappendChildを呼ぶのは悪いパターン。mapはデータの変換だけに使い、DOM操作は別に行う"],"miniEx":"上のrenderTasks関数を実際に動かしてみよう。4件のタスクサンプルデータを渡して、優先度順に並んだリストがDOMに表示されることを確認する。"}],"exercise":{"title":"タスクダッシュボード（フィルタ・集計付き）","desc":"Firestoreから来るデータに似せたサンプルデータを使って、複数のLC・タスクを管理するダッシュボードを作ろう。map・filter・reduceを全部使うこと。","items":["タスクの配列（最低8件、複数のLC・優先度・完了状態を含む）を定数で定義する","全LC一覧（重複なし）をSetかreduceで取り出してドロップダウンに表示する","LCフィルタで選んだLCのタスクだけ表示する","完了数・未完了数・完了率（%）をreduceで計算して表示する","「優先度高順」「タイトル順」のソート切り替えボタンを実装する","GitHubにpushしてURLを共有する"],"rubric":["map・filter・reduceがすべて使われている","分割代入またはスプレッド構文が1箇所以上使われている","フィルタが動作する","完了率がreduceで計算されている","GitHubにpushされている"]},"faq":[{"q":"sort((a,b)=>a.priority-b.priorityの意味がわからない","a":"sort()は比較関数の戻り値が「負の数→aが前」「正の数→bが前」「0→同じ」という規則で動く。a.priority - b.priority が負になるのはaの方が小さい（優先度が低い番号）ときで、aが前に来る。つまり昇順になる。"},{"q":"Set で重複なし配列を作る方法","a":"[...new Set(tasks.map(t => t.lcId))] でタスクのlcIdから重複なしの配列が作れる。new Set()は重複を自動で除去するデータ構造で、スプレッドで配列に変換できる。"}],"checklist":[{"text":"map・filter・reduce を使ったデータ変換を書けた","role":"coder"},{"text":"分割代入かスプレッド構文を1箇所以上使えた","role":"coder"},{"text":"sort を使ってデータを並び替えられた","role":"coder"},{"text":"タスクダッシュボードをGitHubにpushした","role":"coder"}],"refs":[{"title":"MDN — Array.prototype.map()","url":"https://developer.mozilla.org/ja/docs/Web/JavaScript/Reference/Global_Objects/Array/map","note":""},{"title":"MDN — 分割代入","url":"https://developer.mozilla.org/ja/docs/Web/JavaScript/Reference/Operators/Destructuring_assignment","note":""}],"hint":"この週の内容はFirestoreのデータをUIに表示する処理と完全に一致している。Week 13以降でAction Trackerのコードを読むとき「あ、これはmapで変換しているんだ」と気づける状態になっておこう。"},{"id":9,"phase":1,"title":"ミニプロジェクト — LocalStorageを使ったTODOアプリ","hours":"8〜10","target":"coder","prereqs":["Week 8完了（map・filter・reduce・分割代入ができる）","Week 6のDOMイベント操作ができる","GitHubにpushができる"],"intro":"これまでのHTML・CSS・JavaScript・非同期処理・データ変換を全部組み合わせて、1つの完成したアプリを作る週。Firebaseを使わずにlocalStorageでデータを永続化するミニTODOアプリを仕上げる。「動くものを1つ完成させた」体験が、Phase 2以降の自信になる。","goals":["localStorage を使ってページリロード後もデータが残るTODOアプリを作れる","複数のJSファイルをモジュールとして分割できる","GitHub Pagesでアプリを公開してURLをシェアできる"],"steps":[{"num":"01","title":"localStorageでデータを永続化する","dur":"50分","why":"今まで作ったTODOアプリはページをリロードするとデータが消えた。localStorageを使うとブラウザにデータを保存でき、リロードしても残る。これはFirestoreへの書き込みと似た「保存する」という概念の練習になる。","body":"localStorageはブラウザが提供するKey-Valueストレージ。setItem(key, value)で保存、getItem(key)で取得、removeItem(key)で削除できる。ただしvalueは文字列しか保存できないため、配列やオブジェクトはJSON.stringify()で文字列に変換して保存し、取り出すときはJSON.parse()で元の形に戻す。\n\nデータの保存タイミングはタスクの追加・完了・削除のたびにsaveTasks()を呼ぶ。ページ読み込み時にloadTasks()を呼んでlocalStorageから初期データを取得する。このパターンはFirestoreの「書き込み時にaddDoc()、読み込み時にgetDocs()」と構造が同じ。","code":"// localStorage を使ったTODO の保存・読み込み\nconst STORAGE_KEY = 'todo-tasks-v1';\n\n// タスクを保存する\nconst saveTasks = (tasks) => {\n  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));\n};\n\n// タスクを読み込む（なければ空配列）\nconst loadTasks = () => {\n  const raw = localStorage.getItem(STORAGE_KEY);\n  return raw ? JSON.parse(raw) : [];\n};\n\n// タスクを追加する\nconst addTask = (title) => {\n  const tasks = loadTasks();\n  const newTask = {\n    id: Date.now().toString(), // 簡易ID\n    title,\n    done: false,\n    priority: 'medium',\n    createdAt: new Date().toISOString()\n  };\n  saveTasks([...tasks, newTask]); // スプレッドで配列に追加\n  render();\n};\n\n// 完了状態を切り替える\nconst toggleTask = (taskId) => {\n  const tasks = loadTasks().map(t =>\n    t.id === taskId ? { ...t, done: !t.done } : t  // スプレッドで更新\n  );\n  saveTasks(tasks);\n  render();\n};\n\n// 削除\nconst deleteTask = (taskId) => {\n  const tasks = loadTasks().filter(t => t.id !== taskId);\n  saveTasks(tasks);\n  render();\n};","codeNote":"Date.now()は現在の時刻をミリ秒で返す数値。タスクの簡易IDとして使うと、同じ時刻に複数作成しない限り重複しない。本番ではcrypto.randomUUID()が推奨だが、今は練習なのでDate.now()で十分。","mistakes":["JSONをparse/stringifyし忘れてオブジェクトが\"[object Object]\"という文字列になる → オブジェクトを保存するときは必ずJSON.stringify、取り出すときはJSON.parseを使う","localStorageはlocalhost以外でも動くが、容量制限（約5MB）がある → 今週の練習では問題ない","シークレットモードではlocalStorageがセッション終了時にクリアされる → 普通のウィンドウで確認する"],"miniEx":"DevToolsのApplicationタブ（Cmd+Option+I → Application → Local Storage → http://127.0.0.1:5500）を開きながらタスクを追加してみよう。localStorageにJSON文字列が保存されることをリアルタイムで確認できる。"},{"num":"02","title":"アプリを機能的に完成させる","dur":"3〜4時間","why":"「動くものを1つ完成させる」体験が目的。すべての機能を完璧に実装しようとして詰まるより、コア機能（追加・完了・削除）を確実に動かしてから拡張機能を追加していく進め方が効果的。","body":"まずコア機能（タスク追加・完了切り替え・削除・localStorageで永続化）を動かそう。その後、余裕があれば拡張機能として「フィルタ（全件/完了/未完了）」「優先度設定」「タスク数の表示」を追加する。\n\nUIはWeek 4で学んだFlexboxを使ってシンプルに整える。AIESEC Japanのブランドカラー（Navy #1A1A4E・Blue #00AEEF）を使ってAJらしいデザインにしてみよう。\n\n完成したらGitHub Pagesで公開しよう。リポジトリのSettingsからPagesを設定すると、GitHubのURLでアクセスできるようになる。","code":"// アプリの全体構造\n// ─── ファイル構成 ───\n// index.html    ← HTML構造\n// style.css     ← スタイル\n// storage.js    ← localStorage操作\n// render.js     ← DOM描画\n// main.js       ← イベント処理・起動\n\n// main.js（エントリポイント）\nimport { loadTasks, addTask, toggleTask, deleteTask } from './storage.js';\nimport { render } from './render.js';\n\n// DOM が読み込まれたら初期化\ndocument.addEventListener('DOMContentLoaded', () => {\n  render(loadTasks()); // 初期表示\n\n  document.getElementById('add-form')\n    .addEventListener('submit', (e) => {\n      e.preventDefault();\n      const input = document.getElementById('task-input');\n      if (input.value.trim()) {\n        addTask(input.value.trim());\n        input.value = '';\n        render(loadTasks());\n      }\n    });\n});\n\n// GitHub Pages で公開する手順:\n// 1. リポジトリを GitHub に push\n// 2. Settings → Pages → Source: main ブランチ\n// 3. https://[ユーザー名].github.io/[リポジトリ名] でアクセス可能","codeNote":"JSモジュール（import/export）はhtmlのscriptタグにtype=\"module\"を追加しないと動かない: <script type=\"module\" src=\"main.js\"><\/script>。Live Serverで開いても動作するが、Chromeで直接ファイルを開くとCORSエラーが出る場合がある。","mistakes":["GitHub Pagesで公開したのにページが真っ白 → JSのimportパスが大文字小文字不一致、またはファイルが存在しない場合が多い。DevToolsのConsoleでエラーを確認する","localStorageに古いデータが残ってバグる → DevToolsのApplicationタブからlocalStorageをクリアする","型=\"module\"を付けてもimportが動かない → ブラウザのバージョンやLive Serverの設定を確認する"],"miniEx":"まずindex.htmlにtype=\"module\"を付けたscriptタグでmain.jsを読み込んでみよう。main.jsでconsole.log('loaded')と書いてブラウザに表示されることを確認する。"},{"num":"03","title":"GitHub Pagesで公開・コードレビュー依頼","dur":"30分","why":"「動くものを人に見せる」体験がモチベーション維持に直結する。はるのすけからのコードレビューを受けることで、Phase 2のコードリーディングとPhase 3のPR文化への橋渡しになる。","body":"GitHub Pagesで公開したURLをSlackの#est-学習に投稿しよう。はるのすけからコードレビューコメントが来たら内容を読んで理解する（修正は任意）。\n\n振り返り：Phase 1の8週間（Week 1〜9）を通じて「できるようになったこと」と「まだ弱いと感じること」をSlackに送る。Phase 2では「Gitの操作」と「Firebaseのデータ構造」を学ぶので、事前に「Gitとは何か」「Firebaseとは何か」を各自で調べておこう。","code":null,"codeNote":"GitHub Pagesは無料で静的ウェブサイトをHTTPS付きで公開できる。ポートフォリオや作ったアプリをシェアするときにも使えるので、使い方は今後も役立つ。","mistakes":["settingsからPagesを設定したのにURLが404になる → Pagesが有効化されるまで数分かかることがある。リポジトリがprivateの場合はGitHub Free planではPagesが使えない","main.jsではなくindex.htmlがルートにないと表示されない → リポジトリのルートにindex.htmlがあることを確認する"],"miniEx":"GitHub PagesのURLをスマホで開いてみよう。レスポンシブ対応ができているか確認し、表示崩れがあればその場でDevToolsのデバイスツールバーで調整する。"}],"exercise":{"title":"LocalStorageTODOアプリ — GitHub Pagesで公開","desc":"これまでのHTML・CSS・JSの集大成として、localStorage対応のTODOアプリを完成させてGitHub Pagesで公開しよう。","items":["コア機能：タスク追加・完了切り替え・削除が動作する","localStorage でページリロード後もデータが残る","DevToolsのApplicationタブでlocalStorageへの保存を確認したスクリーンショットを投稿する","GitHub Pagesで公開してURLをSlackに投稿する","余裕あれば：フィルタ機能（全件/完了/未完了）を追加する"],"rubric":["コア機能（追加・完了・削除）が動作している","リロード後もデータが残る（localStorage使用）","GitHub PagesのURLが有効でアクセスできる","Slackに投稿・はるのすけからのコードレビューを受けた"]},"faq":[{"q":"JSモジュール分割は必須？","a":"今週は任意。1ファイルで全部書いてもOK。ただし、将来的にコードが長くなると1ファイルで管理するのが難しくなるため、分割の練習として試してみることをおすすめ。"},{"q":"GitHub Pagesの公開URLはどこで確認できる？","a":"リポジトリの Settings → Pages → Your site is published at https://... という箇所に表示される。反映まで最大5分程度かかることがある。"}],"checklist":[{"text":"localStorageを使った保存・読み込みを実装した","role":"coder"},{"text":"コア機能（追加・完了・削除）が動作する","role":"coder"},{"text":"DevToolsのApplicationタブでlocalStorageを確認した","role":"coder"},{"text":"GitHub Pagesで公開してURLをSlackに投稿した","role":"coder"},{"text":"Phase 1振り返りをはるのすけに送った","role":"coder"}],"refs":[{"title":"MDN — localStorage","url":"https://developer.mozilla.org/ja/docs/Web/API/Window/localStorage","note":""},{"title":"GitHub Pages 公式","url":"https://docs.github.com/ja/pages","note":"公開手順"}],"hint":"「完成させた」体験が大事。完璧なコードより「GitHubのURLを誰かに送れる状態」の方が価値がある。詰まったら早めに相談して。"},{"id":10,"phase":1,"title":"Phase 1 実力確認","hours":"4〜6","target":"both","prereqs":["Week 7完了（async/awaitとfetchが書ける）","TODOリストを作れた","郵便番号検索アプリをGitHubにpushした"],"intro":"Phase 1の最後の週。この週は新しい知識は学ばず、これまでのHTML・CSS・JavaScriptを使って1つのミニプロダクトを作り切ることに集中する。うまくできないところがあればそれが「まだ弱いところ」。正直に把握してPhase 2に臨もう。一元化担当はこの週でツール棚卸しシートの骨格を完成させる。","goals":["HTML・CSS・JSを組み合わせた動的なページを自力で作り切れる","はるのすけのコードレビューを受け、フィードバックを理解して改善できる","Phase 2で学ぶGitとFirebaseについて事前調査ができる"],"steps":[{"num":"01","title":"【コーダー】ミニプロダクトを選んで作る","dur":"3〜4時間","why":"「動くものを作り切る」体験がプログラミング学習で最も大切な体験の1つ。完璧でなくていい。今の自分のレベルで動くものを1つ完成させることで、次のPhaseに進む準備が整う。","body":"以下の3つのうち1つを選んで作ろう。難易度はA＜B＜Cの順。自信がある人はCにチャレンジしよう。\n\n（A）タスク管理アプリ：タスクの追加・完了・削除・フィルター（全件/完了済み/未完了）機能付き。Week 6のTODOリストを発展させたもの。\n\n（B）AIESEC用語クイズ：質問と選択肢をJSの配列で管理し、スコアを計算して表示する。アニメーションや制限時間を追加してもOK。\n\n（C）AJツール紹介ランディングページ：Action TrackerとPakuri Trackerを紹介するレスポンシブなページ。Fetch APIを使って何かのデータを取得して表示する要素も入れると加点。\n\nどれも HTML・CSS・JSのみで実装すること（Firebase不使用）。","code":"// 選択肢 A のヒント：フィルター機能の実装\n// タスクを配列で管理して、表示するときにfilterする\n\nlet tasks = []; // {id, text, done} の配列\n\nconst renderTasks = (filter = 'all') => {\n  const filtered = tasks.filter(t => {\n    if (filter === 'active') return !t.done;\n    if (filter === 'done') return t.done;\n    return true; // 'all'\n  });\n\n  const list = document.getElementById('task-list');\n  list.innerHTML = filtered.map(t =>\n    `<li class=\"${t.done ? 'completed' : ''}\">\n      ${t.text}\n      <button onclick=\"toggleDone(${t.id})\">完了<\/button>\n      <button onclick=\"deleteTask(${t.id})\">削除<\/button>\n    <\/li>`\n  ).join('');\n};\n\n// フィルターボタン\ndocument.querySelectorAll('.filter-btn').forEach(btn => {\n  btn.addEventListener('click', () => renderTasks(btn.dataset.filter));\n});","codeNote":"Gitを使ってこまめにコミットする練習もしよう。機能を1つ追加するたびにgit add . && git commit -m \"feat: タスクフィルター機能を追加\" と実行する習慣が、Phase 3のGitHub Flowの準備になる。","mistakes":["「全部作ってからコミット」にしてしまう → 小さな単位でコミットする習慣をつけよう。「追加機能を1つ作ったらコミット」が基本","デザインに時間をかけすぎて機能実装が終わらない → 今週は機能優先。デザインは後から整える","innerHTMLのXSS問題 → ユーザー入力をinnerHTMLに直接入れるとXSS脆弱性が生まれる。今週はinnerHTMLを使ってもOKだが、本番コードではtextContentを使うかサニタイズが必要"],"miniEx":"作業開始前にgit init → git remote add originでGitHubリポジトリと接続し、機能を1つ作るたびにgit add . && git commit -m \"feat: ○○機能を追加\" を実行してみよう。"},{"num":"02","title":"【一元化】ツール棚卸しシートの骨格を作る","dur":"2〜3時間","why":"ツール棚卸しシートはESTのドキュメント整備の起点となる資料。「どのツールを引き継ぐか」を整理することで、Phase 4の引き継ぎ設計が大きく楽になる。はるのすけにヒアリングしながら作ることで、AJのツール全体像も把握できる。","body":"NotionまたはGoogleスプレッドシートを使い、以下の列を含むシートを作ろう：ツール名・URL・主な機能（1行説明）・利用対象者（LC/MC）・使用頻度（高/中/低）・引き継ぎ優先度（必須/できれば/不要）・現在の状態（稼働中/要修正/廃止検討）。\n\nAJには現在少なくともlc-tracker・pakuri-trackerの2つのツールがある。はるのすけに確認して他にもあれば追記する。各ツールについて自分でアクセスしてみて機能を確認してから書くと精度が上がる。\n\n「引き継ぎ優先度」を考えるときは「このツールがなくなったらLCの業務に支障が出るか？」という視点で判断する。","code":null,"codeNote":"棚卸しシートには「現在誰が管理しているか」「最後に更新されたのはいつか」も書いておくと、後の引き継ぎ設計で役立つ。","mistakes":["自分で判断できないツールを空欄のままにしておく → 「不明」と書いてはるのすけへの確認事項としてメモしておく","ツールのURLを入力せずに名前だけ書く → URLがないと実際に確認できない。必ずURL列を埋めること","使ったことないツールの機能を推測で書く → 必ず実際にアクセスして確認してから書く"],"miniEx":"まずはlc-trackerとpakuri-trackerの2つだけ行を作り、それぞれにアクセスして主な機能を1行で書いてみよう。"},{"num":"03","title":"振り返りとPhase 2への準備","dur":"30分","why":"「できなかったことを正直に把握する」ことが、Phase 2の学習効率を上げる最短ルート。できないことを隠してフェーズを進むと、後々大きな詰まりが生まれる。","body":"Phase 1の8週間を振り返り「できるようになったこと」と「まだ弱いと感じること」をそれぞれ箇条書きで書き出す。できなかったことを恥ずかしがる必要はない。むしろ「まだ弱い」を正確に把握することがPhase 2以降の学習の質を上げる。\n\nPhase 2では「Gitの操作」と「Firebase/Firestoreの仕組み」を学ぶ。事前に以下を調べておこう：①Gitとは何か（1文で説明できる程度）、②GitHubとGitの違い、③Firebaseとは何か（1文）、④FirestoreはどんなデータベースかSQL型と何が違うか。\n\n振り返りシートとPhase 2への事前調査メモははるのすけに送ること。","code":null,"codeNote":"振り返りに「HTMLは書けるようになったけどCSSがまだ迷う」「FetchAPIは動いたけど中身がよくわかっていない」のような具体性があると、はるのすけも的確にサポートできる。","mistakes":["「全部できました」と報告して次へ進む → 実際にできていないのに「できた」と報告すると後で詰まる。正直に書こう","Phase 2の予習をせずに次週を迎える → 「Gitとは何か」だけでもいいので事前に調べておくと最初の授業の吸収率が変わる"],"miniEx":"GitHubのlc-trackerリポジトリを開き「このコードは何語で書かれているか」「ファイルの種類は何か」を確認してから、「Phase 2で学ぶGitとは何か」を自分の言葉で1文書いてみよう。"}],"exercise":{"title":"選択課題 + 振り返りシート提出","desc":"以下の2つを両方完了させること。","items":["コーダー：ミニプロダクト（A/B/Cのいずれか）をGitHubにpushしてURLを共有","一元化：ツール棚卸しシートの骨格（Notion/スプレッドシート）を共有","全員：振り返りシート（できたこと/まだ弱いこと）をはるのすけに送る","全員：「Gitとは何か」「Firebaseとは何か」を各自で調べて1文で書いて送る"],"rubric":["ミニプロダクトがGitHubにpushされていて動作する","振り返りシートに「できたこと」と「まだ弱いこと」が具体的に書かれている","ツール棚卸しシートにlc-trackerとpakuri-trackerの情報が入っている","Gitの説明とFirebaseの説明が自分の言葉で書かれている"]},"faq":[{"q":"ミニプロダクトをどのくらいの完成度で提出すればいい？","a":"「すべての機能が動く」状態が目標。デザインの完成度は問わない。バグが残っていても「ここまで実装できました・ここで詰まりました」という状態で提出してOK。完璧を目指して提出できないより、7割できた状態で提出してフィードバックをもらう方が学習が進む。"},{"q":"振り返りで「まだ弱いこと」がたくさんあって不安","a":"8週間で大量の新しい概念を学んでいるので、弱いところがあるのは当然。大切なのは「弱いことに気づいていること」。気づいていない弱さより、気づいている弱さの方がずっと対処しやすい。正直に書いてはるのすけに共有しよう。"},{"q":"GitHubへのpushが途中で失敗する","a":"よくあるエラーと対処法：「error: failed to push some refs」→ GitHubのリポジトリとローカルの履歴が食い違っている。git pull origin main --rebase してから再pushする。「fatal: remote origin already exists」→ git remote set-url origin [URL]で上書きする。"}],"checklist":[{"text":"ミニプロダクト（A/B/Cのいずれか）をGitHubにpushした","role":"coder"},{"text":"はるのすけからコードレビューをもらい指摘内容を理解した","role":"coder"},{"text":"ツール棚卸しシートの骨格を作り共有した","role":"uni"},{"text":"振り返りシート（できたこと/まだ弱いこと）を送った","role":"both"},{"text":"「Gitとは何か」を1文で説明できるようにした","role":"both"},{"text":"「Firebaseとは何か」を1文で説明できるようにした","role":"both"}],"refs":[{"title":"GitHub Pages（作ったアプリを公開する）","url":"https://docs.github.com/ja/pages/getting-started-with-github-pages/about-github-pages","note":"余裕があればデプロイまで"},{"title":"Firebase公式（Phase 2の予習として眺めるだけでOK）","url":"https://firebase.google.com/","note":""}],"hint":"完璧なプロダクトを作ることより「動くものを作り切る」ことの方が今週は大事。詰まったら早めに相談して。8週間でこれだけ学んだことを誇りに思っていい。"},{"id":11,"phase":2,"title":"Git / GitHub の基本操作","hours":"5〜7","target":"both","prereqs":["Week 8完了（Phase 1全体の振り返りが終わっている）","GitHubアカウントを持っていてlc-trackerリポジトリを開ける","ターミナル（Mac:Terminal / Windows:PowerShellまたはWSL）を開ける"],"intro":"Gitはコードの変更履歴を管理するツール。「いつ・誰が・何を変えたか」をすべて記録し、問題が起きたときに以前の状態に戻せる。AJのツール開発はすべてGitとGitHubで管理されており、コードを触るにはGitの基本操作が必須になる。今週からいよいよPhase 2——「ツールを読む」フェーズが始まる。","goals":["git clone・add・commit・pushの流れをターミナルで実行できる","lc-trackerリポジトリをcloneして手元のVS Codeで開ける","GitHubのIssueを読みPull Requestのページを理解できる"],"steps":[{"num":"01","title":"Gitのインストールと基本コマンド","dur":"60分","why":"Gitのコマンド4つ（clone・add・commit・push）をマスターすれば、AJの開発に参加するのに十分。最初はCLI（コマンドライン）で覚え、慣れてからGitHub Desktopのような GUIツールを併用する方が理解が深まる。","body":"Gitがインストールされているか確認するにはターミナルでgit --versionを実行する。インストールされていなければMacはbrew install git、Windowsはgit-scm.comからインストーラーをダウンロードする。\n\nGitを使い始める前に、名前とメールアドレスの設定が必要。git config --global user.name \"名前\" と git config --global user.email \"メール\" を実行する。コミット履歴にこの情報が記録される。\n\nGitの基本的な作業フロー：①git clone（リモートリポジトリを手元にコピー）→ ②ファイルを編集 → ③git add .（変更をステージング） → ④git commit -m \"メッセージ\"（変更を履歴として記録） → ⑤git push origin main（GitHubにアップロード）。この5ステップがすべての基本。","code":"# Git の設定（初回のみ）\ngit config --global user.name \"はるのすけ\"\ngit config --global user.email \"yourname@example.com\"\n\n# リポジトリを clone する\ngit clone https://github.com/username/lc-tracker.git\ncd lc-tracker\n\n# 変更をステージングしてコミットする\ngit add .                         # 全ファイルをステージング\ngit add README.md                  # 特定ファイルをステージング\ngit commit -m \"fix: README の誤字を修正\"\n\n# GitHub に push する\ngit push origin main\n\n# 現在の状態を確認する\ngit status            # 変更されたファイルを確認\ngit log --oneline     # コミット履歴を1行で確認\ngit diff              # まだステージングしていない変更を確認","codeNote":"コミットメッセージはチームで規則を統一しよう。「feat: 機能追加」「fix: バグ修正」「docs: ドキュメント更新」「refactor: リファクタリング」「style: スタイル変更」という形式（Conventional Commits）が推奨されている。","mistakes":["git addしたが誤ったファイルを追加してしまった → git reset HEAD ファイル名でステージングを取り消せる","コミットメッセージが日本語で文字化けする → terminal の文字コードがUTF-8に設定されているか確認","git pushしたら「rejected」エラーが出る → リモートとローカルの履歴が食い違っている。git pull origin main を実行してから再pushする"],"miniEx":"ターミナルを開いてgit --versionで確認し、バージョンが表示されればOK。次にデスクトップに適当なフォルダを作り、git initを実行してみよう。git statusで「On branch main, No commits yet」と表示されることを確認する。"},{"num":"02","title":"lc-trackerをcloneしてVS Codeで開く","dur":"30分","why":"lc-trackerをcloneすることで、手元に全コードが揃う。Phase 2のすべての学習はこのcloneしたコードをVS Codeで開きながら進める。コードの中身は後で読む。まず「手元に揃えること」が目標。","body":"はるのすけからlc-trackerのリポジトリのURLを受け取り（または直接GitHubのページを開き）、git cloneを実行しよう。cloneが完了すると、現在のディレクトリにlc-trackerというフォルダが作成される。\n\nVS Codeの「ファイル → フォルダを開く」でlc-trackerフォルダを開くと、左側のエクスプローラーに全ファイルが表示される。フォルダ構成をざっと眺めて「どのファイルが何をしていそうか」の第一印象をメモしよう。コードを理解しなくていい。ファイル名だけ見てメモする。\n\nVS Codeのエクスプローラーで各ファイルをクリックして開いてみよう。Week 11・12で詳しく読むが、今週は「全体の地図を掴む」段階。","code":"# lc-tracker を clone する\ngit clone [はるのすけから受け取ったURL]\ncd lc-tracker\n\n# VS Code でこのフォルダを開く\ncode .   # ターミナルから VS Code を開くコマンド\n# または VS Code の「ファイル → フォルダを開く」\n\n# ファイル一覧を確認（ターミナルで）\nls -la\n\n# ブランチ一覧を確認\ngit branch -a\n\n# コミット履歴を確認\ngit log --oneline --graph","codeNote":"ターミナルでcode .を実行するにはVS Codeの「Shell Command: Install 'code' command in PATH」が設定されている必要がある。設定するにはVS CodeのコマンドパレットでShell Commandと入力して「Install 'code' command in PATH」を選ぶ。","mistakes":["cloneしたフォルダをVS Codeで開いたのに何も表示されない → 「フォルダを開く」ではなく特定のファイルを開いてしまっている可能性がある。VS Codeのファイルメニューから「フォルダを開く」で改めてlc-trackerフォルダを選択する","code .コマンドが見つからない → VS Codeの「Shell Command: Install 'code' command in PATH」を実行してから再起動する","cloneしたのに更新されない → cloneしたらそれで終わり。最新状態にするにはgit pull origin mainを実行する"],"miniEx":"cloneが完了したら、ターミナルでcd lc-tracker && ls -laを実行して全ファイルを表示しよう。次にgit log --oneline --graph を実行してコミット履歴を確認する。"},{"num":"03","title":"IssueとPull Requestの見方","dur":"30分","why":"IssueとPRはチーム開発のコミュニケーションの場所。「何を直すか・なぜ直すか」を記録することで、過去の意思決定を追跡できる。Phase 3でPRを出すようになるまでに、「良いPRとはどんな説明が書かれているか」を読んで感覚を掴んでおこう。","body":"GitHubのIssueは「バグ報告・機能リクエスト・TODO」を管理するチケット。タイトル・説明・ラベル・担当者が設定できる。Issueを開いて読むときは、タイトル・問題の説明・再現手順・期待される動作の流れで読んでいこう。\n\nPull Request（PR）はコードの変更提案。変更内容・なぜ変えたか・テスト方法が書かれているのが良いPR。lc-trackerの既存のPRを3件開いて「どんな情報が書かれているか」「レビューコメントはどんな内容か」を確認しよう。\n\n良いPRの構成：①タイトル（conventional commits形式）、②Close #Issue番号（このPRでcloseするIssue）、③変更の概要（何をなぜ変えたか）、④スクリーンショット（UIの変更がある場合）、⑤テスト方法（レビュアーが確認するための手順）。","code":"# GitHub で Issue・PR を操作する主なコマンド\n# （GitHub CLIが入っていれば使える）\n\n# GitHub CLI のインストール（任意）\nbrew install gh   # Mac の場合\n\n# Issue の一覧を見る\ngh issue list\n\n# 特定の Issue を開く\ngh issue view 5\n\n# PR の一覧を見る\ngh pr list\n\n# 特定の PR を開く（ブラウザで開く）\ngh pr view 10 --web\n\n# 今週は GitHub CLI 不要\n# GitHub のウェブサイトで読むだけでOK","codeNote":"IssueとPRは「コードの外にある重要なドキュメント」。「なぜこの処理がこう書かれているのか」は、コードを読むだけではわからないことがある。PRの説明とコメントを読むと背景がわかることが多い。","mistakes":["Issueを読んだが何を言っているかわからない → まずタイトルとラベルだけ読む。それでもわからなければ「この Issue は何を報告しているか」をはるのすけに質問する","PRが「Merged」「Closed」「Open」のどれかわからない → Mergedは取り込まれた変更、Closedは却下or取り消し、Openは現在進行中のレビュー待ち","コードのdiffの読み方がわからない → 緑（+）は追加された行、赤（-）は削除された行。これだけ覚えれば最低限読める"],"miniEx":"lc-trackerのIssuesタブを開いて、clsoed（クローズ済み）のIssueを3件選んで読んでみよう。それぞれのIssueに対応するPRがあれば、そのPRのdiff（変更内容）も確認してみる。"}],"exercise":{"title":"est-practice リポジトリをGitHubに作成・push","desc":"これまで作ってきたファイルをGitHubにアップロードしよう。gitの基本操作（clone / init / add / commit / push）の一通りを体験することが目標。","items":["GitHubでest-practiceという新しいリポジトリを作成","ローカルのest-practiceフォルダでgit init → git remote add → add → commit → pushを実行","lc-trackerをcloneしてVS Codeで開く","lc-trackerのIssuesタブを開き、クローズ済みのIssueを3件読んでそれぞれの内容をメモ","lc-trackerのPull Requestsタブを開き、Mergedのものを2件開いてdiffを確認する"],"rubric":["est-practiceがGitHubにpushされており、過去のファイルがある","lc-trackerがcloneできてVS Codeで開ける","Issueのメモ（3件）が共有されている","GitHubのPRのdiffが読めた"]},"faq":[{"q":"git initとgit cloneの違いは？","a":"git init=新しいGitリポジトリをローカルに作成する。git clone=既存のGitHubリポジトリをURLを指定してローカルにコピーする。新規プロジェクトを始めるときはgit init、既存のプロジェクトに参加するときはgit cloneを使う。"},{"q":"git pushしたら「Permission denied」エラーが出る","a":"GitHubへの認証が必要。現在のGitHubはパスワード認証を廃止しており、SSH認証またはGitHub CLIが必要。SSH認証の設定：ssh-keygenでSSHキーを生成してGitHubのSettings→SSH Keysに公開鍵を登録する。または、GitHub CLIをインストールしてgh auth loginを実行する。"},{"q":".gitignoreとは何か？","a":".gitignoreはGitで管理しないファイルを指定するファイル。node_modules/（大量の依存パッケージ）、.env（APIキーなどの秘密情報）、.DS_Store（MacのOS設定ファイル）などをGitHubにpushしないために使う。APIキーが含まれるファイルをpushしてしまうとセキュリティインシデントになるので、.envはgitignoreに必ず追加すること。"}],"checklist":[{"text":"git add / commit / pushの流れをターミナルで実行できた","role":"both"},{"text":"est-practiceをGitHubにpushできた","role":"coder"},{"text":"lc-trackerをcloneしてVS Codeで開けた","role":"both"},{"text":"lc-trackerのIssueを3件読んで内容をメモした","role":"both"},{"text":"lc-trackerのMergedなPRを2件開いてdiffを確認できた","role":"both"},{"text":".gitignoreの役割を説明できた","role":"both"}],"refs":[{"title":"サルでもわかるGit入門","url":"https://backlog.com/ja/git-tutorial/","note":"日本語で丁寧に解説"},{"title":"GitHub Desktop（GUIクライアント）","url":"https://desktop.github.com/","note":"CLIが苦手な人向け"},{"title":"Conventional Commits","url":"https://www.conventionalcommits.org/ja/","note":"コミットメッセージの書き方"}],"hint":"コミットメッセージは「feat: 機能追加」「fix: バグ修正」「docs: ドキュメント更新」という形式で書く習慣をつけよう。後で履歴を読んだとき「あのとき何をしたか」が一目でわかる。"},{"id":12,"phase":2,"title":"Firebase / Firestore の仕組み","hours":"6〜8","target":"both","prereqs":["Week 9完了（lc-trackerがcloneできている）","async/awaitを理解している","Gitの基本操作ができる"],"intro":"AJのツールはデータの保存・読み取りにFirebase（Googleが提供するBaaS: Backend as a Service）を使っている。中心となるのはFirestoreというNoSQLデータベース。「コレクション → ドキュメント → フィールド」という階層構造でデータを管理する。今週はコードを書かず、Firebase Consoleを開いてデータを直接見ることに集中しよう。「コードを読む前にデータの形を知る」が今週の最重要テーマ。","goals":["Firestoreの「コレクション・ドキュメント・フィールド」構造を図で説明できる","Firebase ConsoleでAJツールのデータを確認・検索できる","Google OAuthの認証フローをざっくり説明できる"],"steps":[{"num":"01","title":"Firebaseとは何か・なぜ使うのか","dur":"40分","why":"「なぜAJのツールでFirebaseを使っているのか」を理解することで、コードの設計判断が読めるようになる。技術選定には常に理由がある。その理由を知っているとコードを読む視点が変わる。","body":"FirebaseはGoogleが提供するアプリ開発プラットフォーム。データベース（Firestore）・認証（Authentication）・ホスティング（Hosting）・ストレージ・アナリティクスなど、アプリに必要なインフラが揃っている。\n\nAJがFirebaseを選んだ理由はいくつかある。①サーバーレス（自前のサーバーが不要）→ 維持費がほぼゼロ、②リアルタイムデータ同期（onSnapshot）→ ページをリロードしなくてもデータが自動更新される、③Google OAuthとの統合が簡単 → @aiesec.jpアカウントでのみログインできる制限が容易に実装できる、④従量課金で小規模なら無料枠内で収まる。\n\nBaaS（Backend as a Service）とは「バックエンド（サーバー・データベース・認証）の機能をクラウドサービスとして提供するもの」。これがあるとフロントエンドのJSだけで完結したアプリが作れる。","code":"// Firebase が提供する主な機能\n\n// ① Firestore（データベース）\n// NoSQL のクラウドデータベース\n// コレクション → ドキュメント → フィールドの構造\n// リアルタイム同期（onSnapshot）が特徴\n\n// ② Authentication（認証）\n// Google, GitHub, メール等でのログインを提供\n// @aiesec.jp ドメイン制限も設定可能\n\n// ③ Hosting（ホスティング）\n// 静的ファイル（HTML/CSS/JS）を公開できる\n// GitHub Pagesと似た役割\n\n// ④ Storage（ストレージ）\n// ファイル（画像・PDF）をアップロード・管理\n\n// AJ ツールは主に Firestore と Authentication を使っている","codeNote":"FirestoreはNoSQL（Not Only SQL）データベース。MySQLなどのSQL型データベースと違い、スキーマ（テーブルの構造定義）が不要で、ドキュメントごとに異なるフィールドを持てる柔軟な構造が特徴。一方、複雑なJOINクエリは苦手。","mistakes":["Firebaseの全機能を把握しようとして混乱する → 今週はFirestoreとAuthenticationの2つだけ理解すれば十分","Firebase=Firestoreだと思い込む → FirebaseはプラットフォームでFirestoreはその中のデータベース製品の名前"],"miniEx":"Firebase公式サイト（firebase.google.com）を開いてドキュメントのトップページを眺めてみよう。どんなプロダクトが並んでいるかを確認するだけでOK。"},{"num":"02","title":"Firestoreのデータ構造を理解する","dur":"60分","why":"Firestoreの「コレクション→ドキュメント→フィールド」という構造を理解していないと、Week 12でFirestoreの読み書きコードを読んだときに「この変数が何を指しているのか」がわからなくなる。まずデータの形を把握することが先。","body":"Firestoreのデータ構造はコレクション（collection）の中にドキュメント（document）が入り、ドキュメントの中にフィールド（field）がある3層構造。SQLのテーブル→行→列に対応するイメージ（ただし柔軟性がずっと高い）。\n\nlc-trackerでは「lcs」というコレクションに各LCのドキュメントが入っている。ドキュメントIDはLC名（例：HI）で、フィールドとして「lcName・tasks・goals」などが入っている。Firebase ConsoleからこのツリーをGUI上で確認できる。\n\nドキュメントのフィールドには様々な型がある。string・number・boolean・timestamp・array・map（オブジェクト）・reference（他のドキュメントへの参照）。lc-trackerのドキュメントを開いてどんな型のフィールドが使われているかを確認しよう。","code":"// Firestore のデータ構造（概念図）\n// コレクション: lcs\n//   ドキュメント: HI\n//     フィールド:\n//       lcName: \"一橋大学\" (string)\n//       lcId: \"HI\" (string)\n//       updatedAt: 2024-11-01 (timestamp)\n//       tasks: [    ← array\n//         { title: \"タスク1\", done: false },\n//         { title: \"タスク2\", done: true }\n//       ]\n//   ドキュメント: KeioUniversity\n//     フィールド: ...\n\n// JavaScript からの読み取り例\nconst docRef = doc(db, 'lcs', 'HI');\nconst snap = await getDoc(docRef);\nconst data = snap.data();\nconsole.log(data.lcName);   // \"一橋大学\"\nconsole.log(data.tasks);     // タスクの配列","codeNote":"コレクション/ドキュメント/フィールドのパスはスラッシュで表現される。lcs/HI/tasks というパス表現がコードに出てくる。コレクションは奇数レベル（1・3・5...）、ドキュメントは偶数レベル（2・4・6...）に来る。","mistakes":["コレクションとドキュメントの階層を逆に覚えてしまう → コレクション（複数のドキュメントの入れ物）の中にドキュメント（データの単位）が入る。ドキュメントの中にコレクション（サブコレクション）を作ることもできる","Firestoreのフィールドの型を間違える → 数値として保存すべきものを文字列で保存すると、後の計算で型変換が必要になる"],"miniEx":"Firebase Consoleを開いて（はるのすけから招待を受けてから）Firestoreのデータブラウザを開こう。lcsコレクションを開いて任意のLCのドキュメントを1つ選び、フィールド名と型と値をすべてノートに書き出す。"},{"num":"03","title":"Firebase Authenticationの仕組み","dur":"35分","why":"「@aiesec.jpアカウントでのみログインできる」仕組みの理解は、セキュリティの観点でも重要。将来ツールを修正するとき、誤ってこのドメイン制限を壊してしまわないように。","body":"AJのツールはFirebase AuthenticationのGoogle OAuthを使って認証している。Google OAuthのフローは「①ユーザーがログインボタンを押す → ②Googleの認証画面にリダイレクト → ③ユーザーがGoogleアカウントでログインを承認 → ④Firebaseが認証トークンを発行 → ⑤ツールに戻ってきてログイン完了」という流れ。\n\n「@aiesec.jpアカウントでのみ」という制限はFirebaseのセキュリティルールとアプリ側の2段構えで実装されている。ログイン後にユーザーのメールアドレスがaiesec.jpドメインかどうかをチェックし、違う場合はサインアウトさせる。\n\nFirestoreのセキュリティルールは「誰がどのデータにアクセスできるか」を定義するルール。lc-trackerのセキュリティルールを開いてみると、「認証済みのaiesec.jpドメインユーザーのみ読み書き可能」という設定が書かれているはず。","code":"// Firebase Authentication のフロー（コード概念）\n\n// ① Google ログインボタン\nconst loginBtn = document.getElementById('login-btn');\nloginBtn.addEventListener('click', async () => {\n  const provider = new GoogleAuthProvider();\n  const result = await signInWithPopup(auth, provider);\n  const user = result.user;\n\n  // ② ドメインチェック（@aiesec.jp 以外はサインアウト）\n  if (!user.email.endsWith('@aiesec.jp')) {\n    await signOut(auth);\n    alert('aiesec.jp のアカウントでログインしてください');\n    return;\n  }\n\n  console.log('ログイン成功:', user.email);\n});\n\n// ③ 認証状態の監視（ページリロードでも維持される）\nonAuthStateChanged(auth, (user) => {\n  if (user) {\n    console.log('ログイン中:', user.uid, user.email);\n  } else {\n    console.log('未ログイン');\n  }\n});","codeNote":"UIDはFirebaseが各ユーザーに割り当てる一意のID文字列。メールアドレスは変更できるが、UIDは変わらない。Firestoreのデータとユーザーを紐付けるときにUIDを使う。","mistakes":["OAuthとOpenIDの違いを気にしすぎる → 今は「Googleのログインボタンを押すとGoogleが認証を処理してくれる仕組み」という理解で十分","セキュリティルールの書き方を完全に理解しようとする → 今週は「ルールが存在してアクセス制御している」という認識があればOK。書き方の詳細はPhase 3以降で"],"miniEx":"lc-trackerのFirestoreルール（Firebase Console → Firestore → ルール タブ）を開いてみよう。「どの条件でアクセスを許可しているか」をざっと読んで、気になる表現をメモする。"}],"exercise":{"title":"Firestoreデータマップを描く","desc":"Firebase ConsoleでAJツールのデータ構造を確認し、図にまとめよう。「コードを読む前にデータの形を知る」がこの演習の目的。","items":["Firebase ConsoleにアクセスしてFirestoreのデータブラウザを開く","lcsコレクションの全ドキュメント一覧を確認する","任意のLC1件のドキュメントを開いて全フィールドを書き出す（フィールド名・型・値の例）","「どのフィールドが画面のどこに表示されているか」をlc-trackerの画面と見比べながら対応表を作る","Firestoreのデータ構造図（コレクション→ドキュメント→フィールドのツリー）を作成して共有する"],"rubric":["Firestoreのデータ構造図が作成されている","特定のLCのフィールド一覧が書き出されている","フィールドと画面表示の対応表がある","Google OAuthの認証フローが自分の言葉で説明できている"]},"faq":[{"q":"NoSQLとSQLの違いは？","a":"SQL（リレーショナルDB）は厳格なスキーマ（テーブル構造の定義）が必要で、JOINによる複数テーブルの結合が得意。Firestore（NoSQL）はスキーマ不要で柔軟な構造が持てるが、複雑なクエリは苦手。AJツールは「LCごとのデータ管理」という単純な構造なのでFirestoreが適している。"},{"q":"Firestoreのデータはリアルタイムで何人でも見られる？","a":"はい、onSnapshotを使うと複数ユーザーが同時にデータを見ていても、誰かが変更したときに全員の画面が自動更新される。ただしセキュリティルールで「ログインしたaiesec.jpユーザーのみ」という制限がある。"},{"q":"Firebase Consoleには誰でもアクセスできる？","a":"Firebaseプロジェクトのオーナーまたは編集権限を持つGoogleアカウントのみがConsoleにアクセスできる。はるのすけから招待（Googleアカウントのメールアドレスを伝えて追加してもらう）が必要。"}],"checklist":[{"text":"FirebaseがBaaSとして何を提供するかを説明できた","role":"both"},{"text":"コレクション・ドキュメント・フィールドの構造を図で描けた","role":"both"},{"text":"Firebase ConsoleでFirestoreのデータを確認できた","role":"both"},{"text":"特定のLCドキュメントのフィールドをすべて書き出せた","role":"both"},{"text":"Google OAuthの認証フローをざっくり説明できた","role":"both"},{"text":"Firestoreのセキュリティルールを開いて確認した","role":"uni"}],"refs":[{"title":"Firebase公式ドキュメント — Firestore","url":"https://firebase.google.com/docs/firestore","note":""},{"title":"Firebase Console","url":"https://console.firebase.google.com/","note":"データはここから確認する"},{"title":"Firestore データモデル入門","url":"https://firebase.google.com/docs/firestore/data-model","note":"公式のデータ構造解説"}],"hint":"Firestoreのデータ構造を「自分で図に描く」作業が一番大事。ConsoleをただGUIで眺めるだけでなく、紙や Notion に書き出してみると構造が頭に入る。"},{"id":13,"phase":2,"title":"Action Tracker コードリーディング①","hours":"6〜8","target":"coder","prereqs":["Week 10完了（Firestoreのデータ構造を理解している）","lc-trackerがcloneできてVS Codeで開ける","HTML・CSS・Flexboxの基礎がある"],"intro":"コードを読むときのコツは「全部理解しようとしない」こと。まずは大枠の構造を把握し、気になった箇所にコメントを追記していく。今週はlc-trackerのHTML/CSS部分を読む週。「コードを変更しない」で「読むだけ」に集中しよう。","goals":["index.htmlの全体構造（ヘッダー・サイドバー・メインエリア）を図で書き出せる","CSSでFlexboxが使われている箇所を3箇所以上特定できる","JSファイルがHTMLのどこで読み込まれているかを確認できる"],"steps":[{"num":"01","title":"フォルダ構成と各ファイルの役割を把握する","dur":"30分","why":"フォルダ構成の把握は「地図を手に入れる」作業。地図なしに細部を読んでも迷子になる。まず「全体のどこを読んでいるか」を常に把握できる状態を作ることが、コードリーディングの第一歩。","body":"VS Codeでlc-trackerを開き、ファイルツリーを眺める。index.html・スタイル（CSS）ファイル・JavaScriptファイルの構成を確認しよう。README.mdがある場合は必ず読む——開発者が「このプロジェクトの概要」を書いたドキュメントなので最初に読むべき資料。\n\n各ファイルの役割をメモしよう。例えば「index.html=ページのHTML構造」「style.css=スタイル定義」「main.js=メインのロジック」「firebase.js=Firebaseの初期化」のような形で。ファイル名は役割を示していることが多いので、拡張子と名前から推測できることも多い。\n\nnode_modulesフォルダがある場合は開かないでOK（大量のライブラリファイルが入っているフォルダ）。.gitignoreを開いてどのファイルがGit管理から除外されているかも確認しよう。","code":null,"codeNote":"README.mdが最も重要な出発点。「このリポジトリは何をするものか」「どう使うのか」「開発するにはどう設定するのか」が書かれているはず。","mistakes":["node_modulesフォルダを開いて中を見ようとする → 大量のファイルがあり迷子になる。今は無視してOK","全ファイルを一気に理解しようとする → まずファイル名から役割を推測するだけでOK。中身は後で読む"],"miniEx":"VSCodeのエクスプローラーで各ファイルを1つずつクリックして開き、先頭の数行だけ読んでみる。「このファイルはHTMLだ」「これはCSS」「これはJavaScriptのimport文で始まっている」という程度の確認でOK。"},{"num":"02","title":"index.htmlの骨格を読む","dur":"60分","why":"HTMLを上から順に読むと「ページの設計図」が見えてくる。特にheadタグの中（外部ライブラリの読み込み）とbodyタグの中の大枠構造（サイドバー・メインエリア）を把握することが目標。","body":"index.htmlを開いて上から順に読んでいく。わからない箇所には「// ここは何だろう」とVS Codeのコメントを追記して後で調べるようにしよう（後で削除するのを忘れずに）。\n\nheadタグの中を見ると「どんな外部ライブラリを読み込んでいるか」がわかる。scriptタグのsrcやlinkタグのhrefに見たことないURLがあれば、それがCDNから読み込む外部ライブラリ。Firebaseの場合は firebase/app.js や firebase/firestore.js のようなURLが並んでいるはず。\n\nbodyタグの中の大枠構造を把握しよう。クラス名が「sidebar」「main-content」「header」のように意味のある名前になっていれば、構造が読みやすい。DevToolsのElementsパネルでHTMLを選択しながら読むと、コードとブラウザ表示の対応関係がわかりやすい。","code":null,"codeNote":"わからない箇所はメモするだけにして先に進もう。「全部わかってから次に進む」では永遠に前に進めない。「わからないリスト」を作りながら読み進めるのがコードリーディングの基本スタイル。","mistakes":["完全に理解しようとして1行で止まってしまう → 今週のゴールは「大枠を掴む」こと。わからない行は「// ?」コメントを付けてスキップして先に進む","scriptタグとlinkタグの違いを混同する → link=CSS・その他リソースの読み込み、script=JavaScriptファイルの読み込み"],"miniEx":"DevToolsのElementsパネルを開いた状態でindex.htmlを開き、サイドバーの部分のHTMLタグをクリックして「このdiv（またはasideなど）がサイドバーを担当している」という対応を確認する。"},{"num":"03","title":"CSSのFlexboxが使われている箇所を特定する","dur":"40分","why":"Phase 1でFlexboxを学んだ知識をここで使う。「自分で書けること」と「他人が書いたコードで読めること」は別のスキル。他人のコードでFlexboxを見つけて「これは横並びにしているんだな」と理解できることが今週の到達点。","body":"VS CodeでCSSファイルを開き、Cmd+F（Windows: Ctrl+F）で「display: flex」を検索しよう。一致した箇所が何件あるか確認し、それぞれの箇所で「どの要素をどう配置しているのか」を読んでみよう。\n\nFlexboxの各プロパティの意味を確認しながら読む。justify-contentとalign-itemsがどの方向を制御しているか、flex-wrapが折り返しをするかどうか、gapが余白を設定しているかを確認する。Phase 1のFlexbox Froggyの知識がそのまま使える。\n\nDevToolsでFlexboxのオーバーレイを表示してみよう。FlexコンテナのHTMLタグをDevToolsで選択するとflexバッジが表示され、クリックするとFlexアイテムの配置がビジュアルで確認できる。「コードで書いてあること」と「ビジュアルで見えること」を対応させながら読もう。","code":null,"codeNote":"VS Codeの「Cmd+Shift+F」でプロジェクト全体を横断検索できる。「display: flex」だけでなく「justify-content」「align-items」「flex-wrap」も検索してみると、Flexboxが使われているすべての箇所がわかる。","mistakes":["Flexboxの箇所を見つけたが何をしているか全くわからない → DevToolsでそのCSSクラスが付いている要素を選択し、Flexboxオーバーレイを表示してみる。ビジュアルで見ると一気に理解できることが多い"],"miniEx":"VS Codeのプロジェクト横断検索（Cmd+Shift+F）で「display: flex」を検索し、ヒットした箇所を3つ選んで「どの要素を横並びにしているか」をメモする。"}],"exercise":{"title":"Week 11 演習","desc":"Week 11の内容を実践しよう。","items":["コード読解メモ（わかった点・わからなかった点）を作成して共有する","DevToolsを使いながらコードと画面表示の対応を確認する","気になった箇所を最低3つメモに残す"],"rubric":["コード読解メモが共有されている","具体的なコードの箇所とその説明が書かれている"]},"faq":[{"q":"コードを読んでも全くわからない。どうすればいい？","a":"まずファイル名・関数名・変数名だけを読んで「これは何をしている処理か」を推測してみよう。次にDevToolsで実際に動かしながら読む。それでもわからなければはるのすけに「この行は何をしていますか？」と聞くのが最速。"},{"q":"コードリーディングにはどれくらい時間がかかるの？","a":"慣れるまでは予想より3〜4倍時間がかかる。初めて読むコードは「1行に1分かかる」感覚でも普通。焦らず丁寧に読もう。"}],"checklist":[{"text":"Week 11の演習を完了した","role":"coder"},{"text":"コード読解メモをはるのすけに共有した","role":"coder"}],"refs":[{"title":"lc-tracker GitHub リポジトリ","url":"https://github.com/","note":""},{"title":"VS Code キーボードショートカット","url":"https://code.visualstudio.com/docs/getstarted/keybindings","note":"Cmd+クリック・Cmd+Shift+F等"}],"hint":"「わからない」を放置しないで、毎週1〜2つでもいいのではるのすけに質問しよう。"},{"id":14,"phase":2,"title":"Action Tracker コードリーディング②","hours":"6〜8","target":"coder","prereqs":["Week 11完了（index.htmlの大枠構造を把握している）","CSSのFlexbox箇所を3つ以上特定できた","Firestoreのデータ構造を図で描ける"],"intro":"先週把握したHTML/CSSの構造を踏まえて、今週はJavaScriptとFirebaseの処理を読む。「タスクを追加する」という1つのアクションに絞って、ユーザーがボタンを押してからデータがFirestoreに書き込まれるまでの流れをコードで追おう。処理の流れを追うことが今週の唯一の目標。","goals":["タスク追加ボタンのクリックからFirestore書き込みまでのコードを追える","addDoc / setDocなどFirestoreへの書き込み関数を特定できる","onSnapshotを特定しリアルタイム同期の仕組みを説明できる"],"steps":[{"num":"01","title":"タスク追加処理のコードを追う","dur":"60分","why":"1つのアクション（ボタンクリック）から追っていくのがコードリーディングの基本テクニック。全体を俯瞰しようとするより、1つの流れを上流から下流まで丁寧に追う方が理解が早い。","body":"「追加」ボタンを起点に処理の流れを追おう。まずDevToolsで追加ボタンのHTML要素を確認し、そのidまたはclass名をメモする。次にVS Codeでそのid/class名を検索（Cmd+F）し、addEventListenerまたはonClickが書かれた箇所を探す。\n\nその関数の中で何が行われているかを1行ずつ読む。わからない変数や関数名があったら「Cmd+クリック（定義ジャンプ）」で定義箇所に飛べる。複数のファイルをまたいで処理が書かれている場合も、このジャンプ機能で追跡できる。\n\nconsole.logを追加してデータの流れを確認するのも有効。「入力された値はこの段階でどんな形をしているか」をconsole.logで確認しながら読む。ただし確認が終わったら必ずconsole.logを削除すること。","code":"// コードを追うための実践テクニック\n\n// 1. ボタンのid を DevTools で確認\n//    例: id=\"add-task-btn\"\n\n// 2. VS Code で検索\n//    Cmd+F で \"add-task-btn\" を検索\n\n// 3. addEventListener の中を読む\n//    addBtn.addEventListener('click', async () => {\n//      const taskTitle = inputEl.value;\n//      await addTask(taskTitle); // 関数呼び出し\n//    });\n\n// 4. addTask 関数の定義を Cmd+クリックでジャンプ\n//    const addTask = async (title) => {\n//      await addDoc(collection(db, 'lcs', lcId, 'tasks'), {\n//        title: title,\n//        done: false,\n//        createdAt: serverTimestamp()\n//      });\n//    };\n\n// 5. console.log でデータを確認（後で削除）\n// console.log('[DEBUG] addTask called:', title, lcId);","codeNote":"Cmd+クリックはVS Codeで最も使う機能の1つ。関数名や変数名にカーソルを置いてCmd+クリックすると、その定義箇所にジャンプできる。複数ファイルをまたいでいても機能する。","mistakes":["コードを追っていて迷子になる → 今どこを読んでいるかをメモに書き留めながら読む。「今この関数の中にいる」と意識して読む","console.logを追加したまま忘れてpushしてしまう → 作業ファイルにコメントで「// TODO: remove console.log」を書いておくとPRのレビュー前に思い出せる"],"miniEx":"追加ボタンのidをDevToolsで確認し、VS Codeでそのidを検索して処理の流れを追う。「この行でこういうことをしている」という説明を1行ずつメモしながら進もう。"},{"num":"02","title":"FirestoreのaddDocとonSnapshotを特定する","dur":"50分","why":"addDocは「Firestoreにデータを書き込む」、onSnapshotは「Firestoreのデータが変わったときに自動で通知される」関数。この2つがAction Trackerの「追加→即座に画面に反映」という機能の核心部分を支えている。","body":"VS Codeのプロジェクト横断検索（Cmd+Shift+F）で「addDoc」「setDoc」「updateDoc」「getDocs」「onSnapshot」を検索してみよう。それぞれが何行に書かれているか確認し、その箇所を読んでいく。\n\nonSnapshotが特に重要。これは「Firestoreのコレクション/ドキュメントが変更されたときに自動でコールバックが呼ばれる」関数。Action Trackerに新しいタスクが追加されると、onSnapshotのコールバックが呼ばれてUIが再描画される——これがリアルタイム同期の仕組み。\n\nFirestoreへのデータ書き込みには4種類ある。addDoc（新しいドキュメントをIDを自動生成して追加）、setDoc（指定したIDでドキュメントを作成または上書き）、updateDoc（既存のドキュメントの特定フィールドを更新）、deleteDoc（ドキュメントを削除）。lc-trackerではどれが使われているかを確認しよう。","code":"// Firestore の読み書きパターン\n\n// データを書き込む（新しいドキュメントをIDを自動生成して追加）\nimport { addDoc, collection, serverTimestamp } from 'firebase/firestore';\n\nawait addDoc(collection(db, 'lcs', lcId, 'tasks'), {\n  title: taskTitle,\n  done: false,\n  createdAt: serverTimestamp()  // サーバー側の時刻を使う\n});\n\n// リアルタイムでデータを監視する（ページをリロードしなくても更新される）\nimport { onSnapshot, collection } from 'firebase/firestore';\n\nconst unsubscribe = onSnapshot(\n  collection(db, 'lcs', lcId, 'tasks'),\n  (snapshot) => {\n    // データが変わるたびにここが呼ばれる\n    snapshot.forEach((doc) => {\n      console.log(doc.id, doc.data());\n    });\n  }\n);\n\n// コンポーネントが削除されるときにリスナーを解除する\nunsubscribe();","codeNote":"serverTimestamp()はFirebaseサーバー側の現在時刻を書き込む関数。クライアント（ブラウザ）の時刻を使うとユーザーがPCの時計を変更することで改ざんできるため、サーバー側の時刻を使う方が正確。","mistakes":["onSnapshotのコールバックがいつ呼ばれるかわからない → ページを開いたとき（初期データ読み込み）と、データが変更されたとき（リアルタイム更新）の2パターンで呼ばれる","unsubscribeを呼ばないとどうなるか → ページを離れてもリスナーが残り続けてメモリリークの原因になる。コンポーネント削除時に必ず解除する"],"miniEx":"Cmd+Shift+FでonSnapshotを検索し、ヒットした箇所を開く。コールバック関数の中で何が行われているかを読んで「onSnapshotのコールバックでUIの何が更新されるか」をメモする。"},{"num":"03","title":"console.logを追加してデータの流れを確認する","dur":"40分","why":"「コードを読む」だけでなく「実際に動かして確認する」を組み合わせることで理解が格段に深まる。console.logデバッグはPhase 3のバグ修正でも毎回使うスキル。","body":"lc-trackerを手元で動かすか（Firebase の設定が必要な場合は後で）、あるいはコードを読みながら「このconsole.logを追加したらこういうデータが出るはず」という形で予測を立てながら読もう。\n\nFirestoreから取得したデータはJavaScriptのオブジェクト形式。snap.data()でドキュメントのフィールドがオブジェクトとして取れる。console.log(snap.data())を実行するとDevToolsのConsoleにオブジェクトが展開されて表示される。\n\nconsole.logを入れた後は作業が終わったら必ず削除すること。本番のコードにconsole.logが残っていると、機密データがConsoleに表示されたり（セキュリティ上の問題）、パフォーマンスに影響したりする。","code":"// デバッグ用 console.log の追加・削除のパターン\n\n// 追加時：[DEBUG] プレフィックスを付けると見つけやすい\nconsole.log('[DEBUG] onSnapshot called:', snapshot.size, 'docs');\n\nconst addTask = async (title, lcId) => {\n  console.log('[DEBUG] addTask:', { title, lcId }); // 追加\n\n  try {\n    await addDoc(collection(db, 'lcs', lcId, 'tasks'), {\n      title,\n      done: false,\n      createdAt: serverTimestamp()\n    });\n    console.log('[DEBUG] addTask success');  // 追加\n  } catch (err) {\n    console.error('[DEBUG] addTask error:', err); // 追加\n  }\n};\n\n// 確認が終わったら削除する（[DEBUG] で検索して全部消す）","codeNote":"[DEBUG]というプレフィックスを付ける習慣をつけると、後でconsole.logを全件削除するときに「[DEBUG]」でプロジェクト横断検索して一括で見つけられる。チームコードでの作業では特に有効なテクニック。","mistakes":["console.logを追加したまま忘れてコミットしてしまう → コミット前にgit diffで変更内容を確認する習慣をつける。PRを出す前に[DEBUG]で横断検索して全部削除する","console.logの内容が多すぎてConsoleが読めない → ログを絞る。特定の関数だけにconsole.logを入れて、その関数の処理を確認してから移動する"],"miniEx":"lc-trackerのJSファイルで「addDoc」を呼んでいる行の直前に console.log('[DEBUG] addDoc前:', title) を追加して（実際に動かせる場合）、ブラウザのConsoleに何が表示されるか確認しよう。確認後は削除する。"}],"exercise":{"title":"Week 12 演習","desc":"Week 12の内容を実践しよう。","items":["コード読解メモ（わかった点・わからなかった点）を作成して共有する","DevToolsを使いながらコードと画面表示の対応を確認する","気になった箇所を最低3つメモに残す"],"rubric":["コード読解メモが共有されている","具体的なコードの箇所とその説明が書かれている"]},"faq":[{"q":"コードを読んでも全くわからない。どうすればいい？","a":"まずファイル名・関数名・変数名だけを読んで「これは何をしている処理か」を推測してみよう。次にDevToolsで実際に動かしながら読む。それでもわからなければはるのすけに「この行は何をしていますか？」と聞くのが最速。"},{"q":"コードリーディングにはどれくらい時間がかかるの？","a":"慣れるまでは予想より3〜4倍時間がかかる。初めて読むコードは「1行に1分かかる」感覚でも普通。焦らず丁寧に読もう。"}],"checklist":[{"text":"Week 12の演習を完了した","role":"coder"},{"text":"コード読解メモをはるのすけに共有した","role":"coder"}],"refs":[{"title":"lc-tracker GitHub リポジトリ","url":"https://github.com/","note":""},{"title":"VS Code キーボードショートカット","url":"https://code.visualstudio.com/docs/getstarted/keybindings","note":"Cmd+クリック・Cmd+Shift+F等"}],"hint":"「わからない」を放置しないで、毎週1〜2つでもいいのではるのすけに質問しよう。"},{"id":15,"phase":2,"title":"Pakuri Tracker コードリーディング","hours":"5〜7","target":"both","prereqs":["Week 12完了（Action Trackerのタスク追加処理を追えた）","Firestoreのデータ構造を図で描ける","onSnapshotの役割を説明できる"],"intro":"Action TrackerとPakuri Trackerは同じFirebase/JSスタックで作られているが、目的が違うため設計も異なる。2つのツールを比較することで「はるのすけがどういう設計判断をしたか」が見えてくる。「なぜこう設計したのか」を考えながら読むとコードへの理解が一段深まる。","goals":["Pakuri Trackerの主要機能のコードを大まかに追える","Action Trackerとの設計の共通点・違いを3つ以上書き出せる","一元化担当は担当エリアのLCにツール使用状況をヒアリングできる"],"steps":[{"num":"01","title":"Pakuri Trackerをcloneして全体を把握する","dur":"45分","why":"2つのツールを「比較する」視点が今週の核心。同じ技術スタックで作られていても、解決したい問題が違えば設計が変わる。この「なぜ違うのか」を考えながら読むことで、単なるコード読解を超えて設計の思考法を学べる。","body":"Pakuri TrackerのリポジトリをはるのすけからURLを受け取ってcloneしよう。cloneしたら、まずはAction Trackerと同じ手順でフォルダ構成を把握する。README.mdがある場合は必ず最初に読む。\n\nファイル構成を確認したら、Action Trackerとの共通点を探そう。Firebase初期化・Authentication・Firestoreの読み書きは同じパターンのはず。逆に「Action Trackerにはあったがないもの」「Pakuri Trackerにしかないもの」もメモしていく。\n\nPakuri Trackerの「メイン機能」を把握しよう。Action Trackerは「LCごとのタスク・KPI管理」、Pakuri Trackerは「LCを横断した戦略・施策の共有」という目的の違いがある。この目的の違いがデータ構造の違いにどう反映されているかを意識して読もう。","code":"// ファイル構成の比較メモ例\n// Action Tracker:\n//   index.html（認証 + メインUI 一体型）\n//   全処理がほぼ1ファイルに集約\n//   Firestoreコレクション: lcs/[lcId]/tasks\n\n// Pakuri Tracker:\n//   index.html（投稿一覧・閲覧）\n//   Firestoreコレクション: posts/[postId]\n//   カテゴリ・タグの概念がある\n\n// 共通パターン:\n// const firebaseConfig = { ... }; // Firebase設定\n// initializeApp(firebaseConfig);   // 初期化\n// const auth = getAuth(app);       // 認証\n// const db = getFirestore(app);    // Firestore\n// onAuthStateChanged(...)          // ログイン状態監視","codeNote":"Pakuri Trackerを読むときは「投稿の追加・一覧表示・検索/フィルタ」の3つの処理を追うことに集中しよう。これがPakuri Trackerのコア機能。","mistakes":["両方のツールを同時に読もうとして混乱する → 今週はPakuri Trackerだけに集中。Action Trackerと比較するのは読み終わった後","コードを読まずにFirebase Consoleのデータ構造だけ見て終わる → データ構造とコードの両方を確認して初めて「設計の意図」が読み取れる"],"miniEx":"VS Codeでlc-trackerとpakuri-trackerを両方開いた状態にして（Cmd+Shift+Nで新しいウィンドウ）、それぞれのindex.htmlを開いて上から20行ずつ読み比べてみよう。"},{"num":"02","title":"Firestoreの設計を比較する","dur":"50分","why":"データ構造の設計は「そのアプリが何を大切にするか」の意思決定の結晶。なぜAction Trackerは「LCが親・タスクが子」という設計で、Pakuri Trackerは「投稿がフラット」な設計なのかを考えると、設計の思考法が身につく。","body":"Firebase Consoleで両方のツールのFirestoreを開き、コレクション構成を並べて確認しよう。Action Trackerは「LCという親の下にタスクという子がある」階層構造。Pakuri Trackerは「投稿がコレクションにフラットに並ぶ」構造になっているはず。\n\nこの設計の違いには理由がある。Action Trackerは「LCごとに独立したデータ管理」が目的なので、LC単位でデータをまとめる設計が合理的。Pakuri Trackerは「全LC横断で情報を閲覧・共有する」が目的なので、フラットな設計で全投稿を検索・フィルタしやすくなっている。\n\nFirestoreのクエリの観点でも違いが出る。Action Trackerは「特定のLCのタスクを取得」という単純なクエリで動く。Pakuri Trackerは「カテゴリ別フィルタ」「LC別フィルタ」「日時順ソート」などの複合クエリが必要になるので、インデックスの設定が必要になる場合がある。","code":"// Action Tracker のデータ設計（LCが主軸）\n// lcs/[lcId] → { lcName, tasks: [...], goals: {...} }\n// タスクを取得するとき: doc(db, 'lcs', lcId)\n// LCごとに独立している → 他LCのデータは不要\n\n// Pakuri Tracker のデータ設計（投稿が主軸）\n// posts/[postId] → {\n//   title, content, lcId, category,\n//   createdAt, authorId, likes: [...]\n// }\n// 全投稿を取得するとき: collection(db, 'posts')\n// カテゴリでフィルタ: where('category', '==', '認知')\n// LC別でフィルタ:     where('lcId', '==', 'HI')\n\n// 設計の違いが生まれた理由:\n// Action Tracker → 「LCが自分のデータを管理する」\n// Pakuri Tracker → 「全LCが情報を共有・検索する」","codeNote":"Firestoreのドキュメント内にarrayを持つか、サブコレクションを持つかも設計判断の1つ。arrayはドキュメント内に収まる小さなデータ向け、サブコレクションはデータが増える可能性がある場合に適している。","mistakes":["両方のデータ構造が同じと思い込む → 目的が違うので設計も違うのが自然。違いを見つけることが今週のメイン","Firestoreのクエリ制約を意識せずに設計を評価する → Firestoreは複合クエリ（複数のwhere）にはインデックスが必要、配列の全件取得は得意など、制約がある"],"miniEx":"Firebase Consoleで両ツールのコレクション構成を開き、「Action Trackerではどうしているか」「Pakuri Trackerではどうしているか」を比較した表を書いてみよう（ツール名 / コレクション名 / 主なフィールド / なぜこの設計か）。"},{"num":"03","title":"一元化担当：LCへのヒアリングを実施する","dur":"1〜2時間","why":"コードを読む週に一元化担当がLCヒアリングをする理由は、「ツールを実際に使っている人の声」を集めることで後のPhase 3での改善タスクの起点が生まれるから。ヒアリングなしで機能追加すると「誰も使わない機能」を作るリスクが高い。","body":"担当エリアのLCのIM担当またはメンバーにSlackでDMを送り、「ツールについて5〜10分ヒアリングさせてほしい」と依頼しよう。返信が来なければLC Presidentに転送してもらうか、Slackのチャンネルで質問する。\n\nヒアリングで聞くべき内容：①Action TrackerとPakuri Trackerを実際に使っているか（使用頻度）、②使いにくいと感じる点・ほしい機能はあるか、③どんな場面でツールを使うか（チームミーティング中・業務外など）、④ツールがなくなったら困るか。\n\nヒアリング結果はSlackかNotionにメモしてはるのすけに共有しよう。Phase 3のWeek 19の「自主課題」でこのヒアリング結果を使う。5件以上のフィードバックがあると課題として成立しやすい。","code":"// ヒアリング依頼メッセージのテンプレート\n// Slack DMで送る場合：\n\n/*\nこんにちは！AIESEC Japan MC IM担当の [名前] です。\n\n現在AJのデジタルツール（Action Tracker・Pakuri Tracker）の\n改善に取り組んでいます。\n\n5〜10分ほど、ツールの使い心地についてお聞きできますか？\nSlackのメッセージでも、短い通話でも大丈夫です。\n\n主に聞きたいこと:\n・ Action Tracker を普段使っているか\n・ 使いにくいと感じる点があるか\n・ あったら便利な機能はあるか\n\nよろしくお願いします！\n*/","codeNote":"ヒアリング依頼は返信率を上げるために「短く・具体的に・何を聞きたいか明示する」のが大切。「少しだけ聞かせてください」という導入が「ヒアリングをお願いしたい」より返信されやすい。","mistakes":["ヒアリング依頼を送ったが全く返信が来ない → 1週間待ってから別の手段（他のLCや別のメンバーへのDM）を試す","ヒアリングで「問題ない・使ってない」という回答ばかりになる → それ自体が重要なフィードバック。「使っていない理由」を深堀りしよう"],"miniEx":"ヒアリング依頼メッセージを作成し（上のテンプレートを参考に）、担当エリアのLC最低2件に送ろう。"}],"exercise":{"title":"2ツール比較レポート","desc":"Action TrackerとPakuri Trackerを比較したレポートを1ページ作成しよう。コーダーはコードの観点、一元化担当はユーザーヒアリングの観点から書く。","items":["両ツールのFirestoreコレクション構成を図で描く","設計の共通点を3つ以上書き出す","設計の違いを3つ以上書き出す（なぜ違うかも説明する）","一元化担当：LCヒアリングを最低2件実施してフィードバックを箇条書きにまとめる","レポートをNotionまたはテキストで作成してはるのすけに共有する"],"rubric":["両ツールのFirestoreコレクション構成図がある","設計の共通点・違いがそれぞれ3つ以上書かれている","「なぜ違うか」の理由が書かれている","ヒアリングフィードバックが5件以上ある（一元化担当）"]},"faq":[{"q":"Pakuri Trackerのリポジトリにアクセスできない","a":"プライベートリポジトリの場合、はるのすけからコラボレーター招待が必要。GitHubアカウントのメールアドレスをはるのすけに伝えて招待してもらおう。"},{"q":"LCヒアリングの返信が全然来ない","a":"まず所属しているLCのIM担当に連絡するのが最短ルート。他に、MC内の担当エリアのLCのPresidentへのDMか、LC Slackチャンネルへの投稿でも聞ける。「5分だけ」という短さを強調すると返信率が上がる。"},{"q":"Pakuri Trackerのコードが全然読めない","a":"今週は「全部読む」必要はない。「Firebase初期化・認証・コレクションへのアクセス方法」の3点だけ確認できればOK。残りはAction Trackerとの比較メモとして「違う点」と「同じ点」を書き出すだけでも十分。"}],"checklist":[{"text":"Pakuri TrackerをcloneしてVS Codeで開けた","role":"coder"},{"text":"両ツールのFirestoreコレクション構成を確認した","role":"both"},{"text":"設計の共通点・違いを3つ以上書き出した","role":"coder"},{"text":"担当エリアLCに連絡してヒアリングを実施した","role":"uni"},{"text":"ヒアリング結果を箇条書きでまとめた","role":"uni"},{"text":"2ツール比較レポートをはるのすけに共有した","role":"both"}],"refs":[{"title":"Firestore データモデル — ベストプラクティス","url":"https://firebase.google.com/docs/firestore/manage-data/structure-data","note":"フラット構造 vs 階層構造の選び方"},{"title":"Firestore クエリ入門","url":"https://firebase.google.com/docs/firestore/query-data/queries","note":"whereやorderByの使い方"}],"hint":"「比較する」視点が大切。同じ技術スタックで作られていても、問題が違えば設計も変わる。その判断の跡をコードから読み取ろう。"},{"id":16,"phase":2,"title":"セキュリティとアクセス制御の仕組み","hours":"5〜6","target":"both","prereqs":["Week 15完了（Pakuri Trackerのコードを読んだ）","Firebaseの認証フローを説明できる","Firestoreのセキュリティルールを開いたことがある"],"intro":"AJのツールは「@aiesec.jpアカウントでしかログインできない」という制限がある。これを壊してしまうと機密データが漏洩するリスクがある。今週はFirestoreのセキュリティルールの読み方・XSSの基本・コードを修正するときに気をつけるべきセキュリティチェックポイントを学ぶ。「動く」コードと「安全な」コードは別物。","goals":["FirestoreのセキュリティルールでアクセスをLCメンバーに限定している箇所を読んで説明できる","XSS（クロスサイトスクリプティング）の基本的なリスクと対策を説明できる","コードを修正するときのセキュリティチェックリストを使える"],"steps":[{"num":"01","title":"Firestoreセキュリティルールを読む","dur":"50分","why":"セキュリティルールを「なんとなく動いてるからいいや」で素通りすると、後でコードを修正したときに意図せず穴を開けてしまうリスクがある。「何をどう守っているのか」を理解しておけば、修正時の判断が安全になる。","body":"Firestoreのセキュリティルールは「誰が・どのデータに・何の操作を・どんな条件で」できるかを定義する。Firebase Consoleのルールタブで確認できる。\n\nルールの基本構造はmatch /コレクション/{ドキュメントID} { allow read, write: if 条件; } という形式。「条件」にrequest.auth != nullを書くとログイン必須になる。request.auth.token.emailには認証中のメールアドレスが入るので、.matches('@aiesec\\.jp$')でドメイン制限できる。\n\nAJツールの場合、ルールに問題があると「permission-denied」というFirestoreエラーが発生する（Week 22で詳しく学ぶ）。ルールを変更するときは必ずはるのすけに確認を取ること。","code":"// Firestore セキュリティルールの基本パターン\n// Firebase Console → Firestore → ルール タブで確認する\n\nrules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n\n    // lcs コレクション: ログイン済みの @aiesec.jp ユーザーのみ\n    match /lcs/{lcId} {\n      allow read, write: if\n        request.auth != null &&\n        request.auth.token.email.matches('@aiesec\\\\.jp$');\n\n      // tasks サブコレクション（同じ条件）\n      match /tasks/{taskId} {\n        allow read, write: if\n          request.auth != null &&\n          request.auth.token.email.matches('@aiesec\\\\.jp$');\n      }\n    }\n\n    // posts コレクション（Pakuri Tracker）\n    match /posts/{postId} {\n      // 読み取り: @aiesec.jp なら誰でもOK\n      allow read: if request.auth.token.email.matches('@aiesec\\\\.jp$');\n      // 書き込み: 自分の投稿のみ\n      allow write: if request.auth.uid == resource.data.authorId;\n    }\n  }\n}","codeNote":"rules_version = '2' は必ず先頭に書く。version 1と2でsub-collectionの扱いが変わる。現在のFirestoreはversion 2を使う。ルールは上から順に評価されるが、最初にallow条件を満たした時点で許可（or拒否）が確定する。","mistakes":["セキュリティルールを「テスト用に」全公開のままにする → rules_version = '2'; service cloud.firestore { match /databases/{database}/documents { match /{document=**} { allow read, write: if true; } } } のようなルールは本番では絶対NG","ルールを変更したのに反映されない → 変更後に「公開」ボタンを押す必要がある。また反映に数秒かかる"],"miniEx":"Firebase ConsoleでAJツールのFirestoreルールを開き、「どのコレクションに・どんな条件で・誰がアクセスできるか」を読んでNotionにメモしよう。"},{"num":"02","title":"XSSの基本とinnerHTMLの安全な使い方","dur":"40分","why":"XSS（クロスサイトスクリプティング）はユーザー入力を無検証でinnerHTMLに入れることで攻撃スクリプトを実行させられる脆弱性。AJのツールに外部からのユーザー入力（LCメンバーのテキスト入力）が含まれる場合、対策が必要。","body":"XSSの仕組み：input.valueをそのままinnerHTMLに入れると、ユーザーが<script>alert(1)<\/script>と入力したときスクリプトが実行される。これは悪意あるユーザーが他のユーザーのセッションを乗っ取ったり、データを盗んだりするために使える。\n\n対策の基本：ユーザー入力をHTMLとして解釈させない。①textContentを使う（HTMLとして解釈しない）、②DOMPurifyライブラリでサニタイズする、③テンプレートリテラルに入れる前にHTMLエスケープする（<→&lt; など）。\n\nAJのツールでは主にFirestoreから読み取ったデータをinnerHTMLに入れるケースがある。Firestoreへの書き込み時にサニタイズするか、表示時にtextContentを使えば安全。","code":"// XSS の例と対策\n\n// ❌ 危険（ユーザー入力をそのままinnerHTMLに）\nconst taskTitle = document.getElementById('input').value;\ndocument.getElementById('task').innerHTML = taskTitle;\n// → <script>alert('XSS!')<\/script> を入力すると実行される\n\n// ✅ 安全①: textContent を使う（HTML解釈しない）\ndocument.getElementById('task').textContent = taskTitle;\n\n// ✅ 安全②: HTMLエスケープ関数を使う\nconst escape = (str) => str\n  .replace(/&/g, '&amp;')\n  .replace(/<\/g, '&lt;')\n  .replace(/>/g, '&gt;')\n  .replace(/\"/g, '&quot;');\n\ndocument.getElementById('task').innerHTML = `\n  <span>${escape(taskTitle)}<\/span>\n`;\n\n// ✅ 安全③: DOMPurify（ライブラリ）を使う\n// import DOMPurify from 'dompurify';\n// element.innerHTML = DOMPurify.sanitize(userInput);","codeNote":"textContentはHTMLとして解釈しないため、タグが含まれていてもそのままテキストとして表示される。タイトルや説明文など「テキストのみ」で良いフィールドはtextContentを使うのが最も安全。","mistakes":["「AJの内部ツールだから外部攻撃者はいない」という考え → 内部の不満を持ったメンバーが意図的な入力をする可能性もある。また外部に漏れたアカウントが使われるケースもある","textContentとinnerHTMLをどちらでも同じと思い込む → textContentはHTMLタグが解釈されない、innerHTMLは解釈される。この違いがセキュリティに直結する"],"miniEx":"lc-trackerのコードで、ユーザー入力（input.value）をinnerHTMLに入れている箇所があるか探してみよう。あればそれをtextContentに変更するPR候補としてメモする。"},{"num":"03","title":"コード修正時のセキュリティチェックリスト","dur":"20分","why":"バグを直したり機能を追加したりするとき、「動く」ことを確認するだけでなく「安全か」も確認する習慣をつけることが、Phase 3以降でのコード修正の質を上げる。","body":"コードを修正したらPRを出す前に以下のチェックをしよう。①ユーザー入力をinnerHTMLに直接入れていないか。②APIキーやFirebaseの設定が.envやconfig.jsに分離されていてGitにコミットされていないか（.gitignoreに追加されているか）。③console.logに機密データ（メールアドレス・UID）を出力したままになっていないか。④Firestoreのセキュリティルールを意図せず変更していないか。\n\nこれらを習慣にするだけで、チームの信頼度が上がる。特に「console.logに個人情報を出力したまま本番にpush」は実際によくあるインシデント。","code":"// セキュリティチェックリスト（PRを出す前に確認）\n\n// □ 1. innerHTML にユーザー入力を直接入れていない\n//      → textContent か escape() 関数を使っているか確認\n\n// □ 2. APIキー・シークレットがコードに直書きされていない\n//      → git diff でコミット内容を確認\n//      → .gitignore に .env が含まれているか確認\n\n// □ 3. console.log に個人情報が残っていない\n//      → Cmd+Shift+F で \"console.log\" を全文検索\n\n// □ 4. Firestoreのセキュリティルールを変更していない\n//      → firebase.json や firestore.rules を git diff で確認\n\n// □ 5. 認証チェック（ログイン必須のページ）が残っているか\n//      → onAuthStateChanged の条件分岐を確認","codeNote":null,"mistakes":["「セキュリティは後で考える」という先延ばし → 後回しにするほど直しにくくなる。最初から意識する癖をつける"],"miniEx":"上のチェックリストを印刷またはNotionにコピーして、Phase 3からのPR提出前に毎回チェックする習慣をつけよう。"}],"exercise":{"title":"セキュリティレビュー実施","desc":"lc-trackerのコードにセキュリティの観点からのレビューを実施しよう。","items":["Firestoreのセキュリティルールを読んで内容を自分の言葉で説明できるようにする","lc-trackerで innerHTML にユーザー入力を入れている箇所があるか確認する（あればIssueを書く）","APIキーがGitにコミットされていないことを.gitignoreで確認する","一元化担当：LCメンバー向けの「パスワードの注意点」（例：AIESEC以外のパスワードを使い回さない）の告知文を作成する"],"rubric":["Firestoreセキュリティルールの説明が書かれている","xssの対策についての理解が示されている","セキュリティチェックリストを確認した"]},"faq":[{"q":"Firestoreのルールを誤って壊してしまったら？","a":"Firebase ConsoleのFirestore→ルール→変更履歴から過去のルールに戻せる。また、変更前にGitでルールファイルをコミットしておけばgit revertで戻せる。ルールを変更するときは必ずはるのすけに相談してから行うこと。"},{"q":"AJツールはHTTPS通信？","a":"Firebase HostingでデプロイするとデフォルトでHTTPS（SSL/TLS）が有効になる。GitHub Pagesも同様。HTTPSなら通信経路での盗聴は防げる。ただしXSSのようなアプリ自体の脆弱性はHTTPSでは防げないので、コードレベルの対策が必要。"}],"checklist":[{"text":"Firestoreセキュリティルールを読んで内容を説明できた","role":"both"},{"text":"XSSの基本的なリスクと対策（textContent/escape）を理解した","role":"coder"},{"text":"PRを出す前のセキュリティチェックリストをNotionにコピーした","role":"coder"},{"text":"APIキーが.gitignoreで管理されているかを確認した","role":"coder"}],"refs":[{"title":"Firestore セキュリティルール入門","url":"https://firebase.google.com/docs/firestore/security/get-started","note":"公式ドキュメント"},{"title":"OWASP XSS防止チートシート","url":"https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html","note":"XSSの詳しい対策"}],"hint":"セキュリティを意識する開発者は少ない。今から意識するだけで「セキュリティをわかってるエンジニア」として差別化できる。"},{"id":17,"phase":2,"title":"コードの品質・ESLintとリファクタリング","hours":"5〜7","target":"coder","prereqs":["Week 16完了（セキュリティの基本を理解している）","JavaScriptのコードを数百行読んだ経験がある"],"intro":"「動くコード」と「良いコード」は違う。良いコードは「次の人が読んで理解できる・変更しやすい・バグが混入しにくい」コードのこと。今週はESLintを導入してコードの品質を自動チェックし、AJツールのコードのリファクタリング候補を見つける練習をする。","goals":["ESLintをVS Codeに設定してJavaScriptのエラーを自動検出できる","「同じ処理を繰り返している箇所」を関数に切り出せる","変数名・関数名の命名規則を意識してコードを書ける"],"steps":[{"num":"01","title":"ESLintの導入と設定","dur":"40分","why":"ESLintは「コードを実行する前に静的解析してエラーや問題を検出するツール」。タイポ・未使用変数・危険なパターンを事前にキャッチできる。VS CodeにESLint拡張を入れると、エラーのある行に赤いアンダーラインが表示される。","body":"ESLintの設定は.eslintrc.jsonというファイルで行う。どのルールを有効にするかを選べる。「eslint:recommended」は基本的なルールセットで、ほとんどのプロジェクトで使われている。AJツールのリポジトリにeslint設定がなければ、今週追加するのが良い改善になる。\n\nよく使うESLintルール：no-unused-vars（使っていない変数を警告）、no-undef（定義していない変数を使ったときのエラー）、no-console（console.logを警告）、eqeqeq（==ではなく===を使う強制）。","code":"// .eslintrc.json（プロジェクトのルートに作成）\n{\n  \"env\": {\n    \"browser\": true,\n    \"es2021\": true\n  },\n  \"extends\": \"eslint:recommended\",\n  \"rules\": {\n    // === を強制（== は禁止）\n    \"eqeqeq\": \"error\",\n\n    // console.log は警告（本番に残さない）\n    \"no-console\": \"warn\",\n\n    // 未使用変数はエラー\n    \"no-unused-vars\": \"error\",\n\n    // const で定義すべき変数をエラー\n    \"prefer-const\": \"error\"\n  }\n}\n\n// package.json に scripts を追加\n// \"scripts\": {\n//   \"lint\": \"eslint src/**/*.js\"\n// }\n// → npm run lint でチェック実行","codeNote":"ESLintのエラーを全部消そうとしなくていい。まず「no-unused-vars」と「eqeqeq」の2つだけ対応するだけでもコードの品質が上がる。段階的に対応するのが現実的。","mistakes":["ESLint拡張機能を入れたのにVS Codeでエラーが表示されない → .eslintrc.jsonがプロジェクトのルートにあるか確認する","no-consoleルールを有効にしたら警告だらけになった → 今週は開発中なのでconsoleは許容。本番PRを出す前だけチェックするルールとして運用するのが現実的"],"miniEx":"lc-trackerの任意のJSファイルにESLintをかけてみよう。npm run lint または VS Codeのエラー表示で、何件の警告・エラーが出るかを確認してメモする。"},{"num":"02","title":"リファクタリング：重複コードを関数に切り出す","dur":"50分","why":"リファクタリングとは「外から見た動作を変えずに内部のコードの品質を向上させること」。コードを読んでいて「ほぼ同じ処理が2回以上書いてある」と感じたらリファクタリングの機会。重複を減らすと変更が1箇所に集中してバグが減る。","body":"「コードの重複（DRY原則 = Don't Repeat Yourself）」に気をつけよう。同じ処理が複数箇所にあると、1箇所を直したのに別の箇所を直し忘れるバグが発生しやすい。重複コードは関数に切り出して1箇所にまとめる。\n\nAJツールのコードを読んでいると、「Firebase初期化部分」「認証チェック部分」「エラーハンドリング部分」が複数ファイルにコピーされているケースがある。これらを共通モジュール（utils.js など）に切り出すのが良いリファクタリング。\n\n関数名の命名も重要。動詞＋名詞の形（例：fetchTasks・renderTaskList・toggleTaskDone）にすると「何をする関数か」が一目でわかる。","code":"// リファクタリング前（重複あり）\nconst displayHITasks = () => {\n  const tasks = hiTasks;\n  const el = document.getElementById('hi-list');\n  el.innerHTML = tasks.map(t =>\n    `<div>${t.title} - ${t.done ? '完了' : '未完了'}<\/div>`\n  ).join('');\n};\n\nconst displayKeioTasks = () => {\n  const tasks = keioTasks; // ← ここだけ違う\n  const el = document.getElementById('keio-list'); // ← ここも\n  el.innerHTML = tasks.map(t =>\n    `<div>${t.title} - ${t.done ? '完了' : '未完了'}<\/div>`\n  ).join('');\n};\n\n// ✅ リファクタリング後（関数に切り出す）\n// tasks と elementId を引数にまとめる\nconst renderTaskList = (tasks, elementId) => {\n  document.getElementById(elementId).innerHTML =\n    tasks.map(t =>\n      `<div>${t.title} - ${t.done ? '完了' : '未完了'}<\/div>`\n    ).join('');\n};\n\n// 呼び出し\nrenderTaskList(hiTasks, 'hi-list');\nrenderTaskList(keioTasks, 'keio-list');\n// 表示形式を変えたいときは renderTaskList を1箇所修正するだけでOK","codeNote":"「いつリファクタリングするか」の判断：同じコードが3回以上現れたとき（Rule of Three）がリファクタリングの目安。最初の2回は許容し、3回目が出たときに共通化する。","mistakes":["動作するコードをリファクタリングして壊してしまう → リファクタリング前にgit commitしておくことで、万が一壊れてもgit resetで戻せる","過剰な抽象化（早すぎる最適化） → 「今必要な重複だけ解消する」が原則。将来のことを考えすぎて複雑な構造を作らない"],"miniEx":"lc-trackerのJSコードで「似た処理が複数書いてある箇所」を1つ見つけてメモしよう。「どう関数に切り出せるか」の案をコメントとして書き、はるのすけに確認を取ってみる。"}],"exercise":{"title":"コード品質改善PR","desc":"lc-trackerの品質改善（ESLint導入またはリファクタリング）を1件行ってPRを出そう。","items":["lc-trackerに.eslintrc.jsonを追加してnpm run lintを実行する（または VS Codeでエラー表示を確認する）","ESLintで検出された問題を最低3件修正する","重複コードを関数に切り出すリファクタリングを1箇所行う","PRに「修正前後のコードの比較」と「なぜ改善なのか」を日本語で説明する"],"rubric":["ESLint設定ファイルがコミットされている","ESLintエラーの修正が3件以上ある","リファクタリングの説明がPRに書かれている"]},"faq":[{"q":"リファクタリングで動作を変えてしまうか心配","a":"リファクタリング後は必ず動作確認する。DevToolsのConsoleにエラーがないこと、主要な機能（タスク追加・表示・削除）が動くことを確認してからPRを出す。また、git commitしてからリファクタリングを始めると、万が一壊れてもgit resetで戻せる。"}],"checklist":[{"text":"ESLintをVS Codeに設定してエラーが表示されることを確認した","role":"coder"},{"text":"ESLintエラーを最低3件修正した","role":"coder"},{"text":"重複コードを関数に切り出すリファクタリングを1箇所行った","role":"coder"},{"text":"PRに修正前後の説明を書いて提出した","role":"coder"}],"refs":[{"title":"ESLint 公式ドキュメント","url":"https://eslint.org/docs/user-guide/getting-started","note":""},{"title":"リファクタリング 入門","url":"https://refactoring.guru/ja/refactoring","note":"概念の説明（日本語）"}],"hint":"「動くコードを触って壊したくない」という心理はよくわかる。でも壊れてもGitで戻せるから大丈夫。リファクタリングはコードへの自信と胆力を鍛える練習でもある。"},{"id":18,"phase":2,"title":"Phase 2 実力確認","hours":"4〜6","target":"both","prereqs":["Week 13完了（2ツールのコードを読んだ）","Firestoreのデータ構造を図で描ける","onSnapshotとaddDocの役割を説明できる"],"intro":"Phase 2の最後の週。新しい知識は学ばず、これまでの理解を確認する週。「コードを読める」状態になったかどうかは「人に説明できるか」で判断する。はるのすけの前でコードの一部を画面共有しながら説明しよう。一元化担当はツール棚卸しシートを完成させる。","goals":["Action Trackerのタスク追加処理を画面共有しながらはるのすけに説明できる","Firestoreのデータ構造（lc-tracker + pakuri-tracker）を図で説明できる","Phase 3でやりたいことリストを3件以上送れる"],"steps":[{"num":"01","title":"コード読解の実演テスト（コーダー）","dur":"60分","why":"「説明できる」ことが「理解している」証拠。自分で読んでわかった気になっていても、人に説明しようとすると途端に言葉が出なくなることがある。その「途中で止まる場所」が「まだ理解できていない場所」なので、それを見つけることが目的。","body":"はるのすけとZoomまたは対面で「コード読解実演テスト」を実施しよう。画面共有しながら、Action Trackerのindex.htmlとmain.jsを開いた状態で説明を始める。\n\n説明の流れ（目安15〜20分）：①「このファイルの全体構造はこうなっています」→ ②「認証処理はここに書かれています」→ ③「タスク追加ボタンを押したとき、ここのaddEventListenerが呼ばれて...」→ ④「FirestoreのここのコレクションにaddDocで書き込まれます」→ ⑤「onSnapshotでここで変更が検知されて画面が更新されます」\n\n途中で詰まってもOK。詰まった場所が「まだ弱いところ」のフィードバックになる。説明できた部分・できなかった部分を自分でもメモしておこう。","code":"// 説明の準備：コードにコメントを追記しておく\n// 説明しながらコードを指し示せるように、\n// 事前に処理の流れをコメントで整理しておくのが有効\n\n// 1. 認証処理\nonAuthStateChanged(auth, (user) => {\n  if (user && user.email.endsWith('@aiesec.jp')) {\n    // 2. ログイン済みなのでメイン処理に進む\n    initApp(user);\n  } else {\n    // 未ログインまたはドメイン違い → ログイン画面表示\n  }\n});\n\n// 3. タスク追加処理\naddBtn.addEventListener('click', async () => {\n  const title = inputEl.value.trim(); // 入力値取得\n  if (!title) return;                  // バリデーション\n  // 4. Firestoreに書き込む\n  await addDoc(collection(db, 'lcs', currentLcId, 'tasks'), {\n    title,\n    done: false,\n    createdAt: serverTimestamp()\n  });\n});\n\n// 5. リアルタイム同期\nonSnapshot(collection(db, 'lcs', lcId, 'tasks'), renderTasks);","codeNote":"説明しながらコードを指し示せるように「コードの注釈（コメント）」を事前に整理しておくのが有効。この注釈がそのまま次の担当者への引き継ぎ資料になる。","mistakes":["完璧に説明できないことを恥ずかしがって説明を避ける → 「途中で止まること」がこのテストの目的。止まった場所を特定することが価値","説明が「これは○○ってコードです」という読み上げになる → コードを読むのではなく「このコードは何をしているか」「なぜこう書いているか」を言葉で説明する"],"miniEx":"今すぐindex.htmlを開いて「タスク追加ボタンを押してからFirestoreに書き込まれるまでの流れ」を声に出して説明してみよう（一人で）。詰まる場所を事前に特定して、それを調べてから本番に臨む。"},{"num":"02","title":"Firestoreデータ構造の図を完成させる","dur":"30分","why":"図を描くことで、「なんとなく理解している」状態から「明確に理解している」状態に変わる。また、この図はPhase 4のドキュメント整備でそのまま引き継ぎ資料になる。今週作っておく価値がある。","body":"lc-trackerとpakuri-trackerのFirestoreデータ構造を、NotionまたはFigmaまたは手書きで図にまとめよう。「コレクション名 → ドキュメントの例（IDはどんな文字列か） → 主なフィールド（名前・型・値の例）」という形式で書き出す。\n\nPhase 4でこの図をREADMEに追加するので、後から見てもわかる形で書いておこう。「自分しか読まない」のでなく「1年後の自分・次の担当者が読む」という想定で書くと自然と丁寧になる。\n\n特に「fieldsの型」を明記しておくと後の改修で役立つ。例えば「tasks」がarrayなのかサブコレクションなのか、「createdAt」がtimestamp型なのかstring型なのかは、コードを書くときに重要。","code":"// Firestoreデータ構造図の書き方（テキスト版）\n\n// lc-tracker\n// コレクション: lcs\n// ├── ドキュメント: HI (string ID)\n// │   ├── lcName: string (\"一橋大学\")\n// │   ├── lcId: string (\"HI\")\n// │   ├── updatedAt: timestamp\n// │   └── tasks: array[\n// │       ├── { title: string, done: boolean, createdAt: timestamp }\n// │       └── ...\n// │   ]\n// └── ドキュメント: KeioUniversity\n//     └── ...\n\n// pakuri-tracker\n// コレクション: posts\n// └── ドキュメント: [自動生成ID]\n//     ├── title: string\n//     ├── content: string\n//     ├── lcId: string (\"HI\")\n//     ├── category: string (\"認知\" | \"体験\" | ...)\n//     ├── authorId: string (Firebase UID)\n//     └── createdAt: timestamp","codeNote":"Notionのデータベースビューを使ってフィールド一覧表を作ると、後で検索・フィルタがしやすくなる。テキスト形式でもNotionでも好きな形式でOK。","mistakes":["図を「あとで完成させる」と先延ばしにする → 今週が図を作る最適なタイミング。Phase 3に入るとコードを修正する作業が増えて時間が取りにくくなる"],"miniEx":"テキストエディタかNotionを開いて、今すぐlc-trackerのFirestoreデータ構造の図を書き始めてみよう。Firebase Consoleとlc-trackerを並べて開いて確認しながら書く。"},{"num":"03","title":"Phase 3 への引き継ぎ準備","dur":"20分","why":"Phase 3でどの課題に取り組むかを事前に決めておくことで、Phase 3の初日から動ける。「何をすればいいかわからない」で時間を使うのがESTで最も多い時間の無駄の1つ。","body":"「Phase 3でやりたいこと・やるべきこと」を箇条書きで3〜5件書き出してはるのすけに送ろう。ヒアリングで聞いた課題・コードを読んで気になったバグ・自分が不便だと思う点が素材になる。\n\n具体的なIssueの候補として書けると良い。「機能を使いやすくする」ではなく「追加ボタンを押した後に入力欄がクリアされない（修正が必要）」のように具体的に書く。\n\nこの書き出したリストがPhase 3のWeek 15〜19のタスクの起点になる。Phase 3は自分でタスクを見つけて実装する力を問われるので、今から「課題の目」を育てることが大切。","code":null,"codeNote":"「Issueを書く力」は開発チームで最も重要なスキルの1つ。「問題が起きた」だけでなく「どんな状況で・どう再現できるか・期待する動作は何か」まで書けると優秀なIssueになる。","mistakes":["「やりたいことが思いつかない」という場合 → LCヒアリングで出たフィードバックをそのままIssue化する","具体的すぎて「こんな小さなことを書いていいのか」と躊躇する → 小さいバグでもIssueとして書いてOK。小さいところから始めるのがPhase 3の設計"],"miniEx":"今すぐ「Phase 3でやりたいこと候補」を3件Slackのメモに書き出してはるのすけに送ろう。1件は「バグ修正」、1件は「機能追加」、1件は「自由」というカテゴリで考えると3件出しやすい。"}],"exercise":{"title":"Phase 2 締めくくり提出物","desc":"Phase 2の完了を確認するための提出物を用意しよう。すべて揃ってから次のPhaseに進むこと。","items":["コード読解実演（はるのすけとの画面共有セッション、15〜20分）","Firestoreデータ構造の図（lc-tracker + pakuri-tracker）","ツール棚卸しシート完成版（一元化担当）","Phase 3でやりたいことリスト（3件以上）"],"rubric":["コード読解実演を実施しフィードバックをもらった","Firestoreデータ構造の図が両ツール分ある","Phase 3のやりたいことリストが具体的に3件書かれている","ツール棚卸しシートが完成している（一元化担当）"]},"faq":[{"q":"コード読解実演で全部説明できなかった場合どうなる？","a":"全部説明できなくてOK。途中で止まった場所が「まだ弱いところ」として可視化されるので、むしろ歓迎。はるのすけから「ここはこういう処理だよ」とフィードバックをもらえる機会と思おう。Phase 3が始まる前に弱い箇所を把握しておく方が後が楽。"},{"q":"Firestoreデータ構造の図はどんなツールで作ればいい？","a":"何でもいい。Notionのデータベース・テキストエディタ・FigJam（Figmaの無料ホワイトボード）・draw.io・紙に手書きして写真を送る、どれでも大丈夫。大切なのはツールでなく「内容の正確さと後から読めるかどうか」。"},{"q":"Phase 3のやりたいことが3件書けない","a":"まずはLCヒアリングのフィードバックを見直そう。「使いにくい」という声があれば改善課題、「こんな機能があれば」という声があれば機能追加のアイデアになる。また、自分でlc-trackerを実際に使ってみると「ここ不便だな」という気づきが生まれる。"}],"checklist":[{"text":"コード読解実演をはるのすけと実施した","role":"coder"},{"text":"フィードバックの内容を理解してメモした","role":"coder"},{"text":"Firestoreデータ構造の図を作成した（両ツール）","role":"both"},{"text":"ツール棚卸しシート完成版を提出した","role":"uni"},{"text":"Phase 3でやりたいことリスト（3件以上）を送った","role":"both"}],"refs":[{"title":"Firestore データ構造図 テンプレート","url":"https://firebase.google.com/docs/firestore/data-model","note":"公式のデータ構造の説明"}],"hint":"「説明できない＝まだ理解していない」というシグナルはとても大切。うまく説明できなかった箇所はそのままにせず、Phase 3の最初に振り返ろう。"},{"id":19,"phase":3,"title":"GitHub Flow の実践","hours":"5〜7","target":"both","prereqs":["Week 14完了（Phase 2の提出物が揃っている）","git add / commit / pushの基本操作ができる","lc-trackerリポジトリへのwrite権限がある（はるのすけから付与される）"],"intro":"Phase 3からはいよいよコードを変更する。チームでコードを管理するためのルール「GitHub Flow」を今週身につける。mainブランチに直接コミットするのは厳禁。「ブランチを切る → 変更してコミット → PR を出してレビューを受ける → マージ」という流れがすべてのコード変更の基本になる。","goals":["featureブランチを作成して変更をコミット・プッシュできる","GitHubでPRを作成し、descriptionに変更内容を日本語で書ける","レビューコメントに対応して再コミット・プッシュできる"],"steps":[{"num":"01","title":"ブランチの概念となぜブランチを使うのか","dur":"30分","why":"「mainブランチで直接作業していいじゃないか」と思うかもしれないが、それは一人作業のとき限定。チームで作業すると「誰かのmainへの変更が他の人の作業と衝突する」という問題が起きる。ブランチは「並行して作業できる独立した作業空間」。","body":"Gitのブランチは「コードの分岐点」。mainブランチは「本番の安定したコード」が置かれる場所で、直接触るのはNG。新しい作業を始めるときはmainから「ブランチ」を作り、そのブランチで作業する。完成したらPRを通じてmainに合流させる（マージ）。\n\ngit checkout -b ブランチ名 で新しいブランチを作成して切り替えられる。ブランチ名の命名規則は「feature/機能名」または「fix/バグ名」。これによってブランチが増えたときにも目的が一目でわかる。\n\ngit branchで現在のブランチ一覧が確認できる。*マークが付いているのが現在いるブランチ。git checkout ブランチ名でブランチを切り替えられる。","code":"# ブランチの基本操作\n\n# 現在のブランチを確認\ngit branch                  # ローカルのブランチ一覧\ngit branch -a               # リモート含む全ブランチ\n\n# ブランチを作成して切り替え（この1コマンドでOK）\ngit checkout -b feature/add-filter-btn\n\n# 変更してコミット\ngit add .\ngit commit -m \"feat: タスクフィルターボタンを追加\"\n\n# GitHub にプッシュ\ngit push origin feature/add-filter-btn\n\n# mainに戻る\ngit checkout main\n\n# mainの最新を取り込む（作業前に毎回やる習慣を）\ngit pull origin main\n\n# ブランチを削除（マージ後）\ngit branch -d feature/add-filter-btn","codeNote":"最近のGitではgit switch -c ブランチ名 という新しいコマンドが推奨されている。git checkout -b と同じ意味。どちらを使ってもOKだが、チームで統一しておくと混乱が少ない。","mistakes":["mainブランチで直接作業してしまう → git branch で今どのブランチにいるかを必ず確認する習慣をつける。mainにいる状態でcommitしてしまったら git reset HEAD~1 で取り消せる","ブランチ名を日本語にしてしまう → ブランチ名は英語・数字・ハイフンのみ。日本語は使えない（技術的には使えるが推奨されない）","git push origin main と間違えてmainに直接pushしてしまう → pushする前にgit branchで現在のブランチを確認する"],"miniEx":"est-practiceリポジトリで練習しよう。git checkout -b feature/week15-practice でブランチを作成し、README.mdに1行追加してコミット・プッシュ。GitHubでブランチが作成されたことを確認する。"},{"num":"02","title":"Pull Requestを作成してレビューを受ける","dur":"40分","why":"PRはコードをmainにマージする前のレビュー依頼。「何を変えたか・なぜ変えたか・どう確認したか」を伝えることがPRのdescriptionに書くべき内容。良いPRの書き方を習得すると、後のチーム開発で圧倒的に信頼されるエンジニアになれる。","body":"GitHubでブランチをpushした後、そのリポジトリのページを開くと「Compare & pull request」というバナーが表示される。クリックしてPRのdescription（説明文）を書こう。\n\n良いPRのdescriptionの構成：①変更の概要（何をどう変えたか1〜3行）、②変更の理由（なぜこの変更が必要か）、③Close #Issue番号（あれば）、④動作確認方法（レビュアーが確認するための手順）、⑤スクリーンショット（UIの変更がある場合は必須）。\n\nレビュアーをはるのすけに設定してAssignしよう。はるのすけからコメントが来たら、指摘内容を理解した上で修正してコミット・プッシュする。同じブランチへのpushはPRに自動反映される。Approveされたらマージボタンを押してmainに取り込む。","code":"## PR の description テンプレート\n\n## 変更の概要\n- タスクフィルターボタン（全件 / 完了 / 未完了）を追加\n- クリックで `filterTasks()` が呼ばれてリストが絞り込まれる\n\n## 変更の理由\nIssue #12 で報告のあった「完了タスクが増えると未完了が見づらい」\nという問題を解決するため。\n\n## 動作確認\n1. `git checkout feature/add-filter-btn` → `Live Server`で開く\n2. タスクを5件追加し、2〜3件を完了にする\n3. 「完了」ボタンをクリック → 完了タスクのみ表示されることを確認\n4. 「全件」ボタンをクリック → 全件表示に戻ることを確認\n\n## スクリーンショット\n（Before / After の画像をここに貼る）\n\nClose #12","codeNote":"「Close #12」とdescriptionに書くと、PRがマージされたときにIssue #12が自動でクローズされる。手動でIssueをクローズする手間が省ける便利な機能。","mistakes":["PRのdescriptionを空で送ってしまう → 「何をしたPRか」が伝わらないと良いレビューをもらえない。少なくとも変更の概要だけでも書く","スクリーンショットを貼り忘れる → UIの変更がある場合は必ずBeforeとAfterの両方を貼る。レビューアーが手元でブランチをcheckoutしなくていい","レビューコメントに対応したのにApproveを依頼し直すのを忘れる → コメントに「修正しました / 確認お願いします」と返信してはるのすけに知らせる"],"miniEx":"est-practiceで作ったブランチをGitHubでPRにしてみよう。descriptionに「変更の概要・動作確認方法」を書き、はるのすけをレビュアーに指定して送信する。"},{"num":"03","title":"マージ後のクリーンアップ","dur":"20分","why":"マージ後のクリーンアップはチーム開発の礼儀。古いブランチが大量に残っていると「どのブランチで何をしているか」がわからなくなる。マージしたらブランチは削除するのが基本。","body":"PRがマージされたら、GitHubのPRページ下部に「Delete branch」ボタンが表示される。クリックしてリモートのブランチを削除しよう。ローカルのブランチはgit branch -d ブランチ名で削除する。\n\ngit pull origin mainでmainの最新を手元に取り込もう。mainには自分のPRの変更が反映されているはず。git log --onelineで確認できる。\n\nこのクリーンアップの習慣をつけておくと、チームメンバーが混乱しない。特に「featureブランチが10個以上残っている」状態は「どこで何が作業中なのか」が全くわからなくなる。","code":"# マージ後のクリーンアップ手順\n\n# 1. main に戻る\ngit checkout main\n\n# 2. リモートの最新を取り込む\ngit pull origin main\n\n# 3. ローカルの古いブランチを削除\ngit branch -d feature/add-filter-btn\n\n# 4. リモートのブランチをローカルで削除\ngit fetch --prune\n\n# 現在のブランチ状態を確認\ngit branch -a  # main だけが残っていればOK\n\n# ─── PR のライフサイクル まとめ ───\n# git checkout -b feature/xxx  (ブランチ作成)\n# → コーディング\n# → git add . && git commit -m \"feat: xxx\"\n# → git push origin feature/xxx\n# → GitHub で PR 作成\n# → レビューを受ける\n# → 修正 → push（自動反映）\n# → Approve → マージ\n# → Delete branch（GitHub）\n# → git pull origin main（手元を最新化）","codeNote":"git fetch --prune はリモートで削除されたブランチ情報をローカルにも反映するコマンド。これを実行しないと「リモートでは削除されたのにローカルではまだ表示される」という状態になる。","mistakes":["マージ後にmainをpullし忘れる → 手元のmainが古い状態のまま次のブランチを切ると、後でconflictが起きやすくなる","ブランチを削除せずにどんどん作り続ける → git branch -aで確認して古いブランチは定期的にクリーンアップする"],"miniEx":"PRをマージしたら「Delete branch」→「git pull origin main」→「git branch -d 古いブランチ名」の3ステップを実行しよう。git log --onelineで自分のコミットがmainに反映されていることを確認する。"}],"exercise":{"title":"練習PRを出してマージまで完了させる","desc":"lc-trackerのREADMEまたはコメントに小さな変更を加えてPRを出し、マージまで完結させよう。機能に影響しない変更（誤字修正・コメント追加など）でOK。","items":["git checkout -b feature/week15-practice でブランチを作成","README.mdの誤字修正・コメント追加など小さな変更を加えてコミット","descriptionに「変更の概要・理由・確認方法」を書いてPRを送信","はるのすけをレビュアーに指定","レビューコメントに対応（修正があれば再コミット）","Approveされたらマージ → ブランチ削除 → git pull origin main"],"rubric":["featureブランチが作成されていてGitHubに表示されている","PRのdescriptionに変更の概要・理由が書かれている","Approveされてmainにマージされている","マージ後にブランチが削除されている"]},"faq":[{"q":"git pushしたら「error: failed to push some refs」が出た","a":"mainの変更が手元にない状態でpushしようとしているとき起きる。git pull origin main --rebase を実行してからpushし直す。または、新しいブランチを切ってからpushすると回避できる。"},{"q":"PRのConflictが発生した","a":"Conflictはmainとfeatureブランチで同じファイルの同じ箇所を変更したときに起きる。git checkout main → git pull origin main → git checkout feature/xxx → git merge mainでconflictを解消する。VSCodeのConflictエディタ（<<<<<<< HEAD の箇所が表示される）を使って手動で解決する。"},{"q":"間違ってmainブランチで変更してしまった","a":"コミットする前ならgit stash save でいったん変更を退避 → git checkout -b 新しいブランチ名 → git stash pop で変更を移動できる。すでにコミットしてしまった場合はgit reset HEAD~1 でコミットを取り消す（変更は残る）。"}],"checklist":[{"text":"featureブランチを作成できた","role":"coder"},{"text":"変更をコミット・プッシュできた","role":"coder"},{"text":"PRをdescription付きで作成できた（変更概要・理由・確認方法）","role":"both"},{"text":"はるのすけをレビュアーに指定した","role":"coder"},{"text":"レビューコメントに対応して再プッシュできた","role":"coder"},{"text":"Approveされてマージし、ブランチを削除した","role":"coder"},{"text":"Issueテンプレートをリポジトリに追加した","role":"uni"}],"refs":[{"title":"GitHub Flow 公式ガイド","url":"https://docs.github.com/ja/get-started/quickstart/github-flow","note":""},{"title":"Conventional Commits","url":"https://www.conventionalcommits.org/ja/","note":"feat: / fix: / docs: 等の使い分け"},{"title":"良いPRの書き方","url":"https://docs.github.com/ja/pull-requests/collaborating-with-pull-requests/getting-started/best-practices-for-pull-requests","note":"GitHubのベストプラクティス"}],"hint":"PRのdescriptionは「自分のためではなくレビュアーのために書くもの」。スクリーンショットを貼るだけでレビューのしやすさが大きく変わる。丁寧に書く習慣は今週から。"},{"id":20,"phase":3,"title":"バグ修正① — UI・表示系","hours":"6〜8","target":"coder","prereqs":["Week 15完了","前週の課題を提出済み"],"intro":"いよいよ実際のツールに初めて手を入れる週。最初は安全な「UI系のバグ」から始める。CSSの崩れ・文字のミス・余白のズレなど、ロジックに影響しない表示の問題を修正しよう。「DevToolsで特定→修正→確認→PR提出」のルーティンを身につけることが今週の目標。","goals":["DevToolsで表示崩れの原因を特定し、修正前後のスクリーンショット付きPRを出せる","はるのすけのフィードバックを受けて改善できる","チャンネルに成果物を投稿できる"],"steps":[{"num":"01","title":"作業準備とタスク確認","dur":"20分","why":"「何をするか」を明確にしてから始めることで、作業中の迷子を防げる。","body":"まずはるのすけのIssueリストから今週の課題を確認しよう。担当するIssueにコメントして「アサインをお願いします」と伝える。次にgit pull origin mainで最新のmainを取り込んでから、featureブランチを切る。\n\nブランチ名は「fix/バグの内容」または「feat/機能名」の形式で。例えばfix/login-button-not-workingやfeat/add-lc-filter-button。\n\n作業開始前に「どこを変えるのか」「なぜそこを変えるのか」「完了の条件は何か」を一度文字にしてみよう。これがPRのdescriptionの骨子になる。","code":null,"codeNote":null,"mistakes":["Issueを確認せずに作業を始めて「同じ作業を2人でやっていた」という事態になる → 作業前にIssueにコメントしてアサインを受ける","mainが古い状態でブランチを切る → 作業前に必ずgit pull origin main"],"miniEx":"Issueリストを開いて今週の担当Issueを1件選び、コメントで「取り組みます」と伝えよう。"},{"num":"02","title":"バグ修正①の本作業","dur":"2〜4時間","why":"DevToolsのElementsパネルとStylesパネルがバグ特定の主要ツール。「なぜこのレイアウトが崩れているのか」をツールを使って論理的に特定する習慣が、この週で身につけるべき最重要スキル。","body":"バグが発生しているページをブラウザで開き、DevToolsを起動する（F12）。問題のある要素を右クリック→「検証」で対象要素をElementsパネルで選択する。Stylesパネルを確認して「どのCSSルールが効いていて、どれが上書きされているか（取り消し線）」を読み取る。\n\nよくあるUI系バグの原因：①余白の設定ミス（paddingとmarginの混同）、②flexboxのプロパティが欠けている（align-itemsの忘れ）、③メディアクエリの範囲指定ミス（max-widthとmin-widthの逆転）、④z-indexの問題（要素が重なって隠れる）、⑤文字列のはみ出し（overflow: hiddenが必要）。\n\n原因を特定したら、DevToolsのStylesパネルでリアルタイムに修正を試してから（確認用）、VS Codeのファイルを修正する。修正後に再確認。","code":"/* よくある UI バグの修正パターン */\n\n/* 1. テキストが要素からはみ出す */\n.task-title {\n  overflow: hidden;\n  text-overflow: ellipsis;  /* ...で省略 */\n  white-space: nowrap;       /* 折り返さない */\n}\n\n/* 2. Flexbox で縦方向が揃わない */\n.toolbar {\n  display: flex;\n  align-items: center; /* ← これを忘れると縦がバラバラ */\n}\n\n/* 3. スマホでレイアウトが崩れる */\n@media (max-width: 768px) {\n  .columns {\n    flex-direction: column; /* 横並び → 縦並びに */\n  }\n}\n\n/* 4. ボタンのホバー効果が効かない */\n.btn {\n  cursor: pointer;  /* ← pointer を付けないとクリック感がない */\n  transition: background-color 0.15s;\n}\n.btn:hover {\n  background-color: rgba(0, 0, 0, 0.05);\n}","codeNote":"バグ修正① — UI・表示系の核心作業。詰まったら早めにはるのすけへ。","mistakes":["Before画像を撮り忘れる → 修正前のスクリーンショットは「作業を始める前」に撮らないと後から作れない","DevToolsで直したがVS Codeに反映するのを忘れる → DevToolsはあくまで試し用。必ずVS Codeのファイルを修正する","修正したつもりが別の箇所が崩れた（副作用）→ 修正後はページ全体をスクロールして他の箇所に影響が出ていないか確認する"],"miniEx":"30分作業したら一度立ち止まって「今何をしているか・次に何をするか」を確認しよう。"},{"num":"03","title":"PRの作成と提出","dur":"30分","why":"PRのdescriptionに「Before/Afterのスクリーンショット」を貼るだけで、レビュアーへの伝わり方が全然違う。手間でもやる価値がある。","body":"作業が完了したら動作確認をしよう。正常ケース（期待通り動くケース）だけでなく、空入力・ネットワークエラー・ログインしていない状態などの異常ケースも確認する。\n\nスクリーンショットを撮る。UIの変更がある場合はBefore（修正前）とAfter（修正後）の両方。Before画像は作業前に撮っておかないと後から作れないので要注意。\n\nPRのdescriptionに「変更内容・理由・確認方法・スクリーンショット」を書いて提出。はるのすけをレビュアーに指定する。","code":null,"codeNote":"descriptionのスクリーンショットはGitHubにドラッグ&ドロップで貼り付けられる。","mistakes":["Before画像を撮り忘れる → 作業前に必ずスクリーンショットを撮る習慣をつける","正常ケースしか確認しない → 空入力・エラー状態などの異常ケースも確認する"],"miniEx":"PRを提出したらSlackの#est-学習チャンネルにPRのURLを貼って「PRを出しました」と報告しよう。"}],"exercise":{"title":"バグ修正① — UI・表示系 演習課題","desc":"今週のテーマ「バグ修正① — UI・表示系」に沿って成果物を作成し、PRとして提出しよう。","items":["バグリストからUI系バグを1件選んでアサインをリクエストした","DevToolsで表示崩れの原因箇所を特定できた","CSSまたはHTMLを修正してバグを直した","修正前・修正後のスクリーンショットをPRに添付した","PRを提出してレビューを受けた","マージした"],"rubric":["featureブランチが作成されている","PRのdescriptionに変更内容・理由・確認方法が書かれている","スクリーンショットがPRに貼られている","レビューを受けてマージされた"]},"faq":[{"q":"詰まったとき何をすれば一番早いか","a":"①エラーメッセージをそのままGoogleで検索する、②console.logを追加して問題の箇所を絞り込む、③30分調べてもわからなければはるのすけに「○○をしようとして○○というエラーが出ます」という形で聞く。「どこかわからない」より「ここがわからない」と聞ける方が解決が早い。"},{"q":"PRのdescriptionは日本語で書いていい？","a":"AJのESTでは日本語で書いてOK。ただし英語で書けるなら英語の方がポートフォリオとしての汎用性が上がる。最初は日本語で書き、慣れてきたら英語に挑戦しよう。"}],"checklist":[{"text":"今週の担当Issueを選んでアサインを受けた","role":"coder"},{"text":"featureブランチを作成して作業した","role":"coder"},{"text":"PRにBefore/Afterのスクリーンショットを貼った","role":"coder"},{"text":"PRをレビューしてもらいマージした","role":"coder"},{"text":"#est-学習にPRのURLを共有した","role":"both"}],"refs":[{"title":"GitHub — PRのベストプラクティス","url":"https://docs.github.com/ja/pull-requests/","note":""},{"title":"Chrome DevTools — デバッグ入門","url":"https://developer.chrome.com/docs/devtools/","note":""}],"hint":"修正前スクリーンショットを撮り忘れがち。「作業前に先にスクショを撮る」を癖にしよう。DevToolsで色々試してから「ああこれが原因か」とわかって直す感覚が、今週の最大の学び。"},{"id":21,"phase":3,"title":"バグ修正② — JavaScript・ロジック系","hours":"7〜9","target":"coder","prereqs":["Week 16完了","前週の課題を提出済み"],"intro":"UI系バグの次はロジック系バグ。「ボタンを押しても動かない」「Firestoreへの書き込みが失敗する」「データが表示されない」といったJSのバグは、console.logを使いながら処理の流れを追うことで特定できる。エラーメッセージを正確に読む習慣もここで身につける。","goals":["console.logを使ってバグの発生箇所を絞り込み、エラーメッセージから原因を読み取ってMDNで調べられる","はるのすけのフィードバックを受けて改善できる","チャンネルに成果物を投稿できる"],"steps":[{"num":"01","title":"作業準備とタスク確認","dur":"20分","why":"「何をするか」を明確にしてから始めることで、作業中の迷子を防げる。","body":"まずはるのすけのIssueリストから今週の課題を確認しよう。担当するIssueにコメントして「アサインをお願いします」と伝える。次にgit pull origin mainで最新のmainを取り込んでから、featureブランチを切る。\n\nブランチ名は「fix/バグの内容」または「feat/機能名」の形式で。例えばfix/login-button-not-workingやfeat/add-lc-filter-button。\n\n作業開始前に「どこを変えるのか」「なぜそこを変えるのか」「完了の条件は何か」を一度文字にしてみよう。これがPRのdescriptionの骨子になる。","code":null,"codeNote":null,"mistakes":["Issueを確認せずに作業を始めて「同じ作業を2人でやっていた」という事態になる → 作業前にIssueにコメントしてアサインを受ける","mainが古い状態でブランチを切る → 作業前に必ずgit pull origin main"],"miniEx":"Issueリストを開いて今週の担当Issueを1件選び、コメントで「取り組みます」と伝えよう。"},{"num":"02","title":"バグ修正②の本作業","dur":"2〜4時間","why":"console.logデバッグは「問題がどこにあるか」を機械的に絞り込む方法。「エラーが出る前」「エラーが出る後」にconsole.logを置くことで、問題が発生している行を特定できる。これは職業エンジニアが毎日使っているデバッグの基本技法。","body":"バグが起きているアクション（例：追加ボタンを押す）を実行し、まずDevToolsのConsoleを開いてエラーメッセージを確認しよう。赤いエラーが出ていれば、そのメッセージをそのままGoogleで検索するだけで解決策が見つかることが多い。\n\nエラーメッセージが出ていない場合、console.logを使って問題を絞り込む。「バグが起きている処理」の開始時・途中・終了時にconsole.logを置き、どこで値がおかしくなるかを確認する。「期待する値」と「実際の値」が食い違う箇所がバグの原因。\n\nFirestoreのエラーはconsole.error(err)で捕捉できる。「permission-denied」「not-found」「invalid-argument」など、Firestoreのエラーコードには意味があるのでFirebase Docsで調べよう。","code":"// JS バグのデバッグ手順\n\n// ❶ まずエラーメッセージを確認（F12 → Console）\n// 赤いエラー → そのメッセージをGoogleで検索\n\n// ❷ console.log で問題を絞り込む\nconst addTask = async (title, lcId) => {\n  console.log('[DEBUG] 開始:', { title, lcId });\n\n  if (!title) {\n    console.log('[DEBUG] title が空のためreturn');\n    return;\n  }\n\n  try {\n    const docRef = await addDoc(collection(db, 'lcs', lcId, 'tasks'), {\n      title,\n      done: false,\n      createdAt: serverTimestamp()\n    });\n    console.log('[DEBUG] 書き込み成功:', docRef.id);\n  } catch (err) {\n    console.error('[DEBUG] Firestore エラー:', err.code, err.message);\n    // err.code に \"permission-denied\" や \"not-found\" が入る\n  }\n};\n\n// ❸ 解決したら [DEBUG] で検索して全て削除\n// Cmd+Shift+F → \"[DEBUG]\" で全件検索 → 全削除","codeNote":"バグ修正② — JavaScript・ロジック系の核心作業。詰まったら早めにはるのすけへ。","mistakes":["console.logを削除し忘れてmainにpushしてしまう → PRを出す前に Cmd+Shift+F で \"[DEBUG]\" を検索して全削除する","エラーメッセージを「よくわからないから無視する」 → エラーメッセージには解決策のヒントが必ず書いてある。赤い文字は無視しないこと","「undefined」エラーの意味がわからない → undefined = 変数が宣言されているが値がない。「この変数にはちゃんと値が入っているか？」をconsole.logで確認する"],"miniEx":"30分作業したら一度立ち止まって「今何をしているか・次に何をするか」を確認しよう。"},{"num":"03","title":"PRの作成と提出","dur":"30分","why":"PRのdescriptionに「Before/Afterのスクリーンショット」を貼るだけで、レビュアーへの伝わり方が全然違う。手間でもやる価値がある。","body":"作業が完了したら動作確認をしよう。正常ケース（期待通り動くケース）だけでなく、空入力・ネットワークエラー・ログインしていない状態などの異常ケースも確認する。\n\nスクリーンショットを撮る。UIの変更がある場合はBefore（修正前）とAfter（修正後）の両方。Before画像は作業前に撮っておかないと後から作れないので要注意。\n\nPRのdescriptionに「変更内容・理由・確認方法・スクリーンショット」を書いて提出。はるのすけをレビュアーに指定する。","code":null,"codeNote":"descriptionのスクリーンショットはGitHubにドラッグ&ドロップで貼り付けられる。","mistakes":["Before画像を撮り忘れる → 作業前に必ずスクリーンショットを撮る習慣をつける","正常ケースしか確認しない → 空入力・エラー状態などの異常ケースも確認する"],"miniEx":"PRを提出したらSlackの#est-学習チャンネルにPRのURLを貼って「PRを出しました」と報告しよう。"}],"exercise":{"title":"バグ修正② — JavaScript・ロジック系 演習課題","desc":"今週のテーマ「バグ修正② — JavaScript・ロジック系」に沿って成果物を作成し、PRとして提出しよう。","items":["JSロジック系バグを1件選んでアサインをリクエストした","console.logを使ってバグの原因箇所を絞り込んだ","エラーメッセージを読んで意味を理解した","修正して正常ケースと異常ケースの両方で動作確認した","console.logを全て削除してPRを提出した","解決内容をエラーメモ（docs/ERRORS.md等）に残した"],"rubric":["featureブランチが作成されている","PRのdescriptionに変更内容・理由・確認方法が書かれている","スクリーンショットがPRに貼られている","レビューを受けてマージされた"]},"faq":[{"q":"詰まったとき何をすれば一番早いか","a":"①エラーメッセージをそのままGoogleで検索する、②console.logを追加して問題の箇所を絞り込む、③30分調べてもわからなければはるのすけに「○○をしようとして○○というエラーが出ます」という形で聞く。「どこかわからない」より「ここがわからない」と聞ける方が解決が早い。"},{"q":"PRのdescriptionは日本語で書いていい？","a":"AJのESTでは日本語で書いてOK。ただし英語で書けるなら英語の方がポートフォリオとしての汎用性が上がる。最初は日本語で書き、慣れてきたら英語に挑戦しよう。"}],"checklist":[{"text":"今週の担当Issueを選んでアサインを受けた","role":"coder"},{"text":"featureブランチを作成して作業した","role":"coder"},{"text":"PRにBefore/Afterのスクリーンショットを貼った","role":"coder"},{"text":"PRをレビューしてもらいマージした","role":"coder"},{"text":"#est-学習にPRのURLを共有した","role":"both"}],"refs":[{"title":"GitHub — PRのベストプラクティス","url":"https://docs.github.com/ja/pull-requests/","note":""},{"title":"Chrome DevTools — デバッグ入門","url":"https://developer.chrome.com/docs/devtools/","note":""}],"hint":"エラーメモを残す習慣は個人の成長記録であると同時に、次の担当者への引き継ぎ情報になる。「こういうエラーが出たらこう解決した」を1件1件大切に書こう。"},{"id":22,"phase":3,"title":"バグ修正③ — Firebase・認証・Firestoreエラー系","hours":"7〜9","target":"coder","prereqs":["Week 21完了（JSロジック系バグを修正したことがある）","Firebaseの認証フローを説明できる","Firestoreのセキュリティルールを読んだことがある"],"intro":"UIのバグ・JSロジックのバグに続いて、今週はFirebaseと認証に関するバグを扱う。「permission-denied」「network-request-failed」「auth/user-not-found」のようなFirebaseのエラーコードを読んで対処できる状態になることが目標。これが一番難しいバグだが、パターンを覚えれば怖くない。","goals":["Firestoreのエラーコードを見て原因を特定できる","認証エラー（未ログイン・ドメイン不一致）を適切に処理できる","ネットワークエラー時のUI（ローディング・エラーメッセージ）を実装できる"],"steps":[{"num":"01","title":"Firestoreのエラーコードを読んで原因特定","dur":"60分","why":"Firestoreのエラーはerr.codeという文字列で原因がわかる。「permission-denied」が出たらセキュリティルール違反、「not-found」は存在しないドキュメントへのアクセス、「unavailable」はネットワーク問題。エラーコードを知っているだけでデバッグ速度が2〜3倍変わる。","body":"try/catchのcatchブロックでerr.codeを確認するのが基本。console.error('[DEBUG]', err.code, err.message)でエラーの種類とメッセージを確認する。\n\nよく出るFirestoreエラーコード：permission-denied（セキュリティルールでアクセス拒否）・not-found（ドキュメントが存在しない）・already-exists（既に存在する）・resource-exhausted（レート制限超過）・unavailable（Firestoreサービスが一時的に利用不可）・invalid-argument（不正なデータ型・値）。\n\nFirebase Authenticationのエラーコード：auth/user-not-found・auth/wrong-password・auth/email-already-in-use・auth/network-request-failed。これらはsignInWithPopupやcreateUserWithEmailAndPasswordが失敗したときにcatchで取れる。","code":"// Firestore エラーの処理パターン\nconst fetchTasksSafely = async (lcId) => {\n  try {\n    const q = query(\n      collection(db, 'lcs', lcId, 'tasks'),\n      orderBy('createdAt', 'desc')\n    );\n    const snapshot = await getDocs(q);\n    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));\n\n  } catch (err) {\n    // エラーコードに応じたメッセージ\n    const messages = {\n      'permission-denied': 'このデータへのアクセス権限がありません',\n      'not-found':         '指定されたLCが見つかりません',\n      'unavailable':       '接続が不安定です。しばらく待って再試行してください',\n      'resource-exhausted':'アクセスが集中しています。数分後に再試行してください',\n    };\n    const msg = messages[err.code] || `エラーが発生しました: ${err.code}`;\n    showError(msg); // ユーザーにエラーを表示する関数\n    console.error('[DEBUG] fetchTasks error:', err.code, err.message);\n    return []; // 空配列を返してアプリをクラッシュさせない\n  }\n};","codeNote":"Firestoreのエラーコード一覧はFirebase公式ドキュメントのErrorコードリファレンスページにある。ブックマークして手元に置いておくことをおすすめ。","mistakes":["try/catchでerrしか取っていない → err.codeを使うことでFirebase特有のエラーを識別できる","permission-deniedが出たとき「バグ」だと思ってコードを直そうとする → セキュリティルールの問題なのでFirebase Consoleのルールを確認する","エラーをconsole.errorでログするだけでユーザーに何も伝えない → UX的に問題。ローディングが止まったまま、またはエラーメッセージがないと何が起きたかわからない"],"miniEx":"lc-trackerのFirestore呼び出し箇所にerr.codeのswitch文を追加して、エラーの種類に応じたメッセージを表示する処理を書いてみよう。"},{"num":"02","title":"認証エラーのハンドリング","dur":"40分","why":"「ログイン処理」と「ログイン後のデータアクセス」の2段階でエラーが起きる可能性がある。どの段階で何のエラーが起きうるかを整理しておくと、トラブルシューティングが速くなる。","body":"signInWithPopupはポップアップがブロックされる（auth/popup-blocked）・ユーザーがキャンセルする（auth/popup-closed-by-user）・ネットワークエラー（auth/network-request-failed）のケースでエラーになる。
